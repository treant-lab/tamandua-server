# ============================================================================
# Components
# ============================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for API authentication

  parameters:
    AgentId:
      name: id
      in: path
      required: true
      description: Agent UUID
      schema:
        type: string
        format: uuid

    AlertId:
      name: id
      in: path
      required: true
      description: Alert UUID
      schema:
        type: string
        format: uuid

    Limit:
      name: limit
      in: query
      description: Maximum number of results
      schema:
        type: integer
        default: 100
        maximum: 1000

    Offset:
      name: offset
      in: query
      description: Number of results to skip
      schema:
        type: integer
        default: 0

  schemas:
    Agent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        hostname:
          type: string
        os_type:
          type: string
          enum: [windows, linux, macos]
        os_version:
          type: string
        agent_version:
          type: string
        status:
          type: string
          enum: [online, offline, isolated]
        isolated:
          type: boolean
        last_seen:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    Alert:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        severity:
          type: string
          enum: [info, low, medium, high, critical]
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [open, investigating, resolved, false_positive]
        mitre_tactics:
          type: array
          items:
            type: string
        mitre_techniques:
          type: array
          items:
            type: string
        assigned_to_id:
          type: string
          format: uuid
        resolution_notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PreventionPolicy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        isDefault:
          type: boolean
        isEnabled:
          type: boolean
        globalMode:
          type: string
          enum: [monitor, detect, detect_and_prevent]
        globalAggressiveness:
          type: string
          enum: [low, moderate, high, paranoid]
        categorySettings:
          type: object
          description: Per-category settings (ransomware, exploit, etc.)
        assignedGroups:
          type: array
          items:
            type: string
        assignedAgents:
          type: array
          items:
            type: string
        excludedPaths:
          type: array
          items:
            type: string
        excludedProcesses:
          type: array
          items:
            type: string
        excludedHashes:
          type: array
