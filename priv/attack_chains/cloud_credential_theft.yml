name: "Cloud Credential Theft"
description: "Cloud credential harvesting and unauthorized cloud resource access"
severity: high
author: "Tamandua EDR"
version: "1.0"
tags:
  - cloud
  - credential-access
  - cloud-security

steps:
  - name: "Cloud Credential Discovery"
    techniques:
      - T1552       # Unsecured Credentials
      - T1552.001   # Credentials In Files
    threshold: 1
    timeframe: 1800  # 30 minutes
    description: "Search for cloud credentials, tokens, or configuration files"

  - name: "Cloud API Access"
    techniques:
      - T1078.004  # Cloud Accounts
    threshold: 1
    timeframe: 3600  # 1 hour
    conditions:
      same_user: true
    description: "Unusual or unauthorized cloud API calls with discovered credentials"

  - name: "Cloud Resource Access"
    techniques:
      - T1530  # Data from Cloud Storage Object
      - T1213  # Data from Information Repositories
    threshold: 1
    timeframe: 3600  # 1 hour
    conditions:
      same_user: true
    description: "Access to cloud storage buckets or sensitive repositories"

narrative_template: "Cloud credential theft: user {user} discovered cloud credentials and accessed cloud resources from {source_ip} within {timespan}"
