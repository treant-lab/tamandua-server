name: "Credential Stuffing to Account Takeover"
description: "Detects brute force attempts followed by successful account compromise"
severity: critical
author: "Tamandua EDR"
version: "1.0"
tags:
  - credential-access
  - initial-access
  - authentication

steps:
  - name: "Brute Force Detection"
    techniques:
      - T1110
      - T1110.001
      - T1110.003
    threshold: 3
    timeframe: 300  # 5 minutes
    description: "Multiple failed authentication attempts detected"

  - name: "Valid Account Login"
    techniques:
      - T1078
      - T1078.001
      - T1078.002
    threshold: 1
    timeframe: 1800  # 30 minutes after previous step
    conditions:
      same_user: true
    description: "Successful login after brute force attempts"

narrative_template: "Credential stuffing attack detected: {count} brute force attempts followed by successful login as user {user} from {source_ip} within {timespan}"
