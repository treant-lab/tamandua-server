name: "Password Spray to Privilege Escalation"
description: "Password spraying attack followed by privilege escalation"
severity: high
author: "Tamandua EDR"
version: "1.0"
tags:
  - credential-access
  - privilege-escalation

steps:
  - name: "Password Spray Attack"
    techniques:
      - T1110.003  # Password Spraying
    threshold: 5
    timeframe: 600  # 10 minutes
    description: "Multiple users targeted with same password across network"

  - name: "Valid Account Compromise"
    techniques:
      - T1078       # Valid Accounts
      - T1078.001   # Default Accounts
      - T1078.002   # Domain Accounts
    threshold: 1
    timeframe: 1800  # 30 minutes
    conditions:
      same_source_ip: true
    description: "Successful authentication after spray"

  - name: "Privilege Escalation"
    techniques:
      - T1068  # Exploitation for Privilege Escalation
      - T1134  # Access Token Manipulation
      - T1548  # Abuse Elevation Control Mechanism
    threshold: 1
    timeframe: 3600  # 1 hour
    conditions:
      same_user: true
    description: "Elevation to administrator privileges"

narrative_template: "Password spray attack from {source_ip} compromised user {user} and escalated to administrator within {timespan}"
