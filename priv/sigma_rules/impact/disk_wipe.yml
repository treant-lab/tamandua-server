title: Disk Wiping Activity
id: im04a001-dwip-0004-0001-000000000001
status: stable
description: |
  Detects potential disk wiping activity via diskpart, format, or cipher.
  Destructive malware (wipers) like NotPetya, Shamoon, and WhisperGate
  use these tools or direct disk access to render systems inoperable.
references:
  - https://attack.mitre.org/techniques/T1561/001/
  - https://attack.mitre.org/techniques/T1561/002/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.impact
  - attack.t1561.001
  - attack.t1561.002
logsource:
  category: process_creation
  product: windows
detection:
  selection_diskpart:
    Image|endswith: '\diskpart.exe'
    CommandLine|contains:
      - 'clean'
      - 'clean all'
      - 'delete partition'
      - 'delete volume'
  selection_format:
    Image|endswith: '\format.exe'
    CommandLine|contains:
      - '/y'
      - '/q'
  selection_cipher:
    Image|endswith: '\cipher.exe'
    CommandLine|contains:
      - '/w:'
  selection_dd:
    CommandLine|contains:
      - 'dd if=/dev/zero'
      - 'dd if=/dev/urandom'
      - 'of=\\\\.\\'
  filter_admin:
    ParentImage|endswith:
      - '\diskpart.exe'
      - '\svchost.exe'
    User|contains: 'SYSTEM'
  condition: (selection_diskpart or selection_format or selection_cipher or selection_dd) and not filter_admin
falsepositives:
  - Legitimate disk management by IT teams
  - Disk provisioning in data centers
level: critical

