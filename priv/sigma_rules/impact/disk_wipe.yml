title: MBR/VBR Overwrite Attempt
id: im04a002-dwip-0004-0002-000000000002
status: stable
description: |
  Detects attempts to overwrite the Master Boot Record (MBR) or Volume Boot
  Record (VBR) using direct disk write operations. Wiper malware targets
  the MBR to make the system unbootable.
references:
  - https://attack.mitre.org/techniques/T1561/002/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.impact
  - attack.t1561.002
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - '\\\\.\\PhysicalDrive'
      - '\\\\.\\PhysicalDisk'
      - '\\Device\\Harddisk'
      - 'MBR'
  selection_write:
    CommandLine|contains:
      - 'write'
      - 'dd '
      - 'overwrite'
  filter_recovery:
    Image|endswith:
      - '\bootrec.exe'
      - '\bcdboot.exe'
  condition: selection and selection_write and not filter_recovery
falsepositives:
  - Legitimate disk imaging or cloning operations
  - Boot repair operations
level: critical
