title: Ransomware File Extension Modification
id: im01a001-rans-0001-0001-000000000001
status: stable
description: |
  Detects mass file encryption by monitoring for file creation/modification
  with known ransomware extensions. These extensions are appended to files
  after encryption by ransomware families. High volumes of such events in
  rapid succession is a critical indicator of active ransomware encryption.
references:
  - https://attack.mitre.org/techniques/T1486/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.impact
  - attack.t1486
logsource:
  category: file_event
  product: windows
detection:
  selection:
    TargetFilename|endswith:
      - '.encrypted'
      - '.locked'
      - '.crypt'
      - '.crypto'
      - '.enc'
      - '.crypted'
      - '.ransom'
      - '.wnry'
      - '.wcry'
      - '.cerber'
      - '.locky'
      - '.zepto'
      - '.thor'
      - '.aesir'
      - '.dharma'
      - '.phobos'
      - '.ryuk'
      - '.maze'
      - '.revil'
      - '.sodinokibi'
      - '.conti'
      - '.lockbit'
      - '.hive'
      - '.blackbasta'
      - '.play'
  filter_legit:
    Image|endswith:
      - '\VeraCrypt.exe'
      - '\BitLocker.exe'
      - '\gpg.exe'
  condition: selection and not filter_legit
falsepositives:
  - Legitimate encryption software (VeraCrypt, BitLocker, GPG)
  - Password-protected ZIP creation
level: critical

