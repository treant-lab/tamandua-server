---
title: Lumma Stealer - Browser SQLite Database Copying
id: lumma-ca01-bsql-copy-0001-000000000013
status: stable
description: |
  Detects Lumma Stealer accessing and copying browser SQLite databases
  containing credentials, cookies, and autofill data. Chrome, Edge, Firefox
  and other Chromium browsers store sensitive data in SQLite files that
  stealers copy and exfiltrate.
references:
  - https://attack.mitre.org/techniques/T1555/003/
author: Tamandua EDR
date: 2026/05/08
modified: 2026/05/08
tags:
  - attack.credential_access
  - attack.t1555.003
  - lumma_stealer
logsource:
  category: file_event
  product: windows
detection:
  selection_chrome:
    TargetFilename|contains:
      - '\Google\Chrome\User Data\Default\Login Data'
      - '\Google\Chrome\User Data\Default\Cookies'
      - '\Google\Chrome\User Data\Default\Web Data'
      - '\Google\Chrome\User Data\Default\History'
      - '\Google\Chrome\User Data\Local State'
  selection_edge:
    TargetFilename|contains:
      - '\Microsoft\Edge\User Data\Default\Login Data'
      - '\Microsoft\Edge\User Data\Default\Cookies'
      - '\Microsoft\Edge\User Data\Default\Web Data'
  selection_firefox:
    TargetFilename|contains:
      - '\Mozilla\Firefox\Profiles\'
    TargetFilename|endswith:
      - '\logins.json'
      - '\key4.db'
      - '\cookies.sqlite'
      - '\formhistory.sqlite'
  selection_opera:
    TargetFilename|contains:
      - '\Opera Software\Opera Stable\Login Data'
      - '\Opera Software\Opera GX Stable\Login Data'
  selection_brave:
    TargetFilename|contains:
      - '\BraveSoftware\Brave-Browser\User Data\Default\Login Data'
  filter_browser:
    Image|endswith:
      - '\chrome.exe'
      - '\msedge.exe'
      - '\firefox.exe'
      - '\brave.exe'
      - '\opera.exe'
      - '\vivaldi.exe'
  filter_system:
    Image|endswith:
      - '\MsMpEng.exe'
      - '\MpCmdRun.exe'
  condition: (selection_chrome or selection_edge or selection_firefox or selection_opera or selection_brave) and not (filter_browser or filter_system)
falsepositives:
  - Password managers accessing browser data
  - Browser migration utilities
level: critical

---
title: Lumma Stealer - DPAPI Credential Decryption
id: lumma-ca02-dpap-decr-0002-000000000014
status: stable
description: |
  Detects DPAPI (Data Protection API) usage for decrypting browser credentials.
  Lumma Stealer extracts the encrypted AES key from Chrome Local State and
  calls CryptUnprotectData to decrypt it, then uses it to decrypt stored
  passwords from the Login Data SQLite database.
references:
  - https://attack.mitre.org/techniques/T1555/003/
  - https://attack.mitre.org/techniques/T1555/004/
author: Tamandua EDR
date: 2026/05/08
modified: 2026/05/08
tags:
  - attack.credential_access
  - attack.t1555.003
  - attack.t1555.004
  - lumma_stealer
logsource:
  category: process_creation
  product: windows
detection:
  selection_ps:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'ProtectedData'
      - 'Unprotect'
      - 'CryptUnprotectData'
      - 'DPAPI'
      - '[System.Security.Cryptography.ProtectedData]::'
  selection_cmdline:
    CommandLine|contains:
      - 'encrypted_key'
      - 'Local State'
      - 'Login Data'
      - 'Cookies'
  condition: selection_ps or selection_cmdline
falsepositives:
  - Legitimate credential management tools
level: high

