---
title: Lumma Stealer - MSHTA Remote Script Execution
id: lumma-ex01-msht-remt-0001-000000000004
status: stable
description: |
  Detects mshta.exe executing scripts from remote URLs, a primary execution
  technique in Lumma Stealer campaigns. MSHTA allows execution of HTA files
  containing VBScript/JavaScript that can download and execute payloads while
  bypassing application whitelisting.
references:
  - https://attack.mitre.org/techniques/T1218/005/
  - https://lolbas-project.github.io/lolbas/Binaries/Mshta/
author: Tamandua EDR
date: 2026/05/08
modified: 2026/05/08
tags:
  - attack.execution
  - attack.defense_evasion
  - attack.t1218.005
  - lumma_stealer
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\mshta.exe'
  selection_remote:
    CommandLine|contains:
      - 'http://'
      - 'https://'
      - 'javascript:'
      - 'vbscript:'
      - 'about:hta'
  filter_about_blank:
    CommandLine|contains: 'about:blank'
  filter_local:
    CommandLine|re: '^"?[A-Za-z]:\\'
  condition: selection and selection_remote and not (filter_about_blank or filter_local)
falsepositives:
  - Legacy enterprise HTA applications
level: critical

---
title: Lumma Stealer - Base64 PowerShell Download Cradle
id: lumma-ex02-psdl-b64d-0002-000000000005
status: stable
description: |
  Detects Base64-encoded PowerShell download cradles commonly used by Lumma
  Stealer for initial payload delivery. These cradles use IEX/Invoke-Expression
  combined with DownloadString to fetch and execute second-stage payloads.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1105/
author: Tamandua EDR
date: 2026/05/08
modified: 2026/05/08
tags:
  - attack.execution
  - attack.t1059.001
  - attack.t1105
  - lumma_stealer
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_cradle:
    CommandLine|contains:
      - 'IEX'
      - 'Invoke-Expression'
      - '.Invoke('
    CommandLine|contains:
      - 'DownloadString'
      - 'DownloadData'
      - 'DownloadFile'
      - 'WebClient'
      - 'Invoke-WebRequest'
      - 'Invoke-RestMethod'
      - 'iwr '
      - 'irm '
      - 'wget '
      - 'curl '
  filter_legitimate:
    CommandLine|contains:
      - 'chocolatey'
      - 'nuget'
      - 'powershellgallery'
      - 'github.com/PowerShell'
  condition: selection and selection_cradle and not filter_legitimate
falsepositives:
  - Legitimate PowerShell module installation
  - IT automation scripts
level: high

---
title: Lumma Stealer - WMI Process Creation
id: lumma-ex03-wmic-proc-0003-000000000006
status: stable
description: |
  Detects WMI-based process creation used by Lumma Stealer for execution and
  lateral movement. WMI process call create allows spawning processes with
  SYSTEM context and can bypass application controls.
references:
  - https://attack.mitre.org/techniques/T1047/
  - https://attack.mitre.org/techniques/T1546/003/
author: Tamandua EDR
date: 2026/05/08
modified: 2026/05/08
tags:
  - attack.execution
  - attack.t1047
  - lumma_stealer
logsource:
  category: process_creation
  product: windows
detection:
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains:
      - 'process call create'
      - 'process call'
  selection_wmiprvse:
    ParentImage|endswith: '\wmiprvse.exe'
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\cmd.exe'
      - '\mshta.exe'
  condition: selection_wmic or selection_wmiprvse
falsepositives:
  - System administration scripts
  - SCCM deployments
level: high

---
title: Lumma Stealer - Certutil Download and Decode
id: lumma-ex04-cert-dldec-0004-000000000007
status: stable
description: |
  Detects certutil.exe abuse for downloading and decoding payloads. Lumma
  campaigns use certutil to download encoded payloads and decode them locally,
  bypassing network security controls looking for executable downloads.
references:
  - https://attack.mitre.org/techniques/T1140/
  - https://attack.mitre.org/techniques/T1105/
  - https://lolbas-project.github.io/lolbas/Binaries/Certutil/
author: Tamandua EDR
date: 2026/05/08
modified: 2026/05/08
tags:
  - attack.execution
  - attack.defense_evasion
  - attack.t1140
  - attack.t1105
  - lumma_stealer
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\certutil.exe'
  selection_download:
    CommandLine|contains:
      - '-urlcache'
      - '-split'
      - 'http://'
      - 'https://'
  selection_decode:
    CommandLine|contains:
      - '-decode'
      - '-decodehex'
  filter_legitimate:
    CommandLine|contains:
      - 'microsoft.com'
      - 'windows.com'
      - 'windowsupdate'
  condition: selection and (selection_download or selection_decode) and not filter_legitimate
falsepositives:
  - Certificate management operations
level: high

