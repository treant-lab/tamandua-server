# Tamandua EDR - Lumma Stealer Attack Chain Detection Rules
# Comprehensive detection for the full Lumma stealer kill chain
# From initial access (ClickFix/Fake CAPTCHA) through exfiltration

# =============================================================================
# PHASE 1: INITIAL ACCESS - ClickFix / Fake CAPTCHA Social Engineering
# =============================================================================

title: Lumma Stealer - Browser Spawning PowerShell with Encoded Command
id: lumma-ia01-brow-psen-0001-000000000001
status: stable
description: |
  Detects browsers spawning PowerShell with encoded commands, a key indicator of
  ClickFix/Fake CAPTCHA attacks. Lumma Stealer campaigns trick users into copying
  and pasting malicious commands from fake verification pages into Run dialog or
  PowerShell. The browser process tree shows direct child process creation.
references:
  - https://attack.mitre.org/techniques/T1204/001/
  - https://attack.mitre.org/techniques/T1059/001/
  - https://www.proofpoint.com/us/blog/threat-insight/security-brief-clickfix-social-engineering-technique-floods-threat-landscape
author: Tamandua EDR
author_pubkey: TamDevBounty1111111111111111111111111111111
date: 2026/05/08
modified: 2026/05/08
tags:
  - attack.initial_access
  - attack.execution
  - attack.t1204.001
  - attack.t1059.001
  - lumma_stealer
logsource:
  category: process_creation
  product: windows
detection:
  selection_parent:
    ParentImage|endswith:
      - '\chrome.exe'
      - '\msedge.exe'
      - '\firefox.exe'
      - '\brave.exe'
      - '\opera.exe'
      - '\vivaldi.exe'
      - '\iexplore.exe'
  selection_child:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - '-enc '
      - '-EncodedCommand'
      - '-e '
      - 'FromBase64String'
      - 'IEX'
      - 'Invoke-Expression'
  condition: selection_parent and selection_child
falsepositives:
  - Browser extensions executing legitimate PowerShell scripts
  - Web-based IT management tools
level: critical

---
title: Lumma Stealer - ClickFix Clipboard Execution Pattern
id: lumma-ia02-clip-exec-0002-000000000002
status: stable
description: |
  Detects the characteristic execution pattern of ClickFix attacks where users
  paste malicious commands from clipboard. These commands typically invoke
  mshta.exe or PowerShell with remote URLs, often using Windows+R Run dialog.
  The command chain frequently includes download cradles and scheduled tasks.
references:
  - https://attack.mitre.org/techniques/T1204/001/
  - https://attack.mitre.org/techniques/T1059/001/
author: Tamandua EDR
date: 2026/05/08
modified: 2026/05/08
tags:
  - attack.initial_access
  - attack.execution
  - attack.t1204.001
  - attack.t1059.001
  - lumma_stealer
logsource:
  category: process_creation
  product: windows
detection:
  selection_explorer_parent:
    ParentImage|endswith: '\explorer.exe'
  selection_execution:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\cmd.exe'
      - '\mshta.exe'
  selection_clickfix_pattern:
    CommandLine|contains:
      - 'mshta'
      - 'http'
      - 'hxxp'
      - 'bit.ly'
      - 'tinyurl'
      - 'cutt.ly'
      - 'rebrand.ly'
      - 't.co'
  selection_obfuscation:
    CommandLine|contains:
      - '^'
      - '%COMSPEC%'
      - 'cmd /c'
      - '/c start'
      - '/min'
  condition: selection_explorer_parent and selection_execution and (selection_clickfix_pattern or selection_obfuscation)
falsepositives:
  - Legitimate URL shortcuts executed from desktop
  - IT administration scripts
level: high

