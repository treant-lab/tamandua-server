title: Lumma Stealer - Fake CAPTCHA JavaScript Execution
id: lumma-ia03-capt-exec-0003-000000000003
status: stable
description: |
  Detects execution patterns associated with fake CAPTCHA pages that instruct
  users to run malicious code. These pages often use JavaScript to copy commands
  to clipboard with instructions to paste in Windows Run or PowerShell.
references:
  - https://attack.mitre.org/techniques/T1204/001/
