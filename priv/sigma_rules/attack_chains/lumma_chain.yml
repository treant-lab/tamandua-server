  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'verify'
      - 'captcha'
      - 'human'
      - 'robot'
      - 'check'
    CommandLine|contains:
      - 'powershell'
      - 'mshta'
      - 'wscript'
      - 'cscript'
  selection_download:
    CommandLine|contains:
      - 'http'
      - 'DownloadString'
      - 'DownloadFile'
      - 'WebClient'
