---
title: Lumma Stealer - Complete Attack Chain Detection
id: lumma-chain-full-0001-000000000029
status: experimental
description: |
  Detects the complete Lumma Stealer attack chain by correlating multiple
  stages: initial access via ClickFix, LOLBin execution, credential theft,
  and exfiltration. This rule provides high-confidence detection of active
  Lumma campaigns.
references:
  - https://attack.mitre.org/software/S1060/
author: Tamandua EDR
date: 2026/05/08
modified: 2026/05/08
tags:
  - attack.initial_access
  - attack.execution
  - attack.credential_access
  - attack.exfiltration
  - attack.t1204.001
  - attack.t1059.001
  - attack.t1555.003
  - attack.t1041
  - lumma_stealer
logsource:
  product: windows
  category: process_creation
detection:
  # Stage 1: Initial execution from browser or explorer
  stage1_initial:
    ParentImage|endswith:
      - '\chrome.exe'
      - '\msedge.exe'
      - '\firefox.exe'
      - '\explorer.exe'
    Image|endswith:
      - '\powershell.exe'
      - '\cmd.exe'
      - '\mshta.exe'
  # Stage 2: Download/execution
  stage2_execution:
    CommandLine|contains:
      - 'DownloadString'
      - 'DownloadFile'
      - 'Invoke-Expression'
      - 'IEX'
      - 'http'
  # Stage 3: Browser credential access
  stage3_credential:
    CommandLine|contains:
      - 'Login Data'
      - 'Cookies'
      - 'Chrome\User Data'
      - 'Edge\User Data'
      - 'wallet'
  # Stage 4: Archive and exfiltrate
  stage4_exfil:
    CommandLine|contains:
      - 'Compress-Archive'
      - '7z'
      - 'rar'
      - 'POST'
      - 'Upload'
  timeframe: 30m
  condition: stage1_initial | near stage2_execution | near stage3_credential | near stage4_exfil
falsepositives:
  - Very unlikely to have false positives with full chain match
level: critical

