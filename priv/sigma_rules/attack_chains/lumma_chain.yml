---
title: Lumma Stealer - VM/Sandbox Detection Checks
id: lumma-de01-vmdt-chck-0001-000000000008
status: stable
description: |
  Detects VM and sandbox detection techniques used by Lumma Stealer to evade
  analysis environments. The malware checks for VMware, VirtualBox, Sandboxie,
  and other virtualization indicators via WMI queries, registry keys, and
  process enumeration before executing malicious routines.
references:
  - https://attack.mitre.org/techniques/T1497/001/
  - https://attack.mitre.org/techniques/T1082/
author: Tamandua EDR
date: 2026/05/08
modified: 2026/05/08
tags:
  - attack.defense_evasion
  - attack.discovery
  - attack.t1497.001
  - attack.t1082
  - lumma_stealer
logsource:
  category: process_creation
  product: windows
detection:
  selection_wmi_vm:
    CommandLine|contains:
      - 'Win32_ComputerSystem'
      - 'Win32_BIOS'
      - 'Win32_BaseBoard'
    CommandLine|contains:
      - 'VMware'
      - 'VirtualBox'
      - 'VBOX'
      - 'Xen'
      - 'QEMU'
      - 'Virtual'
      - 'Hyper-V'
  selection_process_check:
    CommandLine|contains:
      - 'vmtoolsd'
      - 'vmwaretray'
      - 'VBoxService'
      - 'VBoxTray'
      - 'sandboxie'
      - 'SbieDll'
      - 'cuckoomon'
      - 'prl_tools'
      - 'vmusrvc'
      - 'vmsrvc'
      - 'xenservice'
  selection_registry_vm:
    CommandLine|contains:
      - 'HARDWARE\\DEVICEMAP\\Scsi'
      - 'SYSTEM\\CurrentControlSet\\Enum\\IDE'
      - 'SYSTEM\\CurrentControlSet\\Enum\\SCSI'
    CommandLine|contains:
      - 'VBOX'
      - 'VMWARE'
      - 'QEMU'
      - 'Virtual'
  condition: selection_wmi_vm or selection_process_check or selection_registry_vm
falsepositives:
  - System inventory tools
  - Legitimate virtualization management
level: medium

---
title: Lumma Stealer - Sleep Evasion Extended Delays
id: lumma-de02-slep-evad-0002-000000000009
status: stable
description: |
  Detects commands implementing extended sleep delays for sandbox evasion.
  Lumma Stealer uses various techniques to delay execution, hoping to outlast
  automated analysis sandbox timeouts (typically 2-5 minutes).
references:
  - https://attack.mitre.org/techniques/T1497/003/
author: Tamandua EDR
date: 2026/05/08
modified: 2026/05/08
tags:
  - attack.defense_evasion
  - attack.t1497.003
  - lumma_stealer
logsource:
  category: process_creation
  product: windows
detection:
  selection_timeout:
    Image|endswith: '\timeout.exe'
    CommandLine|re: '/t\s+[3-9][0-9]{2,}'  # 300+ seconds
  selection_ping:
    Image|endswith: '\ping.exe'
    CommandLine|re: '-n\s+[5-9][0-9]{2,}'  # 500+ ping count for delay
  selection_ps_sleep:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Start-Sleep'
      - 'sleep '
    CommandLine|re: '(Start-Sleep|sleep)\s+-?(s|Seconds)?\s*[3-9][0-9]{2,}'
  condition: selection_timeout or selection_ping or selection_ps_sleep
falsepositives:
  - Legitimate scripts with intentional delays
  - Network testing
level: medium

---
title: Lumma Stealer - Parent PID Spoofing Indicators
id: lumma-de03-ppid-spof-0003-000000000010
status: stable
description: |
  Detects indicators of Parent PID spoofing used by Lumma Stealer to masquerade
  malicious processes as children of legitimate system processes. This technique
  makes malware appear to spawn from trusted processes like explorer.exe or
  svchost.exe to evade behavioral detection.
references:
  - https://attack.mitre.org/techniques/T1134/004/
author: Tamandua EDR
date: 2026/05/08
modified: 2026/05/08
tags:
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1134.004
  - lumma_stealer
logsource:
  category: process_creation
  product: windows
detection:
  # Suspicious child from system process without expected arguments
  selection_system_anomaly:
    ParentImage|endswith:
      - '\svchost.exe'
      - '\services.exe'
      - '\lsass.exe'
      - '\csrss.exe'
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\cmd.exe'
      - '\mshta.exe'
      - '\wscript.exe'
  filter_svchost:
    ParentCommandLine|contains: '-k '
  # RuntimeBroker rarely spawns shells
  selection_runtimebroker:
    ParentImage|endswith: '\RuntimeBroker.exe'
    Image|endswith:
      - '\powershell.exe'
      - '\cmd.exe'
  condition: (selection_system_anomaly and not filter_svchost) or selection_runtimebroker
falsepositives:
  - Scheduled tasks with incorrect attribution
level: high

---
title: Lumma Stealer - Process Injection via WriteProcessMemory
id: lumma-de04-pinj-wpm-0004-000000000011
status: stable
description: |
  Detects potential process injection patterns used by Lumma Stealer to execute
  code in the context of legitimate processes. This includes hollowing, APC
  injection, and thread hijacking detected via suspicious API call patterns.
references:
  - https://attack.mitre.org/techniques/T1055/
author: Tamandua EDR
date: 2026/05/08
modified: 2026/05/08
tags:
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1055
  - lumma_stealer
logsource:
  category: process_creation
  product: windows
detection:
  selection_powershell_inject:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'VirtualAlloc'
      - 'VirtualAllocEx'
      - 'WriteProcessMemory'
      - 'CreateRemoteThread'
      - 'NtCreateThreadEx'
      - 'QueueUserAPC'
      - 'SetThreadContext'
      - 'ResumeThread'
  selection_rundll32:
    Image|endswith: '\rundll32.exe'
    CommandLine|re: '.*[A-Za-z0-9+/=]{50,}.*'  # Base64 encoded payload
  condition: selection_powershell_inject or selection_rundll32
falsepositives:
  - Security testing tools
  - Anti-cheat software
level: high

---
title: Lumma Stealer - AMSI Bypass Attempts
id: lumma-de05-amsi-byps-0005-000000000012
status: stable
description: |
  Detects AMSI (Antimalware Scan Interface) bypass techniques used by Lumma
  Stealer to disable PowerShell script block logging and malware scanning.
references:
  - https://attack.mitre.org/techniques/T1562/001/
author: Tamandua EDR
date: 2026/05/08
modified: 2026/05/08
tags:
  - attack.defense_evasion
  - attack.t1562.001
  - lumma_stealer
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'AmsiUtils'
      - 'amsiInitFailed'
      - 'amsiContext'
      - 'AmsiScanBuffer'
      - '[Ref].Assembly.GetType'
      - 'System.Management.Automation.AmsiUtils'
      - 'Bypass'
      - 'SetValue($null,$true)'
  condition: selection
falsepositives:
  - Security research
level: high

