---
title: Lumma Stealer - Cryptocurrency Wallet File Access
id: lumma-ca04-cwlt-accs-0004-000000000016
status: stable
description: |
  Detects access to desktop cryptocurrency wallet application data files.
  Lumma Stealer targets wallet.dat, *.keys, and configuration files from
  popular desktop wallets including Bitcoin Core, Electrum, Exodus, and Atomic.
references:
  - https://attack.mitre.org/techniques/T1005/
  - https://attack.mitre.org/techniques/T1552/001/
author: Tamandua EDR
date: 2026/05/08
modified: 2026/05/08
tags:
  - attack.credential_access
  - attack.collection
  - attack.t1005
  - attack.t1552.001
  - lumma_stealer
logsource:
  category: file_event
  product: windows
detection:
  selection_bitcoin:
    TargetFilename|contains:
      - '\Bitcoin\wallet.dat'
      - '\Bitcoin\wallets\'
  selection_electrum:
    TargetFilename|contains:
      - '\Electrum\wallets\'
      - '\Electrum-LTC\wallets\'
  selection_exodus:
    TargetFilename|contains:
      - '\Exodus\exodus.wallet\'
      - '\Exodus\exodus.conf.json'
  selection_atomic:
    TargetFilename|contains:
      - '\atomic\Local Storage\'
  selection_monero:
    TargetFilename|endswith:
      - '.keys'
    TargetFilename|contains:
      - '\Monero\wallets\'
  selection_generic:
    TargetFilename|endswith:
      - 'wallet.dat'
      - 'wallet.keys'
      - 'seed.seco'
  filter_legitimate:
    Image|endswith:
      - '\Electrum.exe'
      - '\Exodus.exe'
      - '\bitcoin-qt.exe'
      - '\atomic.exe'
