---
title: ISO/IMG File Mount and Execution
id: md07a001-iso-0007-0001-000000000001
status: stable
description: Detects execution from mounted ISO/IMG files
references:
  - https://attack.mitre.org/techniques/T1204/002/
author: Tamandua Security
date: 2025/05/08
tags:
  - attack.execution
  - attack.initial_access
  - attack.t1204.002
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    # Execution from removable/virtual drive
    Image|re: '^[D-Z]:\\\\'
    Image|endswith:
      - '.exe'
      - '.dll'
      - '.scr'
      - '.bat'
      - '.cmd'
      - '.lnk'
  filter:
    Image|startswith: 'C:\\'
  condition: selection and not filter
falsepositives:
  - Legitimate removable media usage
level: medium

