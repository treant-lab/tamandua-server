---
title: Office Macro Downloading Payload
id: md03a003-macro-0003-0003-000000000003
status: stable
description: Detects Office macros using network utilities to download payloads
references:
  - https://attack.mitre.org/techniques/T1105/
author: Tamandua Security
date: 2025/05/08
tags:
  - attack.command_and_control
  - attack.t1105
logsource:
  product: windows
  category: process_creation
detection:
  selection_parent:
    ParentImage|endswith:
      - '\WINWORD.EXE'
      - '\EXCEL.EXE'
      - '\POWERPNT.EXE'
  selection_download:
    - Image|endswith:
        - '\certutil.exe'
        - '\bitsadmin.exe'
        - '\curl.exe'
        - '\wget.exe'
    - CommandLine|contains:
        - 'DownloadString'
        - 'DownloadFile'
        - 'Invoke-WebRequest'
        - 'Net.WebClient'
        - 'XMLHTTP'
  condition: selection_parent and selection_download
falsepositives:
  - None expected
level: critical

