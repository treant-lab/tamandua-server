# Tamandua EDR - Malicious Document Detection Rules
# Detects execution of malicious LNK, PDF, Office macros, VBS, JS, ISO

title: Suspicious LNK File Execution
id: md01a001-lnk-0001-0001-000000000001
status: stable
description: Detects execution of LNK files that spawn suspicious processes
references:
  - https://attack.mitre.org/techniques/T1204/002/
author: Tamandua Security
date: 2025/05/08
tags:
  - attack.execution
  - attack.t1204.002
  - attack.initial_access
logsource:
  product: windows
  category: process_creation
detection:
  selection_parent:
    ParentCommandLine|contains: '.lnk'
  selection_child:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\rundll32.exe'
  condition: selection_parent and selection_child
falsepositives:
  - Legitimate application shortcuts with command line arguments
level: high

---
title: LNK File with Encoded Command
id: md01a002-lnk-0001-0002-000000000002
status: stable
description: Detects LNK files executing encoded PowerShell commands
references:
  - https://attack.mitre.org/techniques/T1059/001/
author: Tamandua Security
date: 2025/05/08
tags:
  - attack.execution
  - attack.t1059.001
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    ParentCommandLine|contains: '.lnk'
    CommandLine|contains:
      - '-enc'
      - '-e '
      - '-encodedcommand'
      - 'FromBase64'
      - 'hidden'
      - '-nop'
      - '-w hidden'
  condition: selection
falsepositives:
  - None expected
level: critical

---
title: PDF Reader Spawning Suspicious Process
id: md02a001-pdf-0002-0001-000000000001
status: stable
description: Detects PDF readers spawning command interpreters or script engines
references:
  - https://attack.mitre.org/techniques/T1204/002/
author: Tamandua Security
date: 2025/05/08
tags:
  - attack.execution
  - attack.t1204.002
logsource:
  product: windows
  category: process_creation
detection:
  selection_parent:
    ParentImage|endswith:
      - '\AcroRd32.exe'
      - '\Acrobat.exe'
      - '\FoxitReader.exe'
      - '\FoxitPhantomPDF.exe'
      - '\SumatraPDF.exe'
      - '\PDFXEdit.exe'
      - '\msedge.exe'
      - '\chrome.exe'
      - '\firefox.exe'
  selection_child:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\rundll32.exe'
      - '\certutil.exe'
  condition: selection_parent and selection_child
falsepositives:
  - PDF forms with legitimate automation
  - Browser-based PDF actions
level: high

