title: VBS File Execution from User Directory
id: md04a001-vbs-0004-0001-000000000001
status: stable
description: Detects VBScript execution from user-writable directories
references:
  - https://attack.mitre.org/techniques/T1059/005/
author: Tamandua Security
date: 2025/05/08
tags:
  - attack.execution
  - attack.t1059.005
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith:
      - '\wscript.exe'
      - '\cscript.exe'
    CommandLine|contains:
      - '\Users\'
      - '\Temp\'
      - '\AppData\'
      - '\Downloads\'
      - '\Desktop\'
    CommandLine|endswith:
      - '.vbs'
      - '.vbe'
  condition: selection
falsepositives:
  - Legitimate user scripts
level: medium

---
title: VBS Script with Network Activity
id: md04a002-vbs-0004-0002-000000000002
status: stable
description: Detects VBScript making network connections
references:
  - https://attack.mitre.org/techniques/T1059/005/
author: Tamandua Security
date: 2025/05/08
tags:
  - attack.execution
  - attack.t1059.005
  - attack.command_and_control
logsource:
  product: windows
  category: network_connection
detection:
  selection:
    Image|endswith:
      - '\wscript.exe'
      - '\cscript.exe'
    Initiated: 'true'
    DestinationPort:
      - 80
      - 443
      - 8080
      - 8443
  condition: selection
falsepositives:
  - Legitimate update scripts
level: high

