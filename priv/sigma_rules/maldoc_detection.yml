title: Office External Template Injection
id: md11a001-template-0011-0001-000000000001
status: stable
description: Detects Office loading external templates from network
references:
  - https://attack.mitre.org/techniques/T1221/
author: Tamandua Security
date: 2025/05/08
tags:
  - attack.defense_evasion
  - attack.t1221
logsource:
  product: windows
  category: network_connection
detection:
  selection:
    Image|endswith:
      - '\WINWORD.EXE'
      - '\EXCEL.EXE'
      - '\POWERPNT.EXE'
    DestinationPort:
      - 80
      - 443
      - 445
    Initiated: 'true'
  filter:
    DestinationHostname|contains:
      - 'microsoft.com'
      - 'office.com'
      - 'windows.com'
  condition: selection and not filter
falsepositives:
  - Legitimate cloud document features
level: medium
