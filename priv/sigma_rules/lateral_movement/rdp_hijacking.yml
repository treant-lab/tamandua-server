title: RDP Session Hijacking via Service Creation
id: lm04a002-rdph-0004-0002-000000000002
status: stable
description: |
  Detects the creation of a Windows service with a command that includes
  tscon.exe, which is used to hijack RDP sessions. Attackers create a service
  running as SYSTEM that executes tscon to connect to a target session.
references:
  - https://attack.mitre.org/techniques/T1563/002/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.lateral_movement
  - attack.t1563.002
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\sc.exe'
    CommandLine|contains|all:
      - 'create'
      - 'tscon'
  filter_none:
    CommandLine: ''
  condition: selection and not filter_none
falsepositives:
  - Extremely unlikely in legitimate environments
level: critical

