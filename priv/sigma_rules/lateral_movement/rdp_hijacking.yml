title: RDP Tunneling via Port Forwarding
id: lm04a003-rdph-0004-0003-000000000003
status: stable
description: |
  Detects potential RDP tunneling through SSH port forwarding or netsh portproxy,
  which are used to forward RDP traffic through compromised hosts to pivot
  deeper into the network.
references:
  - https://attack.mitre.org/techniques/T1021/001/
  - https://attack.mitre.org/techniques/T1572/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.lateral_movement
  - attack.t1021.001
  - attack.t1572
logsource:
  category: process_creation
  product: windows
detection:
  selection_ssh:
    Image|endswith:
      - '\ssh.exe'
      - '\plink.exe'
    CommandLine|contains:
      - '-L '
      - '-R '
      - '3389'
  selection_netsh:
    Image|endswith: '\netsh.exe'
    CommandLine|contains|all:
      - 'portproxy'
      - '3389'
  filter_admin:
    User|contains: 'SYSTEM'
    ParentImage|endswith: '\services.exe'
  condition: (selection_ssh or selection_netsh) and not filter_admin
falsepositives:
  - Legitimate SSH tunneling by developers or administrators
  - Network port redirection for testing
level: high
