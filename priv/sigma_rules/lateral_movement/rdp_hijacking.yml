title: RDP Session Hijacking via Tscon
id: lm04a001-rdph-0004-0001-000000000001
status: stable
description: |
  Detects RDP session hijacking using tscon.exe. An attacker with SYSTEM
  privileges can use tscon to connect to another user's RDP session without
  needing their password. This is a well-known post-exploitation technique
  for accessing sessions belonging to higher-privileged users.
references:
  - https://attack.mitre.org/techniques/T1563/002/
  - https://medium.com/@networksecurity/rdp-hijacking-how-to-hijack-rds-and-remoteapp-sessions-transparently-to-move-through-an-organization-22f5cb0f0a4a
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.lateral_movement
  - attack.t1563.002
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\tscon.exe'
    CommandLine|contains: '/dest:'
  filter_legit:
    ParentImage|endswith: '\termsrv.exe'
  condition: selection and not filter_legit
falsepositives:
  - Legitimate RDP session management by administrators
level: critical

