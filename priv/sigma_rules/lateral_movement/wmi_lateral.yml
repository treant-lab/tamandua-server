title: WMI Remote Process Creation
id: lm02a001-wmil-0002-0001-000000000001
status: stable
description: |
  Detects WMI-based lateral movement where wmic.exe is used with /node: to
  target a remote host and create a process. This is a common post-exploitation
  technique used by frameworks like CrackMapExec, Impacket, and manual attackers.
references:
  - https://attack.mitre.org/techniques/T1047/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.lateral_movement
  - attack.execution
  - attack.t1047
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - '/node:'
      - 'process'
      - 'call'
      - 'create'
  filter_local:
    CommandLine|contains:
      - '/node:localhost'
      - '/node:127.0.0.1'
  condition: selection and not filter_local
falsepositives:
  - Legitimate remote WMI management by administrators
  - Enterprise monitoring tools using WMI queries
level: high

