title: File Copy to Remote Admin Share
id: lm06a002-smbr-0006-0002-000000000002
status: stable
description: |
  Detects file copy operations targeting remote administrative shares using
  copy, xcopy, robocopy, or PowerShell. Attackers copy payloads or tools to
  remote hosts via C$ or ADMIN$ shares before executing them.
references:
  - https://attack.mitre.org/techniques/T1021/002/
  - https://attack.mitre.org/techniques/T1570/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.lateral_movement
  - attack.t1021.002
  - attack.t1570
logsource:
  category: process_creation
  product: windows
detection:
  selection_copy:
    Image|endswith:
      - '\cmd.exe'
      - '\xcopy.exe'
      - '\robocopy.exe'
    CommandLine|contains:
      - '\\\\*\\C$'
      - '\\\\*\\ADMIN$'
  selection_ps:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Copy-Item'
      - 'cp '
    CommandLine|contains:
      - '\\\\*\\C$'
      - '\\\\*\\ADMIN$'
  filter_sccm:
    ParentImage|contains: '\CCM\'
  condition: (selection_copy or selection_ps) and not filter_sccm
falsepositives:
  - SCCM package deployment
  - Legitimate file distribution by IT teams
level: high
