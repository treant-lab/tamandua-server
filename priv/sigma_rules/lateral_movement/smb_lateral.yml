title: SMB Administrative Share Access
id: lm06a001-smbr-0006-0001-000000000001
status: stable
description: |
  Detects access to Windows administrative shares (C$, ADMIN$, IPC$) over the
  network, which is commonly used for lateral movement to deploy payloads,
  execute tools, or access files on remote systems.
references:
  - https://attack.mitre.org/techniques/T1021/002/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.lateral_movement
  - attack.t1021.002
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - '\\C$'
      - '\\ADMIN$'
      - '\\IPC$'
  selection_net:
    Image|endswith:
      - '\net.exe'
      - '\net1.exe'
    CommandLine|contains:
      - 'use \\\\'
  filter_system:
    User|contains: 'SYSTEM'
    ParentImage|endswith:
      - '\services.exe'
      - '\svchost.exe'
  condition: (selection or selection_net) and not filter_system
falsepositives:
  - Legitimate network file shares access by administrators
  - Group Policy processing
  - Software deployment systems (SCCM, PDQ)
level: medium

