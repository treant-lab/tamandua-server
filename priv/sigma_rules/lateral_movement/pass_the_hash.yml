title: Pass-the-Hash via Sekurlsa PTH
id: lm07a001-pthh-0007-0001-000000000001
status: stable
description: |
  Detects Pass-the-Hash attacks performed using Mimikatz sekurlsa::pth module
  or similar tools. This technique allows an attacker to authenticate to remote
  systems using NTLM hash values without knowing the plaintext password.
references:
  - https://attack.mitre.org/techniques/T1550/002/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.lateral_movement
  - attack.t1550.002
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'sekurlsa::pth'
      - '/ntlm:'
      - 'pth '
  selection_impacket:
    CommandLine|contains:
      - 'psexec.py'
      - 'wmiexec.py'
      - 'smbexec.py'
      - 'atexec.py'
    CommandLine|contains: '-hashes'
  filter_test:
    ParentImage|contains: '\pentest\'
  condition: (selection or selection_impacket) and not filter_test
falsepositives:
  - Authorized penetration testing
level: critical

---
title: Pass-the-Hash Logon Type 9 Detection
id: lm07a002-pthh-0007-0002-000000000002
status: stable
description: |
  Detects NTLM logon events with LogonType 9 (NewCredentials) combined with
  Negotiate authentication, which is the pattern generated by Pass-the-Hash
  tools like Mimikatz PTH, Impacket, and CrackMapExec.
references:
  - https://attack.mitre.org/techniques/T1550/002/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.lateral_movement
  - attack.t1550.002
logsource:
  category: security
  product: windows
detection:
  selection:
    EventID: 4624
    LogonType: '9'
    AuthenticationPackageName: 'Negotiate'
    LogonProcessName: 'seclogo'
  filter_system:
    TargetUserName|endswith: '$'
  condition: selection and not filter_system
falsepositives:
  - RunAs with netonly flag (/netonly)
  - Legitimate credential delegation scenarios
level: high
