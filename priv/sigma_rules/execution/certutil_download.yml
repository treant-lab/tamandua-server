title: Certutil Base64 Decode
id: ex04a002-cert-0004-0002-000000000002
status: stable
description: |
  Detects certutil.exe being used to decode Base64-encoded files. Attackers
  encode payloads in Base64 and use certutil -decode to reconstruct the
  binary, bypassing network-level detection and content filters.
references:
  - https://attack.mitre.org/techniques/T1140/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.defense_evasion
  - attack.t1140
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\certutil.exe'
    CommandLine|contains:
      - '-decode'
      - '/decode'
      - '-decodehex'
      - '/decodehex'
  filter_system:
    User|contains: 'SYSTEM'
    ParentImage|endswith: '\svchost.exe'
  condition: selection and not filter_system
falsepositives:
  - Legitimate certificate encoding/decoding operations
level: medium
