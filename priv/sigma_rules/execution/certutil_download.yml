title: Certutil File Download
id: ex04a001-cert-0004-0001-000000000001
status: stable
description: |
  Detects use of certutil.exe to download files from the internet. Certutil
  is a legitimate Windows certificate utility that can be abused to download
  arbitrary files via its -urlcache parameter. This is a common LOLBin
  technique used to download second-stage payloads.
references:
  - https://attack.mitre.org/techniques/T1105/
  - https://lolbas-project.github.io/lolbas/Binaries/Certutil/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.execution
  - attack.command_and_control
  - attack.t1105
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\certutil.exe'
    CommandLine|contains:
      - '-urlcache'
      - '/urlcache'
      - '-verifyctl'
      - '/verifyctl'
  selection_download:
    CommandLine|contains:
      - 'http://'
      - 'https://'
      - '-f '
      - '/f '
      - '-split'
  filter_legit:
    CommandLine|contains:
      - 'microsoft.com'
      - 'windowsupdate.com'
      - 'crl.'
  condition: selection and selection_download and not filter_legit
falsepositives:
  - Legitimate certificate revocation list (CRL) downloads
  - Certificate validation operations
level: high

