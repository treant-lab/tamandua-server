title: BITSAdmin File Download and Execution
id: ex05a001-bits-0005-0001-000000000001
status: stable
description: |
  Detects BITSAdmin.exe used to download or execute files. BITS (Background
  Intelligent Transfer Service) is a Windows component for asynchronous file
  transfers. Adversaries abuse bitsadmin.exe to download payloads stealthily,
  as BITS transfers persist across reboots and can use system proxy settings.
references:
  - https://attack.mitre.org/techniques/T1197/
  - https://lolbas-project.github.io/lolbas/Binaries/Bitsadmin/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.execution
  - attack.defense_evasion
  - attack.persistence
  - attack.t1197
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\bitsadmin.exe'
    CommandLine|contains:
      - '/transfer'
      - '/create'
      - '/addfile'
      - '/SetNotifyCmdLine'
      - '/resume'
  selection_url:
    CommandLine|contains:
      - 'http://'
      - 'https://'
  filter_update:
    CommandLine|contains:
      - 'windowsupdate'
      - 'microsoft.com'
      - 'officecdn'
  condition: selection and selection_url and not filter_update
falsepositives:
  - Legitimate software distribution using BITS
  - Windows Update operations
level: high

