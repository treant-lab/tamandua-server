title: BITSAdmin SetNotifyCmdLine Persistence
id: ex05a002-bits-0005-0002-000000000002
status: stable
description: |
  Detects BITSAdmin jobs configured with SetNotifyCmdLine, which executes a
  command upon job completion. This provides persistence because BITS jobs
  survive reboots and the notification command runs with the job owner's
  privileges.
references:
  - https://attack.mitre.org/techniques/T1197/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.persistence
  - attack.t1197
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\bitsadmin.exe'
    CommandLine|contains: '/SetNotifyCmdLine'
  filter_system:
    CommandLine|contains: '\Windows\System32\'
  condition: selection and not filter_system
falsepositives:
  - Legitimate BITS job notifications
level: high
