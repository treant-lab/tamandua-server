title: Remote System Discovery via Ping
id: 4a014aee-0123-a456-789a-456789012345
status: experimental
description: Detects network host discovery via ping sweep
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\ping.exe'
        CommandLine|re: '\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}\\.'
    filter:
        CommandLine|contains:
            - 'localhost'
            - '127.0.0.1'
    condition: selection and not filter
falsepositives:
    - Legitimate network testing
level: low
tags:
    - attack.discovery
    - attack.t1018
