title: Active Directory User Enumeration
id: f5bc9bff-bcde-5f01-2345-901234567890
status: experimental
description: Detects AD user enumeration activities
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection_net:
        Image|endswith:
            - '\net.exe'
            - '\net1.exe'
        CommandLine|contains:
            - 'user /domain'
            - 'group /domain'
            - 'localgroup'
    selection_dsquery:
        Image|endswith: '\dsquery.exe'
        CommandLine|contains:
            - 'user'
            - 'group'
            - 'computer'
    selection_ps:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Get-ADUser'
            - 'Get-ADGroup'
            - 'Get-ADComputer'
            - 'Get-DomainUser'
    condition: selection_net or selection_dsquery or selection_ps
falsepositives:
    - Legitimate administrative tasks
level: low
tags:
    - attack.discovery
    - attack.t1087.002

