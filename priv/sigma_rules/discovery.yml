    - Legitimate administrative tasks
level: low
tags:
    - attack.discovery
    - attack.t1082

---
title: Network Share Discovery
id: d39a79dd-9abc-3def-0123-789012345678
status: experimental
description: Detects network share enumeration
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection_net:
        Image|endswith: '\net.exe'
        CommandLine|contains:
            - 'share'
            - 'view'
    selection_net1:
        Image|endswith: '\net1.exe'
        CommandLine|contains:
            - 'share'
            - 'view'
    condition: selection_net or selection_net1
falsepositives:
    - Legitimate network administration
level: low
tags:
    - attack.discovery
    - attack.t1135

---
title: Domain Trust Discovery
id: e4ab8aee-abcd-4ef0-1234-890123456789
status: experimental
description: Detects domain trust enumeration
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection_nltest:
        Image|endswith: '\nltest.exe'
        CommandLine|contains:
            - '/domain_trusts'
            - '/dclist:'
            - '/dsgetdc:'
    selection_dsquery:
        Image|endswith: '\dsquery.exe'
        CommandLine|contains: 'trust'
    selection_ps:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Get-ADTrust'
            - 'Get-DomainTrust'
    condition: selection_nltest or selection_dsquery or selection_ps
falsepositives:
    - Legitimate domain administration
level: medium
tags:
    - attack.discovery
    - attack.t1482

