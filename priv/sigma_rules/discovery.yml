title: System Information Discovery via Systeminfo
id: c28968cc-89ab-2cde-f012-678901234567
status: experimental
description: Detects system information gathering via systeminfo
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\systeminfo.exe'
