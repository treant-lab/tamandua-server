title: Network Configuration Discovery
id: 28ef2ecc-ef01-8234-5678-234567890123
status: experimental
description: Detects network configuration enumeration
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection_ipconfig:
        Image|endswith: '\ipconfig.exe'
        CommandLine|contains: '/all'
    selection_netsh:
        Image|endswith: '\netsh.exe'
        CommandLine|contains:
            - 'interface'
            - 'firewall'
            - 'advfirewall'
    selection_arp:
        Image|endswith: '\arp.exe'
        CommandLine|contains: '-a'
    selection_route:
        Image|endswith: '\route.exe'
        CommandLine|contains: 'print'
    condition: selection_ipconfig or selection_netsh or selection_arp or selection_route
falsepositives:
    - Legitimate network troubleshooting
level: informational
tags:
    - attack.discovery
    - attack.t1016

