title: Security Software Discovery
id: 06cd0caa-cdef-6012-3456-012345678901
status: experimental
description: Detects security software enumeration
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection_wmic:
        Image|endswith: '\wmic.exe'
        CommandLine|contains:
            - 'AntiVirusProduct'
            - 'FirewallProduct'
            - '/Namespace:\\\\root\\SecurityCenter2'
    selection_ps:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Get-MpComputerStatus'
            - 'Get-MpThreat'
            - 'root\\SecurityCenter2'
    condition: selection_wmic or selection_ps
falsepositives:
    - Security assessments
level: medium
tags:
    - attack.discovery
    - attack.t1518.001

