title: OAuth/SAML Phishing Consent Flow
id: b2c3d4e5-0002-recon-0005-000000000005
status: stable
description: Detects potential OAuth consent phishing or SAML-based credential harvesting
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1598/001/
logsource:
    category: network_connection
    product: any
detection:
    selection_oauth_endpoints:
        DestinationHostname|contains:
            - 'oauth'
            - 'authorize'
            - 'consent'
            - 'saml'
            - 'adfs'
    selection_suspicious_domains:
        DestinationHostname|contains:
            - '.xyz'
            - '.top'
            - '.work'
            - '.click'
            - '.link'
            - '.info'
            - 'auth-'
            - '-auth.'
    condition: selection_oauth_endpoints and selection_suspicious_domains
falsepositives:
    - Legitimate OAuth applications
    - Third-party identity providers
level: medium
tags:
    - attack.reconnaissance
    - attack.t1598.001

