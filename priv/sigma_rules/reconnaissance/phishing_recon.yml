title: HTML Smuggling with Credential Form
id: b2c3d4e5-0002-recon-0002-000000000002
status: stable
description: Detects HTML files containing potential credential harvesting forms
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1598/003/
logsource:
    category: file_event
    product: windows
detection:
    selection_html_creation:
        TargetFilename|endswith:
            - '.html'
            - '.htm'
            - '.hta'
        TargetFilename|contains:
            - '\Downloads\'
            - '\Temp\'
            - '\AppData\Local\Temp\'
    selection_by_browser:
        Image|endswith:
            - '\chrome.exe'
            - '\firefox.exe'
            - '\msedge.exe'
            - '\iexplore.exe'
    condition: selection_html_creation and selection_by_browser
falsepositives:
    - Legitimate web downloads
    - Web development
level: low
tags:
    - attack.reconnaissance
    - attack.t1598.003
    - attack.initial_access
    - attack.t1566.001

