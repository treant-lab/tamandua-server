title: Suspicious Browser Form Submission Detection
id: b2c3d4e5-0002-recon-0003-000000000003
status: stable
description: Detects browser network traffic to common phishing/credential harvesting domains
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1598/001/
logsource:
    category: dns_query
    product: any
detection:
    selection_phishing_indicators:
        query|contains:
            - '-login'
            - 'login-'
            - 'secure-login'
            - 'account-verify'
            - 'verify-account'
            - 'signin-'
            - '-signin'
            - 'update-password'
            - 'password-reset'
            - 'credential'
            - 'authenticate-'
    filter_legitimate:
        query|endswith:
            - 'microsoft.com'
            - 'google.com'
            - 'amazon.com'
            - 'apple.com'
            - 'github.com'
            - 'gitlab.com'
            - 'okta.com'
            - 'auth0.com'
    condition: selection_phishing_indicators and not filter_legitimate
falsepositives:
    - Legitimate login pages
    - Password management services
level: medium
tags:
    - attack.reconnaissance
    - attack.t1598.001
    - attack.t1598.003

