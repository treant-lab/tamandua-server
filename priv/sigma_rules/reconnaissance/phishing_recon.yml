title: Email Attachment Opens Browser to External URL
id: b2c3d4e5-0002-recon-0006-000000000006
status: stable
description: Detects email attachments that open browser to external URLs for credential harvesting
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1598/003/
logsource:
    category: process_creation
    product: windows
detection:
    selection_office:
        ParentImage|endswith:
            - '\WINWORD.EXE'
            - '\EXCEL.EXE'
            - '\POWERPNT.EXE'
            - '\OUTLOOK.EXE'
    selection_browser:
        Image|endswith:
            - '\chrome.exe'
            - '\firefox.exe'
            - '\msedge.exe'
            - '\iexplore.exe'
        CommandLine|contains:
            - 'http://'
            - 'https://'
    filter_legitimate:
        CommandLine|contains:
            - 'microsoft.com'
            - 'office.com'
            - 'sharepoint.com'
            - 'onedrive.com'
    condition: selection_office and selection_browser and not filter_legitimate
falsepositives:
    - Legitimate document hyperlinks
    - Corporate documents with external references
level: medium
tags:
    - attack.reconnaissance
    - attack.t1598.003
    - attack.initial_access
    - attack.t1566.002

