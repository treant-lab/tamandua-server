title: Email Client Spawning Suspicious Process
id: b2c3d4e5-0002-recon-0004-000000000004
status: stable
description: Detects email clients spawning processes that could indicate phishing attack success
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1598/002/
logsource:
    category: process_creation
    product: windows
detection:
    selection_email_parent:
        ParentImage|endswith:
            - '\OUTLOOK.EXE'
            - '\thunderbird.exe'
            - '\Mail.exe'
    selection_suspicious_child:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
            - '\regsvr32.exe'
            - '\rundll32.exe'
            - '\certutil.exe'
    condition: selection_email_parent and selection_suspicious_child
falsepositives:
    - Legitimate email automation
    - IT administration via email scripts
level: high
tags:
    - attack.reconnaissance
    - attack.t1598.002
    - attack.initial_access
    - attack.t1566.001
    - attack.execution
    - attack.t1059

