title: Spearphishing Attachment with Credential Harvesting
id: b2c3d4e5-0002-recon-0001-000000000001
status: stable
description: Detects Office documents with macros that may harvest credentials or system information
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1598/002/
logsource:
    category: process_creation
    product: windows
detection:
    selection_office_parent:
        ParentImage|endswith:
            - '\WINWORD.EXE'
            - '\EXCEL.EXE'
            - '\POWERPNT.EXE'
            - '\OUTLOOK.EXE'
    selection_recon_child:
        Image|endswith:
            - '\whoami.exe'
            - '\hostname.exe'
            - '\systeminfo.exe'
            - '\ipconfig.exe'
            - '\net.exe'
            - '\nltest.exe'
        CommandLine|contains:
            - 'user'
            - 'domain'
            - '/all'
    selection_powershell_child:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Get-ADUser'
            - 'Get-WmiObject'
            - 'Get-ComputerInfo'
            - 'Get-LocalUser'
            - 'Get-NetIPAddress'
            - 'Invoke-WebRequest'
            - 'System.Net.WebClient'
    condition: selection_office_parent and (selection_recon_child or selection_powershell_child)
falsepositives:
    - Legitimate Office automation
    - IT administration scripts embedded in documents
level: high
tags:
    - attack.reconnaissance
    - attack.t1598.002
    - attack.execution
    - attack.t1204.002

