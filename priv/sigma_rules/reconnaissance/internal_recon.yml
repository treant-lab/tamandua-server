title: External IP Address Discovery
id: a1b2c3d4-0001-recon-0004-000000000004
status: stable
description: Detects attempts to discover external/public IP address through web services
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1590/005/
logsource:
    category: dns_query
    product: windows
detection:
    selection:
        query|contains:
            - 'ipinfo.io'
            - 'ifconfig.me'
            - 'ipecho.net'
            - 'icanhazip.com'
            - 'checkip.amazonaws.com'
            - 'api.ipify.org'
            - 'myexternalip.com'
            - 'whatismyip'
            - 'ip-api.com'
            - 'ipapi.co'
    condition: selection
falsepositives:
    - VPN applications
    - Network troubleshooting
    - Legitimate geographic services
level: low
tags:
    - attack.reconnaissance
    - attack.t1590.005

---
title: Inbound Port Scan Detection
id: a1b2c3d4-0001-recon-0005-000000000005
status: stable
description: Detects potential inbound port scanning based on connection patterns
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1595/001/
logsource:
    category: network_connection
    product: any
detection:
    selection:
        direction: 'inbound'
        state: 'attempt'
    timeframe: 60s
    condition: selection | count(DestinationPort) by SourceIp > 20
falsepositives:
    - Vulnerability scanners
    - Network monitoring tools
    - Load balancers
level: medium
tags:
    - attack.reconnaissance
    - attack.t1595
    - attack.t1595.001

