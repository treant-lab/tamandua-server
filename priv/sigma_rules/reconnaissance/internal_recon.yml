title: Internal Network Reconnaissance via Native Commands
id: a1b2c3d4-0001-recon-0001-000000000001
status: stable
description: Detects execution of commands commonly used for internal network reconnaissance
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1590/
    - https://attack.mitre.org/techniques/T1592/
logsource:
    category: process_creation
    product: windows
detection:
    selection_net_discovery:
        Image|endswith:
            - '\ipconfig.exe'
            - '\nslookup.exe'
            - '\netstat.exe'
            - '\arp.exe'
            - '\route.exe'
        CommandLine|contains:
            - '/all'
            - '-a'
            - '-n'
            - '-rn'
    selection_wmi_system:
        Image|endswith: '\wmic.exe'
        CommandLine|contains:
            - 'nic'
            - 'nicconfig'
            - 'computersystem'
            - 'os get'
    selection_powershell_net:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Get-NetIPAddress'
            - 'Get-NetAdapter'
            - 'Get-NetRoute'
            - 'Get-DnsClientServerAddress'
            - 'Test-NetConnection'
            - 'Get-NetTCPConnection'
            - 'Get-NetUDPEndpoint'
    condition: selection_net_discovery or selection_wmi_system or selection_powershell_net
falsepositives:
    - System administrators
    - Network troubleshooting tools
    - Legitimate IT automation scripts
level: low
tags:
    - attack.reconnaissance
    - attack.t1590
    - attack.t1590.004
    - attack.t1590.005
    - attack.t1592

