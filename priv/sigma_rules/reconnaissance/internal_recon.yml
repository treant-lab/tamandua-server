title: LDAP Reconnaissance Query
id: a1b2c3d4-0001-recon-0008-000000000008
status: stable
description: Detects LDAP queries commonly used for Active Directory reconnaissance
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1590/001/
logsource:
    category: network_connection
    product: any
detection:
    selection:
        DestinationPort:
            - 389
            - 636
            - 3268
            - 3269
        direction: 'outbound'
    filter_known:
        DestinationIp|startswith:
            - '10.'
            - '172.16.'
            - '172.17.'
            - '172.18.'
            - '172.19.'
            - '172.20.'
            - '172.21.'
            - '172.22.'
            - '172.23.'
            - '172.24.'
            - '172.25.'
            - '172.26.'
            - '172.27.'
            - '172.28.'
            - '172.29.'
            - '172.30.'
            - '172.31.'
            - '192.168.'
    condition: selection and not filter_known
falsepositives:
    - Legitimate LDAP queries to external identity providers
    - Cloud-based AD services
level: medium
tags:
    - attack.reconnaissance
    - attack.t1590.001
