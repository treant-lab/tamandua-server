title: DNS Zone Transfer Attempt
id: a1b2c3d4-0001-recon-0007-000000000007
status: stable
description: Detects DNS zone transfer (AXFR) queries which can be used for reconnaissance
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1590/002/
logsource:
    category: dns_query
    product: any
detection:
    selection:
        query_type: 'AXFR'
    condition: selection
falsepositives:
    - Legitimate secondary DNS servers
    - DNS administration
level: high
tags:
    - attack.reconnaissance
    - attack.t1590.002

