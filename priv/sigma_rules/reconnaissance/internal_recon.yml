title: Linux Network Reconnaissance Commands
id: a1b2c3d4-0001-recon-0006-000000000006
status: stable
description: Detects execution of network reconnaissance commands on Linux systems
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1590/
logsource:
    category: process_creation
    product: linux
detection:
    selection_net_tools:
        Image|endswith:
            - '/ifconfig'
            - '/ip'
            - '/ss'
            - '/netstat'
            - '/route'
            - '/arp'
    selection_net_args:
        CommandLine|contains:
            - 'addr show'
            - 'route show'
            - 'neigh show'
            - '-tulpn'
            - '-antup'
    selection_dig_nslookup:
        Image|endswith:
            - '/dig'
            - '/nslookup'
            - '/host'
        CommandLine|contains:
            - 'axfr'
            - 'any'
    selection_nmap:
        Image|endswith: '/nmap'
    condition: selection_net_tools or selection_net_args or selection_dig_nslookup or selection_nmap
falsepositives:
    - System administrators
    - Network monitoring
level: low
tags:
    - attack.reconnaissance
    - attack.t1590

