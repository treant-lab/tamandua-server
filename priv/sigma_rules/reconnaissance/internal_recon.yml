title: Active Directory Reconnaissance Commands
id: a1b2c3d4-0001-recon-0003-000000000003
status: stable
description: Detects execution of commands used to enumerate Active Directory information
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1590/001/
logsource:
    category: process_creation
    product: windows
detection:
    selection_net_ad:
        Image|endswith: '\net.exe'
        CommandLine|contains:
            - 'user /domain'
            - 'group /domain'
            - 'localgroup'
            - 'accounts /domain'
    selection_nltest:
        Image|endswith: '\nltest.exe'
        CommandLine|contains:
            - '/dclist'
            - '/dsgetdc'
            - '/domain_trusts'
            - '/trusted_domains'
    selection_dsquery:
        Image|endswith:
            - '\dsquery.exe'
            - '\dsget.exe'
    selection_powershell_ad:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Get-ADUser'
            - 'Get-ADGroup'
            - 'Get-ADComputer'
            - 'Get-ADDomain'
            - 'Get-ADDomainController'
            - 'Get-ADTrust'
            - 'Get-ADForest'
    selection_adfind:
        Image|endswith: '\adfind.exe'
    condition: selection_net_ad or selection_nltest or selection_dsquery or selection_powershell_ad or selection_adfind
falsepositives:
    - Domain administrators
    - Legitimate IT automation
level: medium
tags:
    - attack.reconnaissance
    - attack.t1590.001
    - attack.discovery
    - attack.t1087.002

