title: Host Information Gathering via WMI
id: a1b2c3d4-0001-recon-0002-000000000002
status: stable
description: Detects WMI queries commonly used to gather host information during reconnaissance
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1592/
logsource:
    category: process_creation
    product: windows
detection:
    selection_wmi:
        Image|endswith: '\wmic.exe'
        CommandLine|contains:
            - 'cpu get'
            - 'memorychip'
            - 'diskdrive'
            - 'baseboard'
            - 'bios get'
            - 'product get'
            - 'qfe'
            - 'logicaldisk'
    selection_systeminfo:
        Image|endswith: '\systeminfo.exe'
    selection_powershell_host:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Get-ComputerInfo'
            - 'Get-WmiObject Win32_'
            - 'Get-CimInstance Win32_'
            - 'Win32_ComputerSystem'
            - 'Win32_OperatingSystem'
            - 'Win32_Processor'
            - 'Win32_PhysicalMemory'
    condition: selection_wmi or selection_systeminfo or selection_powershell_host
falsepositives:
    - System inventory tools
    - IT asset management
    - Legitimate administrative scripts
level: low
tags:
    - attack.reconnaissance
    - attack.t1592
    - attack.t1592.001
    - attack.t1592.002
    - attack.discovery
    - attack.t1082

