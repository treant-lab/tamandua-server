title: DNS Tunneling via Known Tools
id: cc01a001-dnst-0001-0001-000000000001
status: stable
description: |
  Detects execution of known DNS tunneling tools including dnscat2, iodine,
  dns2tcp, and Cobalt Strike DNS beacon. DNS tunneling encapsulates arbitrary
  data within DNS queries and responses, enabling bidirectional C2
  communication that bypasses most network firewalls.
references:
  - https://attack.mitre.org/techniques/T1071/004/
  - https://attack.mitre.org/techniques/T1572/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.command_and_control
  - attack.t1071.004
  - attack.t1572
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'dnscat'
      - 'iodine'
      - 'dns2tcp'
      - 'dnsexfiltrator'
      - 'Invoke-DNSTunnel'
      - 'DNSteal'
      - 'dnscat2'
  filter_pentest:
    ParentImage|contains: '\pentest\'
  condition: selection and not filter_pentest
falsepositives:
  - Authorized penetration testing
level: critical

---
title: DNS Tunneling via Abnormal Query Patterns
id: cc01a002-dnst-0001-0002-000000000002
status: stable
description: |
  Detects DNS tunneling activity based on high-entropy subdomain labels and
  CNAME/TXT/NULL record type queries, which are commonly used by DNS
  tunneling tools for data encapsulation.
references:
  - https://attack.mitre.org/techniques/T1071/004/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.command_and_control
  - attack.t1071.004
logsource:
  category: dns_query
  product: windows
detection:
  selection_type:
    QueryType:
      - 'TXT'
      - 'NULL'
      - 'CNAME'
      - 'MX'
  selection_entropy:
    QueryName|re: '[a-z0-9]{20,}\.'
  filter_legit:
    QueryName|endswith:
      - '.microsoft.com'
      - '.google.com'
      - '.amazonaws.com'
      - '.cloudfront.net'
      - '._domainkey.'
      - '._dmarc.'
  condition: selection_type and selection_entropy and not filter_legit
falsepositives:
  - DKIM verification queries with long encoded values
  - CDN name resolution
level: high
