title: Encoded C2 Communication via PowerShell
id: cc02a001-enc2-0002-0001-000000000001
status: stable
description: |
  Detects PowerShell-based C2 communication patterns including base64-encoded
  web requests, reverse shell connections, and known C2 framework stagers
  (Cobalt Strike, Empire, Covenant, Sliver).
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1071/001/
  - https://attack.mitre.org/techniques/T1573/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.command_and_control
  - attack.execution
  - attack.t1059.001
  - attack.t1071.001
  - attack.t1573
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_c2:
    CommandLine|contains:
      - 'System.Net.Sockets.TCPClient'
      - 'System.Net.WebClient'
      - 'IEX(New-Object'
      - 'IEX (New-Object'
      - 'DownloadString('
      - 'DownloadData('
      - 'Net.WebClient).DownloadString'
      - 'Invoke-Shellcode'
      - 'Invoke-Empire'
      - 'Invoke-DllInjection'
  filter_known:
    CommandLine|contains:
      - 'nuget.org'
      - 'powershellgallery.com'
      - 'github.com'
      - 'chocolatey.org'
  condition: selection and selection_c2 and not filter_known
falsepositives:
  - Legitimate PowerShell scripts downloading modules
  - Package manager operations
level: high

---
title: C2 Framework Stager Detection
id: cc02a002-enc2-0002-0002-000000000002
status: stable
description: |
  Detects command-line patterns associated with common C2 framework stagers
  and beacons including Cobalt Strike, Metasploit, Empire, Covenant,
  Sliver, and Havoc.
references:
  - https://attack.mitre.org/techniques/T1071/001/
  - https://attack.mitre.org/techniques/T1059/001/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.command_and_control
  - attack.t1071.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'beacon.exe'
      - 'meterpreter'
      - 'Invoke-Mimikatz'
      - 'Invoke-BloodHound'
      - 'SharpHound'
      - 'Invoke-Rubeus'
      - 'Covenant'
      - 'GruntStager'
      - 'sliver-client'
      - 'havoc'
      - 'Brute Ratel'
  filter_test:
    ParentImage|contains:
      - '\pentest\'
      - '\test\'
  condition: selection and not filter_test
falsepositives:
  - Authorized red team exercises
level: critical
