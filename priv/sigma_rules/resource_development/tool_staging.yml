title: Offensive Tool Download Detection
id: c3d4e5f6-0003-resdev-0001-000000000001
status: stable
description: Detects download of known offensive security tools
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1588/002/
logsource:
    category: process_creation
    product: windows
detection:
    selection_download:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\curl.exe'
            - '\wget.exe'
            - '\certutil.exe'
            - '\bitsadmin.exe'
        CommandLine|contains:
            - 'mimikatz'
            - 'lazagne'
            - 'rubeus'
            - 'sharphound'
            - 'bloodhound'
            - 'covenant'
            - 'cobalt'
            - 'empire'
            - 'meterpreter'
            - 'powersploit'
            - 'nishang'
            - 'powercat'
            - 'powerup'
            - 'invoke-obfuscation'
            - 'chisel'
            - 'ligolo'
            - 'sliver'
            - 'havoc'
            - 'brute-ratel'
    condition: selection_download
falsepositives:
    - Security researchers
    - Penetration testing activities
    - Security tool evaluation
level: critical
tags:
    - attack.resource_development
    - attack.t1588.002
    - attack.command_and_control
    - attack.t1105

