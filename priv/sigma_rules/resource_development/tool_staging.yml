title: Offensive Tool Execution Detection
id: c3d4e5f6-0003-resdev-0004-000000000004
status: stable
description: Detects execution of known offensive security tools
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1588/002/
logsource:
    category: process_creation
    product: windows
detection:
    selection_tool_names:
        Image|endswith:
            - '\mimikatz.exe'
            - '\lazagne.exe'
            - '\rubeus.exe'
            - '\sharphound.exe'
            - '\seatbelt.exe'
            - '\certify.exe'
            - '\safetykatz.exe'
            - '\sharpview.exe'
            - '\sharpdpapi.exe'
            - '\sharpwmi.exe'
            - '\sharpcradle.exe'
            - '\inveigh.exe'
            - '\responder.exe'
    selection_tool_cmdline:
        CommandLine|contains:
            - 'sekurlsa::logonpasswords'
            - 'lsadump::dcsync'
            - 'kerberos::golden'
            - 'privilege::debug'
            - 'token::elevate'
            - 'Invoke-Mimikatz'
            - 'Invoke-Rubeus'
            - 'Invoke-BloodHound'
            - 'Invoke-Kerberoast'
            - 'Invoke-Shellcode'
            - 'Invoke-ReflectivePEInjection'
    condition: selection_tool_names or selection_tool_cmdline
falsepositives:
    - Penetration testing
    - Red team exercises
    - Security assessments
level: critical
tags:
    - attack.resource_development
    - attack.t1588.002
    - attack.credential_access
    - attack.t1003

---
title: Cobalt Strike Beacon Staging Indicators
id: c3d4e5f6-0003-resdev-0005-000000000005
status: stable
description: Detects potential Cobalt Strike beacon staging or execution
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1608/001/
    - https://attack.mitre.org/software/S0154/
logsource:
    category: process_creation
    product: windows
detection:
    selection_rundll_pattern:
        Image|endswith: '\rundll32.exe'
        CommandLine|re: '.*\\.dll,\s*(Start|Entry|DllMain|Run|Execute).*'
    selection_powershell_encoded:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - '-enc'
            - '-encodedcommand'
            - 'FromBase64String'
        CommandLine|re: '.*[A-Za-z0-9+/=]{100,}.*'
    selection_spawn_pattern:
        ParentImage|endswith:
            - '\rundll32.exe'
            - '\dllhost.exe'
            - '\regsvr32.exe'
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
    condition: selection_rundll_pattern or selection_powershell_encoded or selection_spawn_pattern
falsepositives:
    - Legitimate encoded PowerShell scripts
    - Software installations using rundll32
level: high
tags:
    - attack.resource_development
    - attack.t1608.001
    - attack.execution
    - attack.t1059.001
    - attack.defense_evasion
    - attack.t1218.011

---
title: Exploit Kit Staging Detection
id: c3d4e5f6-0003-resdev-0006-000000000006
status: stable
description: Detects potential exploit kit staging or payload delivery
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1588/005/
logsource:
    category: process_creation
    product: windows
detection:
    selection_browser_spawn:
        ParentImage|endswith:
            - '\chrome.exe'
            - '\firefox.exe'
            - '\msedge.exe'
            - '\iexplore.exe'
        Image|endswith:
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
            - '\powershell.exe'
            - '\cmd.exe'
            - '\regsvr32.exe'
            - '\rundll32.exe'
            - '\certutil.exe'
    selection_java_spawn:
        ParentImage|endswith:
            - '\java.exe'
            - '\javaw.exe'
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
    selection_flash_spawn:
        ParentImage|contains: 'Flash'
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
    condition: selection_browser_spawn or selection_java_spawn or selection_flash_spawn
falsepositives:
    - Legitimate browser extensions with native messaging
    - Java-based applications
level: high
tags:
    - attack.resource_development
    - attack.t1588.005
    - attack.initial_access
    - attack.t1189
    - attack.execution
    - attack.t1203

