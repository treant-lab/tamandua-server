title: GitHub Raw Content Download of Offensive Tool
id: c3d4e5f6-0003-resdev-0002-000000000002
status: stable
description: Detects download from GitHub raw content of potentially malicious tools
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1588/002/
logsource:
    category: network_connection
    product: any
detection:
    selection_github_raw:
        DestinationHostname|contains:
            - 'raw.githubusercontent.com'
            - 'gist.githubusercontent.com'
    timeframe: 5m
    condition: selection_github_raw | count() by SourceIp > 5
falsepositives:
    - Developers downloading dependencies
    - Legitimate automation scripts
level: low
tags:
    - attack.resource_development
    - attack.t1588.002
    - attack.command_and_control
    - attack.t1105

