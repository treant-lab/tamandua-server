title: Rogue SSL/TLS Certificate Installation
id: c3d4e5f6-0003-resdev-0007-000000000007
status: stable
description: Detects installation of potentially rogue certificates to certificate stores
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1608/003/
logsource:
    category: process_creation
    product: windows
detection:
    selection_certutil_add:
        Image|endswith: '\certutil.exe'
        CommandLine|contains:
            - '-addstore'
            - '-add'
            - 'root'
            - 'trustedpublisher'
            - 'ca'
    selection_powershell_cert:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Import-Certificate'
            - 'X509Store'
            - 'Cert:\\LocalMachine\\Root'
            - 'Cert:\\LocalMachine\\CA'
            - 'Cert:\\LocalMachine\\TrustedPublisher'
    condition: selection_certutil_add or selection_powershell_cert
falsepositives:
    - Legitimate software installation
    - IT certificate management
    - Enterprise PKI operations
level: medium
tags:
    - attack.resource_development
    - attack.t1608.003
    - attack.defense_evasion
    - attack.t1553.004

---
title: Tool Staging in Temporary Directories
id: c3d4e5f6-0003-resdev-0008-000000000008
status: stable
description: Detects executable files written to temp directories with suspicious names
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1608/002/
logsource:
    category: file_event
    product: windows
detection:
    selection_temp_exe:
        TargetFilename|contains:
            - '\Temp\'
            - '\tmp\'
            - '\AppData\Local\Temp\'
            - '\Windows\Temp\'
        TargetFilename|endswith:
            - '.exe'
            - '.dll'
            - '.ps1'
            - '.bat'
            - '.vbs'
            - '.hta'
    selection_suspicious_names:
        TargetFilename|contains:
            - 'payload'
            - 'beacon'
            - 'shell'
            - 'implant'
            - 'backdoor'
            - 'agent'
            - 'loader'
            - 'dropper'
            - 'inject'
            - 'exploit'
    condition: selection_temp_exe and selection_suspicious_names
falsepositives:
    - Security testing
    - Legitimate software with unfortunate naming
level: high
tags:
    - attack.resource_development
    - attack.t1608.002
    - attack.execution
    - attack.t1204

---
title: PowerShell Cradle Techniques
id: c3d4e5f6-0003-resdev-0009-000000000009
status: stable
description: Detects PowerShell download cradles commonly used to stage tools
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1608/001/
logsource:
    category: process_creation
    product: windows
detection:
    selection_powershell:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_cradle_patterns:
        CommandLine|contains:
            - 'DownloadString'
            - 'DownloadFile'
            - 'DownloadData'
            - 'Net.WebClient'
            - 'Invoke-WebRequest'
            - 'Invoke-RestMethod'
            - 'Start-BitsTransfer'
            - 'iex'
            - 'Invoke-Expression'
            - '.Download'
            - 'IWR'
            - 'curl '
            - 'wget '
    selection_execution_pattern:
        CommandLine|contains:
            - '| iex'
            - '|iex'
            - '); iex'
            - ');iex'
            - "| Invoke-Expression"
            - "|Invoke-Expression"
    condition: selection_powershell and (selection_cradle_patterns and selection_execution_pattern)
falsepositives:
    - Legitimate automation scripts
    - Package managers (chocolatey, etc.)
level: high
tags:
    - attack.resource_development
    - attack.t1608.001
    - attack.execution
    - attack.t1059.001
    - attack.command_and_control
    - attack.t1105
