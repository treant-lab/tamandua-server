title: Regsvr32 Squiblydoo Attack
id: de08a001-rsv3-0008-0001-000000000001
status: stable
description: |
  Detects Regsvr32.exe used to execute scripts from remote URLs (Squiblydoo
  attack). Regsvr32 is a signed Microsoft binary that can download and
  execute SCT (scriptlet) files containing JavaScript or VBScript, bypassing
  application whitelisting controls.
references:
  - https://attack.mitre.org/techniques/T1218/010/
  - https://lolbas-project.github.io/lolbas/Binaries/Regsvr32/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.defense_evasion
  - attack.execution
  - attack.t1218.010
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\regsvr32.exe'
    CommandLine|contains:
      - '/i:http'
      - '/i:https'
      - '/i:ftp'
      - 'scrobj.dll'
      - '.sct'
  filter_legit:
    ParentImage|endswith:
      - '\msiexec.exe'
      - '\setup.exe'
  condition: selection and not filter_legit
falsepositives:
  - Legitimate COM object registration from network paths
level: high

---
title: Regsvr32 with No Parameters
id: de08a002-rsv3-0008-0002-000000000002
status: stable
description: |
  Detects Regsvr32.exe executing with the /s /n flags and no DLL path,
  which is indicative of COM scriptlet execution. The /s suppresses dialogs
  and /n tells regsvr32 not to call DllRegisterServer.
references:
  - https://attack.mitre.org/techniques/T1218/010/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.defense_evasion
  - attack.t1218.010
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\regsvr32.exe'
    CommandLine|contains|all:
      - '/s'
      - '/n'
      - '/u'
      - '/i:'
  filter_legit:
    CommandLine|contains: '\Program Files'
  condition: selection and not filter_legit
falsepositives:
  - Legitimate COM component unregistration
level: high
