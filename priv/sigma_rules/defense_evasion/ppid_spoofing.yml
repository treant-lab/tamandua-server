title: PPID Spoofing - STARTUPINFOEX Detection
id: b40f6bf1-d4e8-5d22-98ef-fb4f3d2f9e12
status: experimental
description: |
    Detects potential PPID spoofing via STARTUPINFOEX/UpdateProcThreadAttribute
    by monitoring for suspicious parent-child relationships combined with
    behavioral indicators typical of PPID spoofing attacks.
author: Tamandua Security Team
date: 2024/01/20
logsource:
    category: process_creation
    product: windows
detection:
    # Combination of high-value parent + suspicious child + suspicious command line
    selection_parent:
        ParentImage|endswith:
            - '\svchost.exe'
            - '\services.exe'
            - '\explorer.exe'
            - '\RuntimeBroker.exe'
            - '\sihost.exe'
            - '\taskhostw.exe'
    selection_child:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\mshta.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\rundll32.exe'
            - '\regsvr32.exe'
    selection_cmdline:
        CommandLine|contains:
            - '-enc '
            - '-e '
            - '-ep bypass'
            - '-executionpolicy bypass'
            - '-windowstyle hidden'
            - '-nop'
            - '-noprofile'
            - 'downloadstring'
            - 'downloadfile'
            - 'invoke-webrequest'
            - 'iwr '
            - 'curl '
            - 'invoke-expression'
            - 'iex '
            - 'start-process'
            - 'frombase64string'
            - 'decompress'
            - 'gzipstream'
            - 'memorystream'
    condition: selection_parent and selection_child and selection_cmdline
falsepositives:
    - Legitimate administrative scripts
    - Software deployment tools
level: high
tags:
    - attack.defense_evasion
    - attack.privilege_escalation
    - attack.t1134.004

