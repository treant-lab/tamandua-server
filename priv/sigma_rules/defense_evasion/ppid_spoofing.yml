title: PPID Spoofing - Anomalous Process Tree
id: c51a7cf2-e5f9-6e33-a9f0-gc5f4e3f0f23
status: experimental
description: |
    Detects anomalous process trees that may indicate PPID spoofing,
    where the declared parent process is inconsistent with typical
    Windows process hierarchies.
author: Tamandua Security Team
date: 2024/01/20
logsource:
    category: process_creation
    product: windows
detection:
    # Windows Terminal should spawn shells, not svchost
    selection_terminal_anomaly:
        ParentImage|endswith: '\svchost.exe'
        Image|endswith: '\WindowsTerminal.exe'

    # Visual Studio Code should spawn from explorer, not system processes
    selection_code_anomaly:
        ParentImage|endswith:
            - '\svchost.exe'
            - '\services.exe'
            - '\lsass.exe'
        Image|endswith: '\Code.exe'

    # Browsers should not spawn from system processes
    selection_browser_anomaly:
        ParentImage|endswith:
            - '\svchost.exe'
            - '\services.exe'
            - '\lsass.exe'
            - '\csrss.exe'
        Image|endswith:
            - '\chrome.exe'
            - '\firefox.exe'
            - '\msedge.exe'
            - '\iexplore.exe'

    # Office applications anomaly
    selection_office_anomaly:
        ParentImage|endswith:
            - '\svchost.exe'
            - '\lsass.exe'
            - '\csrss.exe'
        Image|endswith:
            - '\WINWORD.EXE'
            - '\EXCEL.EXE'
            - '\POWERPNT.EXE'
            - '\OUTLOOK.EXE'

    condition: selection_terminal_anomaly or selection_code_anomaly or selection_browser_anomaly or selection_office_anomaly
falsepositives:
    - Very rare edge cases
level: critical
tags:
    - attack.defense_evasion
    - attack.privilege_escalation
    - attack.t1134.004

