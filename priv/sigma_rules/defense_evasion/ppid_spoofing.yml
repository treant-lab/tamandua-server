title: PPID Spoofing - Suspicious Parent Process
id: a39e5af0-c3d7-4c11-97de-ea3f2c1f8e01
status: experimental
description: |
    Detects Parent PID (PPID) spoofing where a process claims to have a different
    parent process than the one that actually created it. This technique is used
    by adversaries to evade detection by appearing to be spawned by legitimate
    system processes like svchost.exe or explorer.exe.
author: Tamandua Security Team
date: 2024/01/20
modified: 2024/01/20
references:
    - https://attack.mitre.org/techniques/T1134/004/
    - https://blog.didierstevens.com/2009/11/22/quickpost-selectmyparent-or-playing-with-the-windows-process-tree/
    - https://blog.f-secure.com/detecting-parent-pid-spoofing/
    - https://www.ired.team/offensive-security/defense-evasion/parent-pid-spoofing
logsource:
    category: process_creation
    product: windows
detection:
    # Pattern 1: Shell spawned by unexpected svchost.exe without -k flag
    selection_svchost_shell:
        ParentImage|endswith: '\svchost.exe'
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
    filter_svchost_legitimate:
        ParentCommandLine|contains: '-k '

    # Pattern 2: Suspicious child from high-value system processes
    selection_system_process_child:
        ParentImage|endswith:
            - '\lsass.exe'
            - '\csrss.exe'
            - '\smss.exe'
            - '\wininit.exe'
            - '\winlogon.exe'
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\rundll32.exe'
            - '\regsvr32.exe'
            - '\mshta.exe'

    # Pattern 3: Process created by explorer.exe with suspicious indicators
    selection_explorer_suspicious:
        ParentImage|endswith: '\explorer.exe'
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - '-enc'
            - '-encodedcommand'
            - '-windowstyle hidden'
            - 'downloadstring'
            - 'invoke-expression'
            - 'iex'
            - 'frombase64'

    # Pattern 4: RuntimeBroker spawning shells (common PPID spoof target)
    selection_runtimebroker:
        ParentImage|endswith: '\RuntimeBroker.exe'
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'

    # Pattern 5: conhost.exe spawning processes (unusual)
    selection_conhost:
        ParentImage|endswith: '\conhost.exe'
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'

    condition: (selection_svchost_shell and not filter_svchost_legitimate) or selection_system_process_child or selection_explorer_suspicious or selection_runtimebroker or selection_conhost
falsepositives:
    - Legitimate scheduled tasks
    - System administration scripts
    - Software installation
level: high
tags:
    - attack.defense_evasion
    - attack.privilege_escalation
    - attack.t1134.004

