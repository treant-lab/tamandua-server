title: PPID Spoofing - LOLBin with Spoofed Parent
id: d62b8df3-f6fa-7f44-baf1-hd6g5f4g1g34
status: experimental
description: |
    Detects LOLBins (Living Off The Land Binaries) spawned with potentially
    spoofed parent processes, which is a common technique to evade detection.
author: Tamandua Security Team
date: 2024/01/20
logsource:
    category: process_creation
    product: windows
detection:
    selection_parent:
        ParentImage|endswith:
            - '\svchost.exe'
            - '\RuntimeBroker.exe'
            - '\dllhost.exe'
            - '\sihost.exe'
    selection_lolbin:
        Image|endswith:
            - '\certutil.exe'
            - '\bitsadmin.exe'
            - '\msbuild.exe'
            - '\installutil.exe'
            - '\regasm.exe'
            - '\regsvcs.exe'
            - '\cmstp.exe'
            - '\msiexec.exe'
            - '\control.exe'
            - '\wmic.exe'
            - '\pcalua.exe'
            - '\forfiles.exe'
            - '\syncappvpublishingserver.exe'
            - '\presentationhost.exe'
    filter_legitimate:
        ParentCommandLine|contains: '-k '
    condition: selection_parent and selection_lolbin and not filter_legitimate
falsepositives:
    - System administration tools
    - Software deployment
level: high
tags:
    - attack.defense_evasion
    - attack.execution
    - attack.t1134.004
    - attack.t1218
