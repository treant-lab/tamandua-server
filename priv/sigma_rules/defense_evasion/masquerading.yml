title: Double File Extension Masquerading
id: de05a002-masq-0005-0002-000000000002
status: stable
description: |
  Detects files using double extensions (e.g., document.pdf.exe, image.jpg.scr)
  to trick users into executing malicious files. This is a common social
  engineering technique where the real extension is hidden by default in
  Windows Explorer.
references:
  - https://attack.mitre.org/techniques/T1036/007/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.defense_evasion
  - attack.t1036.007
logsource:
  category: file_event
  product: windows
detection:
  selection:
    TargetFilename|re: '\.(doc|docx|pdf|jpg|jpeg|png|gif|bmp|txt|xlsx|pptx|mp3|mp4|avi|zip)\.(exe|scr|bat|cmd|vbs|js|wsf|ps1|hta|com|pif)$'
  filter_temp:
    TargetFilename|contains: '\Temp\Chrome'
  condition: selection and not filter_temp
falsepositives:
  - Extremely unlikely for legitimate files
level: high

---
title: Right-to-Left Override Character in Filename
id: de05a003-masq-0005-0003-000000000003
status: stable
description: |
  Detects use of Unicode Right-to-Left Override (RLO) character in filenames
  to disguise file extensions. For example, a file named "documenttxt.exe"
  with an RLO character before "txt" would appear as "documentexe.txt".
references:
  - https://attack.mitre.org/techniques/T1036/002/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.defense_evasion
  - attack.t1036.002
logsource:
  category: file_event
  product: windows
detection:
  selection:
    TargetFilename|contains: "\u202e"
  filter_none:
    TargetFilename: ''
  condition: selection and not filter_none
falsepositives:
  - Hebrew/Arabic language documents (extremely rare in filenames)
level: critical
