title: Process Name Masquerading - Suspicious System Binary Location
id: de05a001-masq-0005-0001-000000000001
status: stable
description: |
  Detects execution of binaries with names matching Windows system utilities
  (cmd.exe, powershell.exe, svchost.exe, etc.) but running from unexpected
  directories. Legitimate system binaries run from System32 or SysWOW64;
  execution from other paths indicates masquerading.
references:
  - https://attack.mitre.org/techniques/T1036/005/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.defense_evasion
  - attack.t1036.005
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\svchost.exe'
      - '\csrss.exe'
      - '\lsass.exe'
      - '\services.exe'
      - '\smss.exe'
      - '\winlogon.exe'
      - '\wininit.exe'
      - '\spoolsv.exe'
      - '\taskhost.exe'
      - '\taskhostw.exe'
      - '\dllhost.exe'
      - '\conhost.exe'
  filter_legit:
    Image|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
      - 'C:\Windows\WinSxS\'
  filter_legit_systemdrive:
    Image|re: '^[A-Za-z]:\\Windows\\(System32|SysWOW64|WinSxS)\\'
  condition: selection and not (filter_legit or filter_legit_systemdrive)
falsepositives:
  - Portable application directories with coincidentally named binaries
level: critical

