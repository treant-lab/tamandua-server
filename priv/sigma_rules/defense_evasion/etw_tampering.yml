title: Syscall Region Tampered
id: tamandua-etw-patch-006
status: production
description: |
  Detects modification of syscall stub regions in ntdll.dll.
  Syscall stubs are the entry points for system calls and should
  never be modified during normal operation.

  Tampering with syscall stubs can redirect system calls to
  attacker-controlled code or disable security monitoring.
author: Tamandua Security Team
date: 2026/05/05
references:
  - https://attack.mitre.org/techniques/T1562/006/
logsource:
  product: tamandua
  service: agent
detection:
  selection:
    event_type: 'syscall_region_tampered'
  condition: selection
falsepositives:
  - Very unlikely in legitimate software
level: critical
tags:
  - attack.defense_evasion
  - attack.t1562.006

