title: NTDLL Write Detected
id: tamandua-etw-patch-005
status: production
description: |
  Detects write operations to the .text section of ntdll.dll.
  This indicates potential inline hooking or unhooking attempts.

  The ntdll.dll .text section should be read-only during normal operation.
  Any writes suggest tampering with system call stubs or security hooks.
author: Tamandua Security Team
date: 2026/05/05
references:
  - https://attack.mitre.org/techniques/T1562/006/
logsource:
  product: tamandua
  service: agent
detection:
  selection:
    event_type: 'ntdll_write_detected'
  condition: selection
falsepositives:
  - Some debugging tools
  - Security software performing instrumentation
level: high
tags:
  - attack.defense_evasion
  - attack.t1562.006

