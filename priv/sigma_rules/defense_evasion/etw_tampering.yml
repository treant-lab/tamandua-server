title: ETW Function Patching Detected
id: tamandua-etw-patch-001
status: production
description: |
  Detects patching of ETW (Event Tracing for Windows) functions to blind EDR telemetry.

  ETW tampering is a defense evasion technique where malware patches functions like
  NtTraceEvent or EtwEventWrite to prevent security tools from receiving telemetry.
  Common patch patterns include:
  - ret (0xC3) - immediate return
  - xor eax, eax; ret - return zero status
  - jmp to attacker-controlled code

  This is a critical indicator of advanced malware attempting to evade detection.
author: Tamandua Security Team
date: 2026/05/05
references:
  - https://attack.mitre.org/techniques/T1562/006/
  - https://blog.xpnsec.com/hiding-your-dotnet-etw-patching/
  - https://www.mdsec.co.uk/2020/03/hiding-your-net-etw-patching/
logsource:
  product: tamandua
  service: agent
  category: etw_tampering
detection:
  selection:
    event_type:
      - 'etw_tampering'
      - 'etw_prologue_patched'
      - 'ntdll_stub_modified'
      - 'fresh_ntdll_mapping'
      - 'ntdll_write_detected'
      - 'syscall_region_tampered'
  condition: selection
falsepositives:
  - Security research tools
  - Some anti-cheat systems
level: critical
tags:
  - attack.defense_evasion
  - attack.t1562.006

