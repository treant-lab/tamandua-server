title: Fresh NTDLL Mapping (Unhooking Attempt)
id: tamandua-etw-patch-004
status: production
description: |
  Detects a process loading a fresh copy of ntdll.dll from disk.
  This is a common technique to bypass EDR hooks by using an unhooked ntdll.

  Legitimate processes rarely need to manually map ntdll.dll since it's
  already loaded by the Windows loader.
author: Tamandua Security Team
date: 2026/05/05
references:
  - https://attack.mitre.org/techniques/T1562/006/
  - https://www.ired.team/offensive-security/defense-evasion/how-to-unhook-a-dll-using-c++
logsource:
  product: tamandua
  service: agent
detection:
  selection:
    event_type: 'fresh_ntdll_mapping'
  condition: selection
falsepositives:
  - Some legitimate security tools
  - Debugging/analysis tools
level: high
tags:
  - attack.defense_evasion
  - attack.t1562.006

