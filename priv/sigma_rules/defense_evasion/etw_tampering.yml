title: ETW Prologue Patching - RET Pattern
id: tamandua-etw-patch-002
status: production
description: |
  Detects ETW function prologue patched with simple RET (0xC3) instruction.
  This causes the ETW function to immediately return without tracing events.
author: Tamandua Security Team
date: 2026/05/05
references:
  - https://attack.mitre.org/techniques/T1562/006/
logsource:
  product: tamandua
  service: agent
detection:
  selection:
    event_type: 'etw_prologue_patched'
    patch_pattern: 'ret'
  condition: selection
falsepositives:
  - Very unlikely in legitimate software
level: critical
tags:
  - attack.defense_evasion
  - attack.t1562.006

