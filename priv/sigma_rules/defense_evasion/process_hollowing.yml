title: Process Hollowing Indicators
id: de06a001-phol-0006-0001-000000000001
status: stable
description: |
  Detects indicators of process hollowing where a legitimate process (e.g.,
  svchost.exe) is created in a suspended state and its memory is replaced
  with malicious code. This rule looks for suspicious process creation
  patterns where system binaries are launched by unexpected parent processes.
references:
  - https://attack.mitre.org/techniques/T1055/012/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1055.012
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\svchost.exe'
      - '\dllhost.exe'
      - '\taskhost.exe'
      - '\RuntimeBroker.exe'
    ParentImage|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\rundll32.exe'
      - '\regsvr32.exe'
  filter_svchost:
    Image|endswith: '\svchost.exe'
    ParentImage|endswith: '\services.exe'
  filter_legit:
    ParentImage|endswith: '\svchost.exe'
    ParentCommandLine|contains: '-k '
  condition: selection and not (filter_svchost or filter_legit)
falsepositives:
  - Legitimate scripts launching system processes for diagnostics
level: high

---
title: Suspicious Svchost.exe Without Service Parameter
id: de06a002-phol-0006-0002-000000000002
status: stable
description: |
  Detects svchost.exe instances running without the expected -k parameter,
  which normally specifies the service group. Process hollowing attacks
  create svchost.exe with unusual or no command-line parameters.
references:
  - https://attack.mitre.org/techniques/T1055/012/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.defense_evasion
  - attack.t1055.012
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\svchost.exe'
  filter_normal:
    CommandLine|contains: '-k '
  filter_system:
    ParentImage|endswith: '\services.exe'
  condition: selection and not (filter_normal or filter_system)
falsepositives:
  - Container environments running svchost differently
level: high
