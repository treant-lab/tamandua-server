title: Windows Event Log Cleared
id: de03a001-elog-0003-0001-000000000001
status: stable
description: |
  Detects clearing of Windows event logs using wevtutil, PowerShell
  Clear-EventLog, or direct event log service manipulation. Adversaries
  clear logs to remove evidence of their activities and hinder forensic
  investigation.
references:
  - https://attack.mitre.org/techniques/T1070/001/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.defense_evasion
  - attack.t1070.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_wevtutil:
    Image|endswith: '\wevtutil.exe'
    CommandLine|contains:
      - 'cl '
      - 'clear-log'
  selection_ps:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Clear-EventLog'
      - 'Remove-EventLog'
      - 'wevtutil cl'
      - 'Limit-EventLog -LogName * -MaximumSize 64KB'
  selection_critical_logs:
    CommandLine|contains:
      - 'Security'
      - 'System'
      - 'Application'
      - 'PowerShell'
      - 'Sysmon'
  filter_maintenance:
    ParentImage|endswith: '\taskeng.exe'
    User|contains: 'SYSTEM'
  condition: (selection_wevtutil or selection_ps) and not filter_maintenance
falsepositives:
  - Scheduled log maintenance by system administrators
  - Log rotation scripts
level: high

---
title: Security Event Log Cleared (Event ID 1102)
id: de03a002-elog-0003-0002-000000000002
status: stable
description: |
  Detects the Windows Security audit log being cleared, indicated by
  Event ID 1102. This event is generated by the operating system when
  the Security log is cleared and cannot be suppressed.
references:
  - https://attack.mitre.org/techniques/T1070/001/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.defense_evasion
  - attack.t1070.001
logsource:
  category: security
  product: windows
detection:
  selection:
    EventID: 1102
  filter_maintenance:
    SubjectUserName|endswith: '$'
  condition: selection and not filter_maintenance
falsepositives:
  - Authorized log clearing by security administrators
level: high
