title: WMI Event Subscription for Persistence
id: pe05a001-wmis-0005-0001-000000000001
status: stable
description: |
  Detects the creation of WMI event subscriptions used for persistence.
  WMI event subscriptions consist of an EventFilter, EventConsumer, and
  FilterToConsumerBinding that together execute code when a system event
  occurs (e.g., logon, timer, process start). This is a stealthy persistence
  mechanism that does not require files on disk.
references:
  - https://attack.mitre.org/techniques/T1546/003/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.persistence
  - attack.t1546.003
logsource:
  category: process_creation
  product: windows
detection:
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains:
      - '__EventFilter'
      - '__EventConsumer'
      - '__FilterToConsumerBinding'
      - 'CommandLineEventConsumer'
      - 'ActiveScriptEventConsumer'
  selection_ps:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Register-WmiEvent'
      - 'Set-WmiInstance'
      - '__EventFilter'
      - '__EventConsumer'
      - 'CommandLineEventConsumer'
  selection_mof:
    CommandLine|contains:
      - 'mofcomp'
      - '.mof'
  filter_sccm:
    CommandLine|contains: '\CCM\'
  condition: (selection_wmic or selection_ps or selection_mof) and not filter_sccm
falsepositives:
  - SCCM client WMI operations
  - Legitimate monitoring solutions using WMI events
level: high
