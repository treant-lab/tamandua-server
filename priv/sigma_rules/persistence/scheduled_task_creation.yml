title: Suspicious Scheduled Task Creation
id: pe02a001-stsk-0002-0001-000000000001
status: stable
description: |
  Detects scheduled task creation via schtasks.exe with suspicious
  characteristics such as executing scripts, binaries from temp/user paths,
  or using encoded commands. Scheduled tasks provide reliable persistence
  that survives reboots and runs with configurable privileges.
references:
  - https://attack.mitre.org/techniques/T1053/005/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.persistence
  - attack.execution
  - attack.t1053.005
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains: '/create'
  selection_suspicious:
    CommandLine|contains:
      - '\AppData\'
      - '\Temp\'
      - '\Users\Public\'
      - 'powershell'
      - 'cmd /c'
      - 'wscript'
      - 'cscript'
      - 'mshta'
      - '-enc'
      - 'http://'
      - 'https://'
  filter_microsoft:
    CommandLine|contains:
      - '\Microsoft\\'
      - '\Windows\\'
      - 'OneDrive'
  condition: selection and selection_suspicious and not filter_microsoft
falsepositives:
  - Legitimate administrative scheduled tasks
  - Software update schedulers
level: high

---
title: Scheduled Task Creation via PowerShell
id: pe02a002-stsk-0002-0002-000000000002
status: stable
description: |
  Detects scheduled task creation using PowerShell Register-ScheduledTask or
  New-ScheduledTaskAction cmdlets. PowerShell-based task creation is often
  used in fileless attack chains.
references:
  - https://attack.mitre.org/techniques/T1053/005/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.persistence
  - attack.t1053.005
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Register-ScheduledTask'
      - 'New-ScheduledTaskAction'
      - 'New-ScheduledTaskTrigger'
      - 'New-ScheduledTaskPrincipal'
  filter_system:
    User|contains: 'SYSTEM'
    ParentImage|endswith: '\svchost.exe'
  condition: selection and not filter_system
falsepositives:
  - Legitimate PowerShell-based system configuration
  - DSC module operations
level: medium
