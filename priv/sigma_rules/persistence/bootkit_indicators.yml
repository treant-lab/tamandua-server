title: Boot Configuration Tampering for Persistence
id: pe08a001-boot-0008-0001-000000000001
status: stable
description: |
  Detects suspicious modification of boot configuration data (BCD) that
  could indicate bootkit installation or boot persistence. Adversaries
  modify BCD to load malicious boot drivers, disable integrity checks,
  or add custom boot entries that execute before the OS.
references:
  - https://attack.mitre.org/techniques/T1542/003/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.persistence
  - attack.defense_evasion
  - attack.t1542.003
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\bcdedit.exe'
    CommandLine|contains:
      - 'set {bootmgr}'
      - 'set {default}'
      - 'loadoptions'
      - 'TESTSIGNING ON'
      - 'NOINTEGRITYCHECKS ON'
      - 'bootstatuspolicy ignoreallfailures'
      - 'recoveryenabled no'
      - 'set nx AlwaysOff'
  filter_repair:
    ParentImage|endswith:
      - '\WinRE\reagentc.exe'
      - '\sfc.exe'
  condition: selection and not filter_repair
falsepositives:
  - System recovery operations
  - Driver development enabling test signing
level: critical

---
title: Bootloader File Modification
id: pe08a002-boot-0008-0002-000000000002
status: stable
description: |
  Detects modification of bootloader files (bootmgr, winload.exe, BCD) on
  disk. Direct modification of boot files is extremely unusual and can
  indicate bootkit or rootkit installation.
references:
  - https://attack.mitre.org/techniques/T1542/003/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.persistence
  - attack.t1542.003
logsource:
  category: file_event
  product: windows
detection:
  selection:
    TargetFilename|endswith:
      - '\bootmgr'
      - '\bootmgr.efi'
      - '\winload.exe'
      - '\winload.efi'
      - '\winresume.exe'
      - '\winresume.efi'
      - '\BCD'
  filter_update:
    Image|endswith:
      - '\TiWorker.exe'
      - '\TrustedInstaller.exe'
      - '\wuauclt.exe'
      - '\svchost.exe'
  condition: selection and not filter_update
falsepositives:
  - Windows Update modifying boot files
  - OS upgrade processes
level: critical
