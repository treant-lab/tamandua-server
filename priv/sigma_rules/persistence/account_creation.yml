title: Suspicious Local Account Creation
id: pe09a001-acct-0009-0001-000000000001
status: stable
description: |
  Detects creation of new local user accounts via net.exe or PowerShell.
  Adversaries create local accounts with administrative privileges for
  persistence and to maintain alternative access to compromised hosts.
references:
  - https://attack.mitre.org/techniques/T1136/001/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.persistence
  - attack.t1136.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_net:
    Image|endswith:
      - '\net.exe'
      - '\net1.exe'
    CommandLine|contains|all:
      - 'user'
      - '/add'
  selection_ps:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'New-LocalUser'
      - 'net user'
  filter_system:
    User|contains: 'SYSTEM'
    ParentImage|endswith: '\svchost.exe'
  condition: (selection_net or selection_ps) and not filter_system
falsepositives:
  - Legitimate account provisioning by IT administrators
  - Automated onboarding scripts
level: medium

---
title: User Added to Administrative Group
id: pe09a002-acct-0009-0002-000000000002
status: stable
description: |
  Detects addition of users to local administrative groups (Administrators,
  Remote Desktop Users, Remote Management Users). This is a critical
  persistence and privilege escalation technique.
references:
  - https://attack.mitre.org/techniques/T1136/001/
  - https://attack.mitre.org/techniques/T1098/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.persistence
  - attack.privilege_escalation
  - attack.t1098
logsource:
  category: process_creation
  product: windows
detection:
  selection_net:
    Image|endswith:
      - '\net.exe'
      - '\net1.exe'
    CommandLine|contains: 'localgroup'
    CommandLine|contains: '/add'
    CommandLine|contains:
      - 'administrators'
      - 'Administrators'
      - 'Remote Desktop Users'
      - 'Remote Management Users'
  selection_ps:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Add-LocalGroupMember'
    CommandLine|contains:
      - 'Administrators'
      - 'Remote Desktop Users'
  filter_setup:
    ParentImage|endswith:
      - '\msiexec.exe'
      - '\setup.exe'
  condition: (selection_net or selection_ps) and not filter_setup
falsepositives:
  - Legitimate account administration
  - Software installation requiring admin group membership
level: high
