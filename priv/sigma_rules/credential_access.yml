title: Mimikatz Command Line Parameters
id: 6e9f1c8b-2345-6789-abcd-ef0123456789
status: experimental
description: Detects Mimikatz command line usage patterns
author: Tamandua Security Team
date: 2024/01/15
references:
    - https://attack.mitre.org/techniques/T1003/001/
logsource:
    category: process_creation
    product: windows
detection:
    selection_cmd:
        CommandLine|contains:
            - 'sekurlsa::'
            - 'kerberos::'
            - 'crypto::'
            - 'vault::'
            - 'lsadump::'
            - 'dpapi::'
            - 'privilege::debug'
            - 'token::elevate'
            - 'log sekurlsa'
            - 'misc::cmd'
    selection_img:
        Image|endswith:
            - '\mimikatz.exe'
            - '\mimilib.dll'
    condition: selection_cmd or selection_img
falsepositives:
    - Legitimate security assessments
level: critical
tags:
    - attack.credential_access
    - attack.t1003.001

