title: LSASS Memory Access via MiniDumpWriteDump
id: 5e8f0c7a-1234-5678-9abc-def012345678
status: experimental
description: Detects access to LSASS process memory that could indicate credential dumping
author: Tamandua Security Team
date: 2024/01/15
references:
    - https://attack.mitre.org/techniques/T1003/001/
logsource:
    category: process_access
    product: windows
detection:
    selection:
        TargetImage|endswith: '\lsass.exe'
        GrantedAccess|contains:
            - '0x1010'
            - '0x1410'
            - '0x1438'
            - '0x143a'
            - '0x1fffff'
    filter:
        SourceImage|endswith:
            - '\wmiprvse.exe'
            - '\csrss.exe'
            - '\lsm.exe'
            - '\MsMpEng.exe'
            - '\msiexec.exe'
            - '\svchost.exe'
    condition: selection and not filter
falsepositives:
    - Legitimate security tools
    - Windows Defender
level: high
tags:
    - attack.credential_access
    - attack.t1003.001

