title: Credential Manager Enumeration
id: 9b2c4f1e-5678-9abc-def0-123456789012
status: experimental
description: Detects cmdkey usage for credential enumeration
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\cmdkey.exe'
        CommandLine|contains: '/list'
    condition: selection
falsepositives:
    - Legitimate administrative tasks
level: medium
tags:
    - attack.credential_access
    - attack.t1555.004
