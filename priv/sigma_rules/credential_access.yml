title: DCSync Attack Detection
id: 7f0a2d9c-3456-789a-bcde-f01234567890
status: experimental
description: Detects DCSync attack attempts via directory replication
author: Tamandua Security Team
date: 2024/01/15
references:
    - https://attack.mitre.org/techniques/T1003/006/
logsource:
    category: security
    product: windows
detection:
    selection:
        EventID: 4662
        AccessMask: '0x100'
        Properties|contains:
            - '1131f6aa-9c07-11d1-f79f-00c04fc2dcd2'
            - '1131f6ad-9c07-11d1-f79f-00c04fc2dcd2'
            - '89e95b76-444d-4c62-991a-0facbeda640c'
    filter:
        SubjectUserName|endswith: '$'
    condition: selection and not filter
falsepositives:
    - Legitimate domain controller replication
level: critical
tags:
    - attack.credential_access
    - attack.t1003.006

---
title: SAM Database Dump via Reg.exe
id: 8a1b3e0d-4567-89ab-cdef-012345678901
status: experimental
description: Detects SAM/SYSTEM/SECURITY registry hive dumping
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        Image|endswith: '\reg.exe'
    selection_cmd:
        CommandLine|contains|all:
            - 'save'
        CommandLine|contains:
            - '\sam'
            - '\system'
            - '\security'
    condition: all of selection_*
falsepositives:
    - Legitimate backup operations
level: high
tags:
    - attack.credential_access
    - attack.t1003.002

