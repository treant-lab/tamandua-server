title: Registry Run Key Modification
id: 17daecf9-def0-7123-4567-901234567890
status: experimental
description: Detects modification of registry run keys for persistence
author: Tamandua Security Team
date: 2024/01/15
references:
    - https://attack.mitre.org/techniques/T1547/001/
logsource:
    category: registry_set
    product: windows
detection:
    selection:
        TargetObject|contains:
            - '\CurrentVersion\Run'
            - '\CurrentVersion\RunOnce'
            - '\CurrentVersion\RunServices'
            - '\CurrentVersion\Policies\Explorer\Run'
    filter:
        Image|endswith:
            - '\msiexec.exe'
            - '\setup.exe'
            - '\installer.exe'
    condition: selection and not filter
falsepositives:
    - Legitimate software installation
level: medium
tags:
    - attack.persistence
    - attack.t1547.001

---
title: Scheduled Task Creation via Schtasks
id: 28ebdf0a-ef01-8234-5678-012345678901
status: experimental
description: Detects scheduled task creation for persistence
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\schtasks.exe'
        CommandLine|contains|all:
            - '/create'
        CommandLine|contains:
            - '/sc'
            - '/tn'
    filter:
        CommandLine|contains:
            - 'Microsoft\\'
            - 'Windows\\'
    condition: selection and not filter
falsepositives:
    - Legitimate administrative tasks
level: medium
tags:
    - attack.persistence
    - attack.t1053.005

---
title: WMI Event Subscription
id: 39fcef1b-f012-9345-6789-123456789012
status: experimental
description: Detects WMI event subscription for persistence
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection_wmic:
        Image|endswith: '\wmic.exe'
        CommandLine|contains:
            - '__EventFilter'
            - '__EventConsumer'
            - '__FilterToConsumerBinding'
            - 'CommandLineEventConsumer'
            - 'ActiveScriptEventConsumer'
    selection_ps:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Register-WmiEvent'
            - 'Set-WmiInstance'
            - '__EventFilter'
    condition: selection_wmic or selection_ps
falsepositives:
    - Legitimate monitoring solutions
level: high
tags:
    - attack.persistence
    - attack.t1546.003

