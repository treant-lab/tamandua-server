title: Startup Folder Modification
id: 5b1eab3d-1234-b567-89ab-345678901234
status: experimental
description: Detects file creation in startup folders
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: file_event
    product: windows
detection:
    selection:
        TargetFilename|contains:
            - '\Start Menu\Programs\Startup\'
            - '\Programs\Startup\'
        TargetFilename|endswith:
            - '.exe'
            - '.bat'
            - '.cmd'
            - '.vbs'
            - '.js'
            - '.lnk'
    condition: selection
falsepositives:
    - Legitimate software installation
level: medium
tags:
    - attack.persistence
    - attack.t1547.001

