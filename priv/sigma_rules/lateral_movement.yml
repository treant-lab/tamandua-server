title: SSH Lateral Movement on Windows
id: b17857bb-789a-1bcd-ef01-567890123456
status: experimental
description: Detects SSH usage for lateral movement on Windows
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\ssh.exe'
            - '\plink.exe'
            - '\putty.exe'
        CommandLine|contains:
            - '@'
            - '-l '
    condition: selection
falsepositives:
    - Legitimate SSH usage
level: low
tags:
    - attack.lateral_movement
    - attack.t1021.004
