title: Remote Service Creation via sc.exe
id: 4a0180aa-0123-a456-789a-890123456789
status: experimental
description: Detects remote service creation
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\sc.exe'
        CommandLine|contains|all:
            - '\\\\'
            - 'create'
    condition: selection
falsepositives:
    - Legitimate remote administration
level: high
tags:
    - attack.lateral_movement
    - attack.t1543.003

---
title: WMI Lateral Movement
id: 5b1291bb-1234-b567-89ab-901234567890
status: experimental
description: Detects WMI-based lateral movement
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection_wmic:
        Image|endswith: '\wmic.exe'
        CommandLine|contains:
            - '/node:'
            - 'process call create'
    selection_ps:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Invoke-WmiMethod'
            - 'Invoke-CimMethod'
            - 'gwmi '
            - 'Get-WmiObject'
            - '-ComputerName'
    condition: selection_wmic or selection_ps
falsepositives:
    - Legitimate remote management
level: high
tags:
    - attack.lateral_movement
    - attack.t1047

---
title: SMB/Windows Admin Shares
id: 6c2302cc-2345-c678-9abc-012345678901
status: experimental
description: Detects access to administrative shares
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        CommandLine|contains:
            - '\\\\*\\C$'
            - '\\\\*\\ADMIN$'
            - '\\\\*\\IPC$'
    condition: selection
falsepositives:
    - Legitimate administrative access
level: medium
tags:
    - attack.lateral_movement
    - attack.t1021.002

