title: WinRM Remote Execution
id: 9f5635ff-5678-f9ab-cdef-345678901234
status: experimental
description: Detects WinRM-based remote execution
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection_winrs:
        Image|endswith: '\winrs.exe'
        CommandLine|contains: '-r:'
    selection_ps:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Invoke-Command'
            - 'Enter-PSSession'
            - 'New-PSSession'
            - '-ComputerName'
    condition: selection_winrs or selection_ps
falsepositives:
    - Legitimate remote management
level: medium
tags:
    - attack.lateral_movement
    - attack.t1021.006

