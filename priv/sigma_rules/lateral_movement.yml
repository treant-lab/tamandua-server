title: PsExec Service Installation
id: 39f0796f-f012-9345-6789-789012345678
status: experimental
description: Detects PsExec service installation for lateral movement
author: Tamandua Security Team
date: 2024/01/15
references:
    - https://attack.mitre.org/techniques/T1569/002/
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\psexec.exe'
            - '\psexec64.exe'
    selection_network:
        CommandLine|contains: '\\\\'
    condition: selection and selection_network
falsepositives:
    - Legitimate administrative tools
level: high
tags:
    - attack.lateral_movement
    - attack.t1569.002

