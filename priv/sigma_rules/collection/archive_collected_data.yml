title: Data Staged in Archive for Exfiltration
id: co04a001-arch-0004-0001-000000000001
status: stable
description: |
  Detects creation of archive files (ZIP, RAR, 7z) from suspicious contexts,
  which may indicate data staging for exfiltration. Attackers compress
  collected data into archives before exfiltrating to reduce transfer size
  and evade DLP controls.
references:
  - https://attack.mitre.org/techniques/T1560/001/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.collection
  - attack.t1560.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_7z:
    Image|endswith:
      - '\7z.exe'
      - '\7za.exe'
    CommandLine|contains:
      - 'a '
      - 'a -'
  selection_rar:
    Image|endswith: '\rar.exe'
    CommandLine|contains: 'a '
  selection_ps:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Compress-Archive'
      - 'System.IO.Compression'
      - 'ZipFile'
  selection_sensitive:
    CommandLine|contains:
      - '\Documents'
      - '\Desktop'
      - '\Downloads'
      - '*.doc*'
      - '*.xls*'
      - '*.pdf'
      - '*.pst'
      - '-p'
  filter_backup:
    ParentImage|contains:
      - '\backup\'
      - '\7-Zip\'
  condition: (selection_7z or selection_rar or selection_ps) and selection_sensitive and not filter_backup
falsepositives:
  - Legitimate data archiving by users
  - Automated backup scripts
level: medium
