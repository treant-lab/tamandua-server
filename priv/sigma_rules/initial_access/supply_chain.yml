title: Supply Chain Compromise - Suspicious Software Update
id: d4e5f6a7-0004-initacc-0001-000000000001
status: stable
description: Detects potential supply chain compromise via suspicious software update mechanisms
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1195/002/
logsource:
    category: process_creation
    product: windows
detection:
    selection_update_parent:
        ParentImage|contains:
            - 'update'
            - 'updater'
            - 'autoupdate'
            - 'software update'
    selection_suspicious_child:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
            - '\certutil.exe'
            - '\bitsadmin.exe'
        CommandLine|contains:
            - '-enc'
            - 'http://'
            - 'https://'
            - 'DownloadString'
            - 'DownloadFile'
            - 'FromBase64'
    condition: selection_update_parent and selection_suspicious_child
falsepositives:
    - Legitimate software updates
    - Enterprise software deployment tools
level: high
tags:
    - attack.initial_access
    - attack.t1195.002
    - attack.execution
    - attack.t1059

---
title: Supply Chain Compromise - Package Manager Abuse
id: d4e5f6a7-0004-initacc-0002-000000000002
status: stable
description: Detects potential abuse of package managers for supply chain attacks
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1195/001/
logsource:
    category: process_creation
    product: windows
detection:
    selection_npm:
        Image|endswith:
            - '\node.exe'
            - '\npm.cmd'
        ParentImage|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
        CommandLine|contains:
            - 'preinstall'
            - 'postinstall'
            - 'install'
    selection_pip:
        Image|endswith: '\python.exe'
        CommandLine|contains:
            - 'pip install'
            - '-m pip'
    selection_suspicious_spawns:
        ParentCommandLine|contains:
            - 'npm'
            - 'pip'
            - 'yarn'
            - 'gem'
            - 'cargo'
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\bash.exe'
        CommandLine|contains:
            - 'curl'
            - 'wget'
            - 'Invoke-WebRequest'
            - 'http://'
            - 'https://'
    condition: (selection_npm or selection_pip) and selection_suspicious_spawns
falsepositives:
    - Legitimate package installation scripts
    - Development environments
level: medium
tags:
    - attack.initial_access
    - attack.t1195.001
    - attack.t1195.002
    - attack.execution
    - attack.t1059

