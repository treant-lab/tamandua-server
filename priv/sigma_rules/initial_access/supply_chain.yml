title: Supply Chain Compromise - Docker Image Pull from Untrusted Registry
id: d4e5f6a7-0004-initacc-0006-000000000006
status: stable
description: Detects Docker image pulls from potentially untrusted registries
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1195/001/
logsource:
    category: process_creation
    product: linux
detection:
    selection_docker:
        Image|endswith: '/docker'
        CommandLine|contains: 'pull'
    filter_trusted:
        CommandLine|contains:
            - 'docker.io/'
            - 'gcr.io/'
            - 'quay.io/'
            - 'mcr.microsoft.com/'
            - 'registry.k8s.io/'
            - 'ghcr.io/'
            - 'public.ecr.aws/'
    condition: selection_docker and not filter_trusted
falsepositives:
    - Private enterprise registries
    - Self-hosted registries
level: medium
tags:
    - attack.initial_access
    - attack.t1195.001
    - attack.execution
    - attack.t1610

