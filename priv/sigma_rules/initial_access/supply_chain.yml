title: Supply Chain Compromise - Compromised Update Channel
id: d4e5f6a7-0004-initacc-0003-000000000003
status: stable
description: Detects software updates from potentially compromised or suspicious update channels
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1195/002/
logsource:
    category: network_connection
    product: any
detection:
    selection_update_process:
        Image|contains:
            - 'update'
            - 'updater'
    selection_suspicious_dest:
        DestinationHostname|contains:
            - '.xyz'
            - '.top'
            - '.work'
            - '.click'
            - '.link'
            - '.info'
            - 'pastebin'
            - 'ghostbin'
            - 'hastebin'
            - 'rentry'
    condition: selection_update_process and selection_suspicious_dest
falsepositives:
    - Very low - most legitimate update channels use reputable domains
level: critical
tags:
    - attack.initial_access
    - attack.t1195.002
    - attack.command_and_control
    - attack.t1105

