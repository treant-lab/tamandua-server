title: Supply Chain Compromise - Compromised Development Tool
id: d4e5f6a7-0004-initacc-0008-000000000008
status: stable
description: Detects suspicious behavior from development tools that could indicate compromise
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1195/001/
logsource:
    category: process_creation
    product: windows
detection:
    selection_dev_tools:
        ParentImage|endswith:
            - '\Code.exe'
            - '\devenv.exe'
            - '\idea64.exe'
            - '\eclipse.exe'
            - '\atom.exe'
            - '\sublime_text.exe'
    selection_suspicious_child:
        Image|endswith:
            - '\powershell.exe'
            - '\cmd.exe'
        CommandLine|contains:
            - '-enc'
            - 'hidden'
            - 'bypass'
            - 'http://'
            - 'https://'
            - 'DownloadString'
            - 'FromBase64'
    filter_terminals:
        CommandLine|contains:
            - 'Get-Help'
            - 'git '
            - 'npm '
            - 'node '
            - 'python '
    condition: selection_dev_tools and selection_suspicious_child and not filter_terminals
falsepositives:
    - Legitimate IDE terminal usage
    - Build scripts
level: medium
tags:
    - attack.initial_access
    - attack.t1195.001
    - attack.t1195.002
    - attack.execution
    - attack.t1059
