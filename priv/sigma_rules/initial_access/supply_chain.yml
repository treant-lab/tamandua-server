title: Supply Chain Compromise - Plugin/Extension Side-Loading
id: d4e5f6a7-0004-initacc-0007-000000000007
status: stable
description: Detects potential supply chain attacks via malicious plugins or extensions
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1195/002/
logsource:
    category: file_event
    product: windows
detection:
    selection_plugin_paths:
        TargetFilename|contains:
            - '\plugins\'
            - '\extensions\'
            - '\addons\'
            - '\modules\'
    selection_executables:
        TargetFilename|endswith:
            - '.dll'
            - '.exe'
            - '.so'
    filter_legitimate:
        Image|contains:
            - '\chrome.exe'
            - '\firefox.exe'
            - '\msedge.exe'
            - '\Code.exe'
            - '\idea64.exe'
    condition: selection_plugin_paths and selection_executables and not filter_legitimate
falsepositives:
    - Legitimate plugin installations
    - IDE extensions
level: low
tags:
    - attack.initial_access
    - attack.t1195.002
    - attack.persistence
    - attack.t1176

