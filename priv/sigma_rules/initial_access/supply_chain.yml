title: Supply Chain Compromise - Signed Binary Proxy Execution from Update
id: d4e5f6a7-0004-initacc-0005-000000000005
status: stable
description: Detects LOLBIN usage spawned from software update processes
author: Tamandua Security Team
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1195/002/
    - https://attack.mitre.org/techniques/T1218/
logsource:
    category: process_creation
    product: windows
detection:
    selection_update_parent:
        ParentImage|contains:
            - 'update'
            - 'updater'
            - 'setup'
            - 'install'
    selection_lolbin:
        Image|endswith:
            - '\mshta.exe'
            - '\regsvr32.exe'
            - '\rundll32.exe'
            - '\certutil.exe'
            - '\msbuild.exe'
            - '\installutil.exe'
            - '\cmstp.exe'
            - '\odbcconf.exe'
        CommandLine|contains:
            - 'http://'
            - 'https://'
            - '/s'
            - '/i:'
            - 'scrobj'
            - 'javascript:'
            - 'vbscript:'
    condition: selection_update_parent and selection_lolbin
falsepositives:
    - Legitimate software installations using LOLBINs
level: high
tags:
    - attack.initial_access
    - attack.t1195.002
    - attack.defense_evasion
    - attack.t1218

