title: Supply Chain - RubyGem Native Extension Malicious Build
id: d4e5f6a7-0004-supplychain-gem-002
status: stable
description: Detects potential malicious activity during RubyGem native extension compilation
author: Tamandua Security Team
date: 2026/04/04
logsource:
    category: process_creation
    product: any
detection:
    selection_extconf:
        ParentCommandLine|contains:
            - 'extconf.rb'
            - 'mkmf'
        ParentImage|endswith:
            - '/ruby'
            - '\ruby.exe'
    selection_suspicious:
        CommandLine|contains:
            - 'eval('
            - 'system('
            - 'exec('
            - '`'
            - 'Kernel.spawn'
    condition: selection_extconf and selection_suspicious
falsepositives:
    - Complex build configurations
level: high
tags:
    - attack.initial_access
    - attack.t1195.001
    - attack.execution

