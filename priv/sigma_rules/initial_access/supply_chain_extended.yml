title: Supply Chain - Cargo Build Script Network Activity
id: d4e5f6a7-0004-supplychain-cargo-001
status: stable
description: Detects network activity from Cargo build scripts (build.rs) which could indicate supply chain compromise
author: Tamandua Security Team
date: 2026/04/04
references:
    - https://attack.mitre.org/techniques/T1195/001/
    - https://doc.rust-lang.org/cargo/reference/build-scripts.html
logsource:
    category: network_connection
    product: any
detection:
    selection_cargo_build:
        ParentImage|endswith:
            - '/cargo'
            - '\cargo.exe'
            - '/rustc'
            - '\rustc.exe'
        ParentCommandLine|contains:
            - 'build'
            - 'install'
            - 'run'
    filter_trusted:
        DestinationHostname|contains:
            - 'crates.io'
            - 'static.crates.io'
            - 'github.com'
            - 'rust-lang.org'
    condition: selection_cargo_build and not filter_trusted
falsepositives:
    - Build scripts downloading legitimate dependencies
    - Custom build steps fetching resources
level: high
tags:
    - attack.initial_access
    - attack.t1195.001
    - attack.execution
    - attack.t1059

