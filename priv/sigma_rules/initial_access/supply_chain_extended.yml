title: Supply Chain - Package Manager Environment Exfiltration
id: d4e5f6a7-0004-supplychain-env-001
status: stable
description: Detects package manager child processes accessing environment variables commonly used for credentials
author: Tamandua Security Team
date: 2026/04/04
logsource:
    category: process_creation
    product: any
detection:
    selection_pkg_manager:
        ParentImage|endswith:
            - '/npm'
            - '\npm.cmd'
            - '/pip'
            - '\pip.exe'
            - '/cargo'
            - '\cargo.exe'
            - '/gem'
            - '\gem.cmd'
            - '/go'
            - '\go.exe'
    selection_env_access:
        CommandLine|contains:
            - 'AWS_ACCESS_KEY'
            - 'AWS_SECRET'
            - 'NPM_TOKEN'
            - 'GH_TOKEN'
            - 'GITHUB_TOKEN'
            - 'PYPI_TOKEN'
            - 'CARGO_REGISTRY_TOKEN'
            - 'GEM_HOST_API_KEY'
    condition: selection_pkg_manager and selection_env_access
falsepositives:
    - Legitimate authentication for private registries
level: critical
tags:
    - attack.initial_access
    - attack.t1195.001
    - attack.credential_access
    - attack.t1552.001

