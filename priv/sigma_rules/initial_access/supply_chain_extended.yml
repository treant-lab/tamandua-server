title: Supply Chain - Go Module Download from Untrusted Proxy
id: d4e5f6a7-0004-supplychain-go-001
status: stable
description: Detects Go module downloads bypassing trusted proxies
author: Tamandua Security Team
date: 2026/04/04
logsource:
    category: network_connection
    product: any
detection:
    selection_go:
        Image|endswith:
            - '/go'
            - '\go.exe'
        CommandLine|contains:
            - 'get'
            - 'mod download'
            - 'install'
    filter_trusted:
        DestinationHostname|contains:
            - 'proxy.golang.org'
            - 'sum.golang.org'
            - 'github.com'
            - 'gitlab.com'
            - 'bitbucket.org'
            - 'gopkg.in'
    condition: selection_go and not filter_trusted
falsepositives:
    - Private Go module registries
    - GOPROXY=direct configuration
level: medium
tags:
    - attack.initial_access
    - attack.t1195.001

