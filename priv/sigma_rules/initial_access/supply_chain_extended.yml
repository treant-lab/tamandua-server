title: Supply Chain - Alternative Package Manager Suspicious Hooks
id: d4e5f6a7-0004-supplychain-alt-001
status: stable
description: Detects suspicious activity from alternative package manager install hooks (pnpm, yarn, bun)
author: Tamandua Security Team
date: 2026/04/04
logsource:
    category: process_creation
    product: any
detection:
    selection_alt_pkg:
        ParentImage|endswith:
            - '/pnpm'
            - '\pnpm.cmd'
            - '/yarn'
            - '\yarn.cmd'
            - '/bun'
            - '\bun.exe'
    selection_suspicious:
        CommandLine|contains:
            - 'DownloadString'
            - 'Invoke-WebRequest'
            - 'FromBase64'
            - '-enc '
            - 'eval('
            - 'exec('
    condition: selection_alt_pkg and selection_suspicious
falsepositives:
    - Legitimate package scripts
level: high
tags:
    - attack.initial_access
    - attack.t1195.001
