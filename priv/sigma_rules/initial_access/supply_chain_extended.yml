title: Supply Chain - RubyGem Install Hook Suspicious Activity
id: d4e5f6a7-0004-supplychain-gem-001
status: stable
description: Detects suspicious activity from RubyGem pre_install or post_install hooks
author: Tamandua Security Team
date: 2026/04/04
logsource:
    category: process_creation
    product: any
detection:
    selection_gem_parent:
        ParentImage|endswith:
            - '/gem'
            - '\gem.cmd'
            - '/ruby'
            - '\ruby.exe'
        ParentCommandLine|contains:
            - 'install'
            - 'update'
    selection_network_child:
        CommandLine|contains:
            - 'Net::HTTP'
            - 'open-uri'
            - 'curl'
            - 'wget'
            - 'http://'
            - 'https://'
    condition: selection_gem_parent and selection_network_child
falsepositives:
    - Gems that legitimately download resources during install
level: medium
tags:
    - attack.initial_access
    - attack.t1195.001

