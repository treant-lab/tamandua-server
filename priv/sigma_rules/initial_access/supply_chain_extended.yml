title: Supply Chain - Cargo Build Script Spawns Suspicious Process
id: d4e5f6a7-0004-supplychain-cargo-002
status: stable
description: Detects Cargo build scripts spawning suspicious child processes
author: Tamandua Security Team
date: 2026/04/04
logsource:
    category: process_creation
    product: any
detection:
    selection_cargo_parent:
        ParentImage|endswith:
            - '/cargo'
            - '\cargo.exe'
        ParentCommandLine|contains:
            - 'build'
            - 'install'
    selection_suspicious_child:
        Image|endswith:
            - '/sh'
            - '/bash'
            - '\cmd.exe'
            - '\powershell.exe'
        CommandLine|contains:
            - 'curl'
            - 'wget'
            - 'base64'
            - 'http://'
            - 'https://'
            - '-enc'
    condition: selection_cargo_parent and selection_suspicious_child
falsepositives:
    - Legitimate build scripts downloading resources
level: high
tags:
    - attack.initial_access
    - attack.t1195.001
    - attack.execution

