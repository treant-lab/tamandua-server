title: Windows Credential Manager Enumeration
id: ca04a001-cred-0004-0001-000000000001
status: stable
description: |
  Detects enumeration of stored Windows credentials using cmdkey or vaultcmd.
  These tools can list credentials stored in the Windows Credential Manager,
  which may include RDP passwords, web credentials, and domain logon tokens.
references:
  - https://attack.mitre.org/techniques/T1555/004/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.credential_access
  - attack.t1555.004
logsource:
  category: process_creation
  product: windows
detection:
  selection_cmdkey:
    Image|endswith: '\cmdkey.exe'
    CommandLine|contains: '/list'
  selection_vaultcmd:
    Image|endswith: '\vaultcmd.exe'
    CommandLine|contains:
      - '/listcreds'
      - '/list'
  filter_system:
    ParentImage|endswith:
      - '\svchost.exe'
      - '\explorer.exe'
    User|contains: 'SYSTEM'
  condition: (selection_cmdkey or selection_vaultcmd) and not filter_system
falsepositives:
  - Legitimate administrative credential auditing
  - IT helpdesk scripts that manage stored credentials
level: medium

---
title: Credential Vault File Access
id: ca04a002-cred-0004-0002-000000000002
status: stable
description: |
  Detects direct file access to Windows Credential Manager vault files on disk.
  The credentials are stored under the user profile and can be extracted
  offline by tools like mimikatz dpapi::cred.
references:
  - https://attack.mitre.org/techniques/T1555/004/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.credential_access
  - attack.t1555.004
logsource:
  category: file_event
  product: windows
detection:
  selection:
    TargetFilename|contains:
      - '\Microsoft\Credentials\'
      - '\Microsoft\Vault\'
      - '\Microsoft\Protect\'
  filter_system:
    Image|endswith:
      - '\lsass.exe'
      - '\svchost.exe'
      - '\explorer.exe'
  condition: selection and not filter_system
falsepositives:
  - Credential Guard normal operations
  - Backup software accessing profile data
level: medium
