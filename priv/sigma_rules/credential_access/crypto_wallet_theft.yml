title: Telegram Session Theft via tdata Access
id: ca08a010-cryp-0002-0002-000000000004
status: stable
description: |
  Detects non-Telegram processes accessing tdata folder which contains
  session data. Theft enables session hijacking without credentials.
references:
  - https://attack.mitre.org/techniques/T1539/
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.credential_access
  - attack.t1539
logsource:
  category: file_event
  product: windows
detection:
  selection:
    TargetFilename|contains:
      - '\Telegram Desktop\tdata\'
  filter_telegram:
    Image|endswith:
      - '\Telegram.exe'
      - '\Updater.exe'
  condition: selection and not filter_telegram
falsepositives:
  - Telegram Desktop updater
level: high

