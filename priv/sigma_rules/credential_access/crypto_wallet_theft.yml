title: Browser Credential Decryption via DPAPI
id: ca08a010-cryp-0006-0001-000000000008
status: stable
description: |
  Detects processes calling DPAPI decryption functions while accessing
  browser credential files. Chrome and Edge use DPAPI to protect credentials.
references:
  - https://attack.mitre.org/techniques/T1555/003/
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.credential_access
  - attack.t1555.003
logsource:
  category: process_creation
  product: windows
detection:
  selection_dpapi:
    CommandLine|contains:
      - 'CryptUnprotectData'
      - 'System.Security.Cryptography.ProtectedData'
      - 'Unprotect'
  selection_browser_path:
    CommandLine|contains:
      - 'Chrome\User Data'
      - 'Edge\User Data'
      - 'BraveSoftware\Brave-Browser'
      - 'Local State'
  filter_browser:
    Image|endswith:
      - '\chrome.exe'
      - '\msedge.exe'
      - '\brave.exe'
  condition: selection_dpapi and selection_browser_path and not filter_browser
falsepositives:
  - Password manager sync
  - Browser migration tools
level: critical
