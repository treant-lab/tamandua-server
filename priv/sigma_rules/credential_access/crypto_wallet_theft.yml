title: Crypto Wallet Extension Data Access
id: ca08a010-cryp-0001-0001-000000000001
status: stable
description: |
  Detects non-browser processes accessing Chromium browser extension data for
  cryptocurrency wallets. Infostealers like Lumma, Vidar, and RedLine target
  wallet extensions (MetaMask, Phantom, Solflare) to steal private keys and
  seed phrases.
references:
  - https://attack.mitre.org/techniques/T1528/
  - https://malpedia.caad.fkie.fraunhofer.de/details/win.lumma
author: Tamandua EDR
author_pubkey: TamDevBounty1111111111111111111111111111111
date: 2026/05/08
tags:
  - attack.credential_access
  - attack.t1528
  - attack.t1555.003
  - web3
  - crypto
logsource:
  category: file_event
  product: windows
detection:
  selection_metamask:
    TargetFilename|contains:
      - '\Local Extension Settings\nkbihfbeogaeaoehlefnkodbefgpgknn'
      - '\IndexedDB\chrome-extension_nkbihfbeogaeaoehlefnkodbefgpgknn'
  selection_phantom:
    TargetFilename|contains:
      - '\Local Extension Settings\bfnaelmomeimhlpmgjnjophhpkkoljpa'
      - '\IndexedDB\chrome-extension_bfnaelmomeimhlpmgjnjophhpkkoljpa'
  selection_solflare:
    TargetFilename|contains:
      - '\Local Extension Settings\bhhhlbepdkbapadjdnnojkbgioiodbic'
      - '\IndexedDB\chrome-extension_bhhhlbepdkbapadjdnnojkbgioiodbic'
  selection_backpack:
    TargetFilename|contains:
      - '\Local Extension Settings\aflkmfhebedbjioipglgcbcmnbpgliof'
      - '\IndexedDB\chrome-extension_aflkmfhebedbjioipglgcbcmnbpgliof'
  selection_coinbase:
    TargetFilename|contains:
      - '\Local Extension Settings\hnfanknocfeofbddgcijnmhnfnkdnaad'
      - '\IndexedDB\chrome-extension_hnfanknocfeofbddgcijnmhnfnkdnaad'
  selection_trust:
    TargetFilename|contains:
      - '\Local Extension Settings\egjidjbpglichdcondbcbdnbeeppgdph'
  selection_exodus:
    TargetFilename|contains:
      - '\Local Extension Settings\aholpfdialjgjfhomihkjbmgjidlcdno'
  selection_brave_wallet:
    TargetFilename|contains:
      - '\Local Extension Settings\odbfpeeihdkbihmopkbjmoonfanlbfcl'
  filter_browser:
    Image|endswith:
      - '\chrome.exe'
      - '\msedge.exe'
      - '\brave.exe'
      - '\opera.exe'
      - '\vivaldi.exe'
  filter_update:
    Image|endswith: '\update.exe'
  condition: (selection_metamask or selection_phantom or selection_solflare or selection_backpack or selection_coinbase or selection_trust or selection_exodus or selection_brave_wallet) and not (filter_browser or filter_update)
falsepositives:
  - Browser extensions for wallet management
  - Legitimate backup utilities
level: critical

