title: Solana Wallet File Access
id: ca08a010-cryp-0001-0002-000000000002
status: stable
description: |
  Detects access to Solana wallet keypair files and configuration.
  Solana CLI stores keypairs in ~/.config/solana/ as JSON files.
  Theft of these files allows complete wallet compromise.
references:
  - https://attack.mitre.org/techniques/T1552/001/
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.credential_access
  - attack.t1552.001
  - web3
  - solana
logsource:
  category: file_event
  product: windows
detection:
  selection_windows:
    TargetFilename|contains:
      - '\.config\solana\id.json'
      - '\.config\solana\devnet.json'
      - '\.config\solana\mainnet-beta.json'
      - '\solana-wallet'
      - '\solana\keypair'
  filter_cli:
    Image|endswith:
      - '\solana.exe'
      - '\anchor.exe'
      - '\node.exe'
      - '\cargo.exe'
  condition: selection_windows and not filter_cli
falsepositives:
  - Solana CLI operations
  - Development tools
level: critical

