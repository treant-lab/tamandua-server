title: Discord Token Theft via File Access
id: ca08a010-cryp-0002-0001-000000000003
status: stable
description: |
  Detects non-Discord processes accessing Discord local storage where
  authentication tokens are stored. Common target of infostealers.
references:
  - https://attack.mitre.org/techniques/T1528/
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.credential_access
  - attack.t1528
logsource:
  category: file_event
  product: windows
detection:
  selection:
    TargetFilename|contains:
      - '\discord\Local Storage\leveldb'
      - '\discordcanary\Local Storage\leveldb'
      - '\discordptb\Local Storage\leveldb'
  filter_discord:
    Image|endswith:
      - '\Discord.exe'
      - '\DiscordCanary.exe'
      - '\DiscordPTB.exe'
      - '\Update.exe'
  condition: selection and not filter_discord
falsepositives:
  - Discord backup tools
level: high

