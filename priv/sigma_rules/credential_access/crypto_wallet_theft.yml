title: Infostealer SQLite Browser Query
id: ca08a010-cryp-0003-0001-000000000005
status: stable
description: |
  Detects processes loading SQLite DLLs and accessing browser credential
  databases. Infostealers extract credentials via direct SQLite queries.
references:
  - https://attack.mitre.org/techniques/T1555/003/
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.credential_access
  - attack.t1555.003
logsource:
  category: process_creation
  product: windows
detection:
  selection_sqlite:
    CommandLine|contains:
      - 'SELECT * FROM logins'
      - 'SELECT * FROM cookies'
      - 'SELECT * FROM autofill'
      - 'SELECT * FROM credit_cards'
      - 'SELECT origin_url'
      - 'SELECT password_value'
      - 'SELECT encrypted_value'
  filter_backup:
    ParentImage|endswith:
      - '\chrome.exe'
      - '\firefox.exe'
      - '\msedge.exe'
  condition: selection_sqlite and not filter_backup
falsepositives:
  - Browser sync utilities
  - Password manager imports
level: critical

---
title: Infostealer C2 Communication Pattern
id: ca08a010-cryp-0004-0001-000000000006
status: stable
description: |
  Detects network connections matching common infostealer C2 patterns
  including data exfiltration endpoints and configuration retrieval.
references:
  - https://attack.mitre.org/techniques/T1041/
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.exfiltration
  - attack.t1041
  - attack.command_and_control
  - attack.t1071.001
logsource:
  category: network_connection
  product: windows
detection:
  selection_endpoints:
    DestinationHostname|contains:
      - '/gate.php'
      - '/api/data'
      - '/panel/'
      - '/c2/'
      - 'grabber'
      - 'stealer'
  selection_params:
    DestinationHostname|contains:
      - 'hwid='
      - 'lid='
      - 'build_id='
      - 'machineId='
  filter_legit:
    DestinationHostname|endswith:
      - '.microsoft.com'
      - '.google.com'
      - '.apple.com'
      - '.mozilla.org'
  condition: (selection_endpoints or selection_params) and not filter_legit
falsepositives:
  - Legitimate applications using similar URL patterns
level: high

---
title: Clipboard Crypto Address Hijacking
id: ca08a010-cryp-0005-0001-000000000007
status: stable
description: |
  Detects potential clipboard hijacking behavior targeting cryptocurrency
  addresses. Clipper malware monitors clipboard for wallet addresses and
  replaces them with attacker-controlled addresses.
references:
  - https://attack.mitre.org/techniques/T1115/
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.collection
  - attack.t1115
  - web3
logsource:
  category: process_creation
  product: windows
detection:
  selection_clipboard_api:
    CommandLine|contains:
      - 'GetClipboardData'
      - 'SetClipboardData'
      - 'OpenClipboard'
      - 'CloseClipboard'
  selection_crypto_pattern:
    CommandLine|re:
      - '(bc1|[13])[a-zA-HJ-NP-Z0-9]{25,39}'  # Bitcoin
      - '0x[a-fA-F0-9]{40}'  # Ethereum
      - '[1-9A-HJ-NP-Za-km-z]{32,44}'  # Solana
  condition: selection_clipboard_api and selection_crypto_pattern
falsepositives:
  - Cryptocurrency applications
  - Development tools
level: medium

