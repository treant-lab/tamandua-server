title: Jupyter Notebook with Hardcoded Credentials Pattern
id: cred-ml-007-notebook-hardcode
status: stable
description: Detects patterns indicating hardcoded credentials in notebook execution
author: Tamandua Security Team
date: 2026/04/05
references:
    - https://attack.mitre.org/techniques/T1552/001/
logsource:
    category: process_creation
    product: any
detection:
    selection_notebook:
        ParentImage|contains:
            - 'jupyter'
            - 'ipykernel'
    selection_hardcode:
        CommandLine|contains:
            - 'api_key = "'
            - "api_key = '"
            - 'token = "'
            - "token = '"
            - 'secret = "'
            - "secret = '"
            - 'password = "'
            - "password = '"
    condition: selection_notebook and selection_hardcode
falsepositives:
    - Variable assignment with placeholder values
level: high
tags:
    - attack.credential_access
    - attack.t1552.001
    - ml_security
