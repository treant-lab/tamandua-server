title: Jupyter Process Accessing Credential Files
id: cred-ml-004-jupyter-cred-access
status: stable
description: Detects Jupyter notebook kernel reading credential or config files
author: Tamandua Security Team
date: 2026/04/05
references:
    - https://attack.mitre.org/techniques/T1552/001/
logsource:
    category: file_access
    product: any
detection:
    selection_jupyter:
        ProcessName|contains:
            - 'jupyter'
            - 'ipykernel'
            - 'python'
    selection_cred_files:
        TargetFilename|endswith:
            - '.env'
            - 'credentials.json'
            - 'credentials.yaml'
            - 'secrets.json'
            - 'secrets.yaml'
            - '.aws/credentials'
            - '.huggingface/token'
    condition: selection_jupyter and selection_cred_files
falsepositives:
    - Legitimate credential loading for authenticated APIs
level: medium
tags:
    - attack.credential_access
    - attack.t1552.001
    - ml_security

