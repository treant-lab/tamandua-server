title: ML Process Credential Exfiltration Attempt
id: cred-ml-006-exfiltration
status: stable
description: Detects ML/Python processes accessing credential storage and making network connections
author: Tamandua Security Team
date: 2026/04/05
references:
    - https://attack.mitre.org/techniques/T1552/001/
    - https://attack.mitre.org/techniques/T1041/
logsource:
    category: process_creation
    product: any
detection:
    selection_process:
        Image|endswith:
            - '/python'
            - '/python3'
            - '\python.exe'
    selection_cred_access:
        CommandLine|contains:
            - 'keyring'
            - 'credential'
            - 'secret'
            - 'getpass'
            - 'netrc'
    selection_network:
        CommandLine|contains:
            - 'requests.post'
            - 'urllib'
            - 'httpx'
            - 'aiohttp'
    condition: selection_process and selection_cred_access and selection_network
falsepositives:
    - Legitimate API authentication flows
level: high
tags:
    - attack.credential_access
    - attack.t1552.001
    - attack.exfiltration
    - attack.t1041
    - ml_security

