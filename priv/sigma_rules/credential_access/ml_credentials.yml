title: Model Download with Exposed Authentication Token
id: cred-ml-005-model-download-token
status: stable
description: Detects model downloads with authentication tokens visible in command
author: Tamandua Security Team
date: 2026/04/05
references:
    - https://attack.mitre.org/techniques/T1552/001/
logsource:
    category: process_creation
    product: any
detection:
    selection_download:
        CommandLine|contains:
            - 'huggingface-cli download'
            - 'transformers-cli'
            - 'from_pretrained'
            - 'snapshot_download'
    selection_token:
        CommandLine|contains:
            - '--token'
            - 'token='
            - 'HF_TOKEN'
    condition: selection_download and selection_token
falsepositives:
    - Token passed via environment variable (safer)
level: medium
tags:
    - attack.credential_access
    - attack.t1552.001
    - ml_security

