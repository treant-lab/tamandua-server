title: ML API Key Exposure in Process Environment
id: cred-ml-001-env-exposure
status: stable
description: Detects ML service API keys (HuggingFace, OpenAI, Anthropic) in process environment variables
author: Tamandua Security Team
date: 2026/04/05
references:
    - https://attack.mitre.org/techniques/T1552/001/
logsource:
    category: process_creation
    product: any
detection:
    selection_env_vars:
        Environment|contains:
            - 'HF_TOKEN='
            - 'OPENAI_API_KEY='
            - 'ANTHROPIC_API_KEY='
            - 'COHERE_API_KEY='
            - 'REPLICATE_API_TOKEN='
            - 'GOOGLE_API_KEY='
    condition: selection_env_vars
falsepositives:
    - Legitimate ML applications with properly secured credentials
level: high
tags:
    - attack.credential_access
    - attack.t1552.001
    - ml_security

---
title: AWS Credentials in ML/Python Process
id: cred-ml-002-aws-ml-process
status: stable
description: Detects AWS credentials exposed in Python/ML process environment
author: Tamandua Security Team
date: 2026/04/05
references:
    - https://attack.mitre.org/techniques/T1552/001/
logsource:
    category: process_creation
    product: any
detection:
    selection_ml_process:
        Image|endswith:
            - '/python'
            - '/python3'
            - '\python.exe'
            - '\python3.exe'
            - '/jupyter'
            - '\jupyter.exe'
            - '/ollama'
            - '\ollama.exe'
    selection_aws:
        Environment|contains:
            - 'AWS_ACCESS_KEY_ID='
            - 'AWS_SECRET_ACCESS_KEY='
    condition: selection_ml_process and selection_aws
falsepositives:
    - Legitimate AWS SDK usage with IAM roles
level: critical
tags:
    - attack.credential_access
    - attack.t1552.001
    - ml_security

---
title: Hardcoded ML API Key in Command Line
id: cred-ml-003-cmdline-key
status: stable
description: Detects ML API keys passed directly on command line (dangerous exposure)
author: Tamandua Security Team
date: 2026/04/05
references:
    - https://attack.mitre.org/techniques/T1552/001/
logsource:
    category: process_creation
    product: any
detection:
    selection_cmdline:
        CommandLine|re:
            - 'sk-[a-zA-Z0-9]{48}'
            - 'hf_[a-zA-Z0-9]{34}'
            - 'sk-ant-[a-zA-Z0-9\\-]{48}'
            - 'AKIA[0-9A-Z]{16}'
            - 'AIza[0-9A-Za-z\\-_]{35}'
    condition: selection_cmdline
falsepositives:
    - Intentional key passing (poor security practice)
level: critical
tags:
    - attack.credential_access
    - attack.t1552.001
    - ml_security

