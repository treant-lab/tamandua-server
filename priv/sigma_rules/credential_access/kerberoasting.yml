title: Kerberoasting via SetSPN
id: ca05a001-kerb-0005-0001-000000000001
status: stable
description: |
  Detects Kerberoasting reconnaissance using setspn.exe to enumerate service
  principal names (SPNs). Kerberoasting involves requesting TGS tickets for
  service accounts and cracking them offline to recover plaintext passwords.
  Enumeration of SPNs is typically the first step.
references:
  - https://attack.mitre.org/techniques/T1558/003/
  - https://adsecurity.org/?p=2293
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.credential_access
  - attack.t1558.003
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\setspn.exe'
    CommandLine|contains:
      - '-Q '
      - '-T '
      - '-q '
      - '-t '
      - '-F'
  filter_system:
    User|contains: 'SYSTEM'
    ParentImage|endswith: '\services.exe'
  condition: selection and not filter_system
falsepositives:
  - Legitimate SPN management by Active Directory administrators
level: medium

