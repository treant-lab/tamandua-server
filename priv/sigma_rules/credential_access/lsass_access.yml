title: LSASS Memory Access via Suspicious Process
id: ca01a001-lsas-0001-0001-000000000001
status: stable
description: |
  Detects processes accessing LSASS memory with read permissions indicative of
  credential dumping. Adversaries use tools like Mimikatz, ProcDump, and custom
  loaders to read LSASS memory and extract plaintext credentials, NTLM hashes,
  and Kerberos tickets. This rule targets the specific access masks associated
  with memory reads (PROCESS_VM_READ, PROCESS_QUERY_INFORMATION).
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4663
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  category: process_access
  product: windows
detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess|contains:
      - '0x1010'
      - '0x1410'
      - '0x1438'
      - '0x143a'
      - '0x1fffff'
      - '0x1f0fff'
      - '0x1f1fff'
  filter_system:
    SourceImage|endswith:
      - '\csrss.exe'
      - '\lsm.exe'
      - '\wmiprvse.exe'
      - '\svchost.exe'
      - '\msiexec.exe'
      - '\wininit.exe'
      - '\services.exe'
  filter_av:
    SourceImage|contains:
      - '\MsMpEng.exe'
      - '\MpCopyAccelerator.exe'
      - '\Windows Defender\'
      - '\Crowdstrike\'
      - '\Carbon Black\'
      - '\SentinelOne\'
  filter_system_paths:
    SourceImage|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
      - 'C:\Program Files\Windows Defender\'
  condition: selection and not (filter_system or filter_av or filter_system_paths)
falsepositives:
  - Legitimate endpoint security products scanning LSASS
  - Windows Credential Guard processes
  - System diagnostics tools (e.g., Process Monitor)
level: high

