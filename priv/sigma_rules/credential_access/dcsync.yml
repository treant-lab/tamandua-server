title: DCSync Attack via Directory Replication
id: ca06a001-dcsy-0006-0001-000000000001
status: stable
description: |
  Detects DCSync attacks where a non-domain-controller host requests Active
  Directory replication data. This is performed using the DRSGetNCChanges
  function, which returns password hashes for all domain accounts. The
  detection focuses on Event ID 4662 with the replication-related
  Access Control Entries (ACEs).
references:
  - https://attack.mitre.org/techniques/T1003/006/
  - https://adsecurity.org/?p=1729
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.credential_access
  - attack.t1003.006
logsource:
  category: security
  product: windows
detection:
  selection:
    EventID: 4662
    AccessMask: '0x100'
    Properties|contains:
      - '1131f6aa-9c07-11d1-f79f-00c04fc2dcd2'
      - '1131f6ad-9c07-11d1-f79f-00c04fc2dcd2'
      - '89e95b76-444d-4c62-991a-0facbeda640c'
  filter_machine_accounts:
    SubjectUserName|endswith: '$'
  condition: selection and not filter_machine_accounts
falsepositives:
  - Legitimate domain controller replication
  - Azure AD Connect synchronization
level: critical

---
title: DCSync Attack via Mimikatz Lsadump
id: ca06a002-dcsy-0006-0002-000000000002
status: stable
description: |
  Detects DCSync attacks performed via Mimikatz lsadump::dcsync commands.
  This rule catches the command-line patterns used to invoke DCSync
  functionality through Mimikatz.
references:
  - https://attack.mitre.org/techniques/T1003/006/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.credential_access
  - attack.t1003.006
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'lsadump::dcsync'
      - 'lsadump::lsa /inject'
      - 'lsadump::lsa /patch'
      - 'lsadump::trust /patch'
  filter_pentest:
    ParentImage|contains: '\pentest\'
  condition: selection and not filter_pentest
falsepositives:
  - Authorized red team exercises
level: critical
