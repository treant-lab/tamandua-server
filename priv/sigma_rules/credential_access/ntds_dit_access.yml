title: NTDS.dit Copy via Volume Shadow Copy
id: ca03a002-ntds-0003-0002-000000000002
status: stable
description: |
  Detects creation of volume shadow copies followed by access to NTDS.dit.
  Adversaries use vssadmin or diskshadow to create shadow copies and then
  copy the NTDS.dit file from the shadow volume.
references:
  - https://attack.mitre.org/techniques/T1003/003/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.credential_access
  - attack.t1003.003
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains: 'create shadow'
  selection_diskshadow:
    Image|endswith: '\diskshadow.exe'
  selection_copy_ntds:
    CommandLine|contains:
      - 'ntds.dit'
      - 'NTDS.DIT'
  filter_backup:
    ParentImage|endswith:
      - '\wbengine.exe'
      - '\vssvc.exe'
  condition: (selection_vssadmin or selection_diskshadow or selection_copy_ntds) and not filter_backup
falsepositives:
  - Legitimate Active Directory backup operations
  - Volume shadow copy management by backup software
level: critical

---
title: NTDS.dit Access via Esentutl
id: ca03a003-ntds-0003-0003-000000000003
status: stable
description: |
  Detects use of esentutl.exe to copy or repair the NTDS.dit database file.
  Esentutl is the built-in ESE database utility and can copy locked database
  files, making it a stealthy alternative to shadow copy methods.
references:
  - https://attack.mitre.org/techniques/T1003/003/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.credential_access
  - attack.t1003.003
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\esentutl.exe'
    CommandLine|contains:
      - 'ntds'
      - 'NTDS'
  filter_system:
    ParentImage|endswith:
      - '\lsass.exe'
      - '\ntdsutil.exe'
  condition: selection and not filter_system
falsepositives:
  - Authorized AD database maintenance
level: high
