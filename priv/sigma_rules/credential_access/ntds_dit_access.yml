title: NTDS.dit Extraction via Ntdsutil
id: ca03a001-ntds-0003-0001-000000000001
status: stable
description: |
  Detects use of ntdsutil.exe to create an IFM (Install From Media) snapshot,
  which copies the NTDS.dit database containing all Active Directory password
  hashes. This is a standard technique for offline domain credential extraction.
references:
  - https://attack.mitre.org/techniques/T1003/003/
  - https://docs.microsoft.com/en-us/previous-versions/windows/it-pro/windows-server-2012-R2-and-2012/cc753343(v=ws.11)
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.credential_access
  - attack.t1003.003
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\ntdsutil.exe'
    CommandLine|contains:
      - 'ifm'
      - 'create full'
      - 'ac i ntds'
      - 'activate instance ntds'
  filter_legit:
    ParentImage|endswith: '\dcpromo.exe'
  condition: selection and not filter_legit
falsepositives:
  - Legitimate domain controller promotion (dcpromo)
  - Authorized AD backup procedures
level: critical

