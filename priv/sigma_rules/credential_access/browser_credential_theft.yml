title: Browser Credential Database Access
id: ca08a001-brow-0008-0001-000000000001
status: stable
description: |
  Detects processes accessing browser credential storage files. Chrome, Edge,
  Firefox, and other browsers store credentials in SQLite databases or JSON
  files under the user profile. Credential stealers like LaZagne, SharpChrome,
  and RedLine target these files directly.
references:
  - https://attack.mitre.org/techniques/T1555/003/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.credential_access
  - attack.t1555.003
logsource:
  category: file_event
  product: windows
detection:
  selection_chrome:
    TargetFilename|contains:
      - '\Google\Chrome\User Data\Default\Login Data'
      - '\Google\Chrome\User Data\Default\Cookies'
      - '\Google\Chrome\User Data\Local State'
  selection_edge:
    TargetFilename|contains:
      - '\Microsoft\Edge\User Data\Default\Login Data'
      - '\Microsoft\Edge\User Data\Default\Cookies'
  selection_firefox:
    TargetFilename|contains:
      - '\Mozilla\Firefox\Profiles\'
    TargetFilename|endswith:
      - '\logins.json'
      - '\key4.db'
      - '\key3.db'
      - '\cookies.sqlite'
  filter_browser:
    Image|endswith:
      - '\chrome.exe'
      - '\msedge.exe'
      - '\firefox.exe'
      - '\brave.exe'
      - '\opera.exe'
      - '\vivaldi.exe'
      - '\update.exe'
  filter_av:
    Image|contains:
      - '\Windows Defender\'
      - '\MsMpEng.exe'
  condition: (selection_chrome or selection_edge or selection_firefox) and not (filter_browser or filter_av)
falsepositives:
  - Browser profile migration tools
  - Password manager synchronization
  - Browser update processes
level: high

---
title: Browser Credential Theft via PowerShell
id: ca08a002-brow-0008-0002-000000000002
status: stable
description: |
  Detects PowerShell commands used to extract browser credentials by reading
  the Chrome/Edge SQLite credential databases or decrypting stored passwords
  using DPAPI.
references:
  - https://attack.mitre.org/techniques/T1555/003/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.credential_access
  - attack.t1555.003
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Login Data'
      - 'Chrome\User Data'
      - 'Edge\User Data'
      - 'Cookies'
      - 'System.Security.Cryptography.ProtectedData'
      - 'Unprotect'
      - 'CryptUnprotectData'
  filter_update:
    ParentImage|endswith: '\update.exe'
  condition: selection and not filter_update
falsepositives:
  - Legitimate DPAPI operations by IT management tools
level: high
