title: Data Encryption for Impact
id: 4a024acc-0123-a456-789a-012345678901
status: experimental
description: Detects mass file encryption patterns
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: file_event
    product: windows
detection:
    selection:
        TargetFilename|endswith:
            - '.encrypted'
            - '.locked'
            - '.crypt'
            - '.crypto'
            - '.enc'
            - '.crypted'
            - '.pay'
            - '.ransom'
    condition: selection
falsepositives:
    - Legitimate encryption software
level: critical
tags:
    - attack.impact
    - attack.t1486

---
title: Ransomware Note Creation
id: 5b135bdd-1234-b567-89ab-123456789012
status: experimental
description: Detects ransomware note file creation
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: file_event
    product: windows
detection:
    selection:
        TargetFilename|contains:
            - 'README'
            - 'DECRYPT'
            - 'RECOVER'
            - 'RESTORE'
            - 'HOW_TO'
            - 'HELP_'
            - '_HELP'
        TargetFilename|endswith:
            - '.txt'
            - '.html'
            - '.hta'
    filter:
        TargetFilename|contains:
            - '\Program Files'
            - '\Windows'
    condition: selection and not filter
falsepositives:
    - Legitimate documentation
level: high
tags:
    - attack.impact
    - attack.t1486

