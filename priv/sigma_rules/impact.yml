---
title: Disk Wiper Indicators
id: 8e468eaa-4567-e89a-bcde-456789012345
status: experimental
description: Detects potential disk wiping activity
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection_format:
        Image|endswith: '\format.exe'
        CommandLine|contains: '/y'
    selection_diskpart:
        Image|endswith: '\diskpart.exe'
        CommandLine|contains:
            - 'clean'
            - 'delete'
    selection_cipher:
        Image|endswith: '\cipher.exe'
        CommandLine|contains: '/w:'
    condition: selection_format or selection_diskpart or selection_cipher
falsepositives:
    - Legitimate disk management
level: high
tags:
    - attack.impact
    - attack.t1561

