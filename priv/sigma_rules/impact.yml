title: Account Lockout via Net User
id: 9f579fbb-5678-f9ab-cdef-567890123456
status: experimental
description: Detects account lockout attempts
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\net.exe'
            - '\net1.exe'
        CommandLine|contains|all:
            - 'user'
            - '/active:no'
    condition: selection
falsepositives:
    - Legitimate account management
level: medium
tags:
    - attack.impact
    - attack.t1531
