title: BCDEdit Boot Configuration Tampering
id: 28e028aa-ef01-8234-5678-890123456789
status: experimental
description: Detects BCDEdit abuse to disable recovery
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\bcdedit.exe'
        CommandLine|contains:
            - 'recoveryenabled no'
            - 'bootstatuspolicy ignoreallfailures'
            - 'safeboot'
    condition: selection
falsepositives:
    - Legitimate system configuration
level: critical
tags:
    - attack.impact
    - attack.t1490

