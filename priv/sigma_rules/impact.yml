title: Service Stop via Net
id: 6c246cee-2345-c678-9abc-234567890123
status: experimental
description: Detects stopping of critical services
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\net.exe'
            - '\net1.exe'
        CommandLine|contains: 'stop'
    filter:
        CommandLine|contains:
            - 'spooler'
    condition: selection and not filter
falsepositives:
    - Legitimate service management
level: medium
tags:
    - attack.impact
    - attack.t1489

