title: Shadow Copy Deletion via Vssadmin
id: 06ce06ee-cdef-6012-3456-678901234567
status: experimental
description: Detects shadow copy deletion typical of ransomware
author: Tamandua Security Team
date: 2024/01/15
references:
    - https://attack.mitre.org/techniques/T1490/
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\vssadmin.exe'
        CommandLine|contains:
            - 'delete shadows'
            - 'resize shadowstorage'
    condition: selection
falsepositives:
    - Legitimate backup maintenance
level: critical
tags:
    - attack.impact
    - attack.t1490

