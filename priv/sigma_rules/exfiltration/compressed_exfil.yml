title: Suspicious Archive Creation Before Network Activity
id: ef04a001-comp-0004-0001-000000000001
status: stable
description: |
  Detects creation of password-protected archives using 7-Zip or WinRAR
  with password flags, which is a common data staging technique before
  exfiltration. Password protection prevents DLP solutions from inspecting
  archive contents.
references:
  - https://attack.mitre.org/techniques/T1560/001/
  - https://attack.mitre.org/techniques/T1048/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.exfiltration
  - attack.collection
  - attack.t1560.001
  - attack.t1048
logsource:
  category: process_creation
  product: windows
detection:
  selection_7z:
    Image|endswith:
      - '\7z.exe'
      - '\7za.exe'
    CommandLine|contains:
      - '-p'
      - '-mhe=on'
  selection_rar:
    Image|endswith: '\rar.exe'
    CommandLine|contains:
      - '-hp'
      - '-p'
  selection_output:
    CommandLine|contains:
      - '\Temp\'
      - '\AppData\'
      - '\Users\Public\'
      - '\ProgramData\'
  filter_backup:
    ParentImage|contains:
      - '\backup\'
      - '\7-Zip\'
      - '\WinRAR\'
  condition: (selection_7z or selection_rar) and selection_output and not filter_backup
falsepositives:
  - Legitimate password-protected archive creation
  - Backup automation scripts
level: high
