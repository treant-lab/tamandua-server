title: Browser Credential Store Access
id: 9a1b2c3d-4e5f-6789-abcd-ef0123456020
status: experimental
description: Detects access to browser credential stores
references:
  - https://attack.mitre.org/techniques/T1555/003/
author: Tamandua Security
date: 2025/05/08
logsource:
  product: windows
  category: file_access
detection:
  selection_chrome:
    TargetFilename|contains:
      - '\Google\Chrome\User Data\Default\Login Data'
      - '\Google\Chrome\User Data\Default\Cookies'
      - '\Google\Chrome\User Data\Local State'
  selection_firefox:
    TargetFilename|contains:
      - '\Mozilla\Firefox\Profiles\'
    TargetFilename|endswith:
      - '\logins.json'
      - '\key4.db'
      - '\cookies.sqlite'
  selection_edge:
    TargetFilename|contains:
      - '\Microsoft\Edge\User Data\Default\Login Data'
  filter:
    Image|endswith:
      - '\chrome.exe'
      - '\firefox.exe'
      - '\msedge.exe'
  condition: (selection_chrome or selection_firefox or selection_edge) and not filter
falsepositives:
  - Browser sync features
  - Password managers
level: high
tags:
  - attack.credential_access
  - attack.t1555.003

