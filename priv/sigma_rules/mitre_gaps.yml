title: Covert Channel via DNS
id: 9a1b2c3d-4e5f-6789-abcd-ef0123456021
status: experimental
description: Detects potential DNS tunneling for data exfiltration
references:
  - https://attack.mitre.org/techniques/T1048/003/
author: Tamandua Security
date: 2025/05/08
logsource:
  product: windows
  category: dns_query
detection:
  selection:
    QueryName|re: '^[a-zA-Z0-9]{30,}\.'  # Long subdomain
  selection_txt:
    QueryType: 'TXT'
    QueryName|contains: '.'
  condition: selection or selection_txt
falsepositives:
  - CDN services
  - Cloud services
level: medium
tags:
  - attack.exfiltration
  - attack.t1048.003

