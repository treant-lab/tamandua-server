description: Detects account manipulation for persistence
references:
  - https://attack.mitre.org/techniques/T1098/
author: Tamandua Security
date: 2025/05/08
logsource:
  product: windows
  category: process_creation
detection:
  selection_net:
    CommandLine|contains:
      - 'net user'
      - 'net localgroup'
      - 'net group'
    CommandLine|contains:
      - '/add'
      - '/domain'
  selection_powershell:
    CommandLine|contains:
      - 'Add-LocalGroupMember'
      - 'Add-ADGroupMember'
      - 'New-LocalUser'
      - 'Set-LocalUser'
  condition: selection_net or selection_powershell
falsepositives:
  - Legitimate user management
level: medium
tags:
  - attack.persistence
  - attack.t1098

