# Tamandua EDR - MITRE ATT&CK Gap Coverage Rules
# Addresses gaps identified in MITRE coverage analysis
# Priority techniques without existing detection rules

title: LSA Secrets Dumping via Registry
id: 9a1b2c3d-4e5f-6789-abcd-ef0123456001
status: experimental
description: Detects access to LSA secrets in registry which may indicate credential dumping
references:
  - https://attack.mitre.org/techniques/T1003/004/
author: Tamandua Security
date: 2025/05/08
logsource:
  product: windows
  category: registry_access
detection:
  selection:
    TargetObject|contains:
      - 'SECURITY\Policy\Secrets'
      - 'SECURITY\Cache'
      - 'SAM\SAM\Domains\Account'
  filter:
    Image|endswith:
      - '\lsass.exe'
      - '\services.exe'
  condition: selection and not filter
falsepositives:
  - Legitimate backup software
  - System administration tools
level: high
tags:
  - attack.credential_access
  - attack.t1003.004

