title: Thread Execution Hijacking
id: 9a1b2c3d-4e5f-6789-abcd-ef0123456005
status: experimental
description: Detects potential thread execution hijacking via suspicious API calls
references:
  - https://attack.mitre.org/techniques/T1055/003/
author: Tamandua Security
date: 2025/05/08
logsource:
  product: windows
  category: process_access
detection:
  selection:
    CallTrace|contains:
      - 'SuspendThread'
      - 'SetThreadContext'
      - 'ResumeThread'
  filter:
    SourceImage|endswith:
      - '\MsMpEng.exe'
      - '\csrss.exe'
  condition: selection and not filter
falsepositives:
  - Debuggers
  - Security software
level: high
tags:
  - attack.privilege_escalation
  - attack.t1055.003

