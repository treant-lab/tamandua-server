title: Linux Proc Filesystem Credential Access
id: 9a1b2c3d-4e5f-6789-abcd-ef0123456003
status: experimental
description: Detects reading of process memory via /proc for credential extraction
references:
  - https://attack.mitre.org/techniques/T1003/007/
author: Tamandua Security
date: 2025/05/08
logsource:
  product: linux
  category: file_access
detection:
  selection:
    TargetFilename|contains:
      - '/proc/'
    TargetFilename|endswith:
      - '/mem'
      - '/maps'
      - '/environ'
  filter:
    Image|endswith:
      - '/gdb'
      - '/strace'
      - '/ltrace'
  condition: selection and not filter
falsepositives:
  - Debugging tools
  - System monitoring
level: medium
tags:
  - attack.credential_access
  - attack.t1003.007

