title: AI Runtime - Browser Credential Store Access from ML Process
id: runtime-ai-013
status: stable
description: Detects ML/AI processes accessing browser credential databases
author: Tamandua Security Team
date: 2026/04/07
references:
    - https://attack.mitre.org/techniques/T1555/003/
logsource:
    category: file_access
    product: any
detection:
    selection_ml_process:
        ProcessName|contains:
            - 'python'
            - 'ollama'
            - 'jupyter'
    selection_browser_db:
        TargetFilename|contains:
            - 'google-chrome/Default/Login Data'
            - 'firefox/Profiles'
            - 'Microsoft/Edge/User Data/Default/Login Data'
            - 'BraveSoftware/Brave-Browser/Default/Login Data'
            - 'Cookies'
            - 'Web Data'
    condition: selection_ml_process and selection_browser_db
falsepositives:
    - Browser automation tools
    - Password manager integrations
level: critical
tags:
    - attack.credential_access
    - attack.t1555.003
    - ai_security
    - mcp_abuse
