title: AI Runtime - Instruction Override Jailbreak
id: runtime-ai-022
status: stable
description: Detects instruction override patterns used for jailbreak attempts
author: Tamandua Security Team
date: 2026/04/07
references:
    - https://research.nccgroup.com/2022/12/05/exploring-prompt-injection-attacks/
logsource:
    category: llm_request
    product: tamandua
detection:
    selection_override:
        PromptPreview|contains:
            - 'from now on'
            - 'new role'
            - 'ignore your training'
            - 'forget your rules'
            - 'disregard guidelines'
            - 'bypass your programming'
    condition: selection_override
falsepositives:
    - Legitimate instruction updates in authorized contexts
level: medium
tags:
    - attack.defense_evasion
    - attack.t1562
    - ai_security
    - jailbreak
