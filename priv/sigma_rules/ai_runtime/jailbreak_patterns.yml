title: AI Runtime - Known Jailbreak Keywords
id: runtime-ai-020
status: stable
description: Detects known jailbreak keywords and phrases used to bypass LLM safety filters
author: Tamandua Security Team
date: 2026/04/07
references:
    - https://www.jailbreakchat.com/
    - https://learnprompting.org/docs/prompt_hacking/jailbreaking
logsource:
    category: llm_request
    product: tamandua
detection:
    selection_jailbreak:
        PromptPreview|contains:
            - 'DAN mode'
            - 'developer mode'
            - 'no restrictions'
            - 'bypass safety'
            - 'without limitations'
            - 'ignore safety'
            - 'disable filters'
    condition: selection_jailbreak
falsepositives:
    - Security research discussions
    - Educational content about AI safety
level: high
tags:
    - attack.defense_evasion
    - attack.t1562
    - ai_security
    - jailbreak

