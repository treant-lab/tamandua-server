title: AI Runtime - Persona Manipulation for Jailbreak
id: runtime-ai-021
status: stable
description: Detects persona manipulation attempts to enable restricted behaviors
author: Tamandua Security Team
date: 2026/04/07
references:
    - https://arxiv.org/abs/2308.03825
logsource:
    category: llm_request
    product: tamandua
detection:
    selection_persona:
        PromptPreview|contains:
            - 'evil mode'
            - 'unfiltered mode'
            - 'unrestricted AI'
            - 'no ethics'
            - 'without morals'
            - 'amoral assistant'
            - 'chaotic mode'
    condition: selection_persona
falsepositives:
    - Creative writing or fiction
    - Philosophy discussions
level: high
tags:
