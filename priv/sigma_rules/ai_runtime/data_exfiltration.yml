title: AI Runtime - Data Extraction Prompt with File Access
id: runtime-ai-016
status: stable
description: Detects LLM prompts containing data extraction keywords followed by file access
author: Tamandua Security Team
date: 2026/04/07
references:
    - https://attack.mitre.org/techniques/T1005/
logsource:
    category: llm_request
    product: tamandua
detection:
    selection_extraction_keywords:
        PromptPreview|contains:
            - 'read file'
            - 'get contents of'
            - 'extract data from'
            - 'fetch credentials'
            - 'retrieve secrets'
            - 'access configuration'
    selection_sensitive_paths:
        PromptPreview|contains:
            - '/etc/'
            - '.env'
            - 'credentials'
            - 'secrets'
            - '.aws'
            - '.ssh'
    timeframe: 30s
    condition: selection_extraction_keywords and selection_sensitive_paths | count() > 1
falsepositives:
    - Legitimate data processing workflows
    - Configuration management tools
level: high
tags:
    - attack.collection
    - attack.t1005
    - ai_security
    - correlation

