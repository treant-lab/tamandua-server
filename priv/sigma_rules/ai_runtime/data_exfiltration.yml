title: AI Runtime - High Volume LLM Request Enumeration
id: runtime-ai-017
status: stable
description: Detects unusually high volume of LLM requests indicating potential enumeration or abuse
author: Tamandua Security Team
date: 2026/04/07
references:
    - https://attack.mitre.org/techniques/T1087/
logsource:
    category: llm_request
    product: tamandua
detection:
    selection:
        Provider:
            - 'openai'
            - 'anthropic'
            - 'ollama'
            - 'huggingface'
    timeframe: 5m
    condition: selection | count() > 50
falsepositives:
    - Batch processing jobs
    - High-traffic applications
    - Load testing
level: medium
tags:
    - attack.discovery
    - attack.t1087
    - ai_security
    - anomaly
