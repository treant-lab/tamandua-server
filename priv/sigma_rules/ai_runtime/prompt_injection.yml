title: AI Runtime - Encoded Prompt Injection
id: runtime-ai-004
status: stable
description: Detects base64 or encoded injection patterns attempting to bypass filters
author: Tamandua Security Team
date: 2026/04/07
references:
    - https://research.nccgroup.com/2022/12/05/exploring-prompt-injection-attacks/
logsource:
    category: llm_request
    product: tamandua
detection:
    selection_base64:
        PromptPreview|re: '[A-Za-z0-9+/]{50,}={0,2}'
    selection_decode_keywords:
        PromptPreview|contains:
            - 'decode'
            - 'base64'
            - 'decrypt'
            - 'execute'
    condition: selection_base64 and selection_decode_keywords
falsepositives:
    - Legitimate base64-encoded data processing
level: high
tags:
    - attack.execution
    - attack.t1059
    - attack.defense_evasion
    - attack.t1027
    - ai_security
    - prompt_injection

