title: AI Runtime - Multi-Language Injection Patterns
id: runtime-ai-005
status: stable
description: Detects Unicode homoglyphs or RTL override characters used for prompt injection
author: Tamandua Security Team
date: 2026/04/07
references:
    - https://embracethered.com/blog/posts/2023/ai-injections-unicode/
logsource:
    category: llm_request
    product: tamandua
detection:
    selection_unicode:
        PromptPreview|re: '[\u202E\u202D\u200E\u200F]'
    selection_context:
        PromptPreview|contains:
            - 'ignore'
            - 'instructions'
            - 'override'
            - 'system'
    condition: selection_unicode and selection_context
falsepositives:
    - Legitimate multi-language text processing
level: high
tags:
    - attack.execution
    - attack.t1059
    - attack.defense_evasion
    - attack.t1027
    - ai_security
    - prompt_injection
