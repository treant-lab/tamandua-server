title: AI Runtime - Classic Prompt Override Patterns
id: runtime-ai-001
status: stable
description: Detects classic prompt injection patterns attempting to override LLM instructions
author: Tamandua Security Team
date: 2026/04/07
references:
    - https://learnprompting.org/docs/prompt_hacking/injection
    - https://attack.mitre.org/techniques/T1059/
logsource:
    category: llm_request
    product: tamandua
detection:
    selection_override:
        PromptPreview|contains:
            - 'ignore previous instructions'
            - 'disregard all prior'
            - 'forget everything above'
            - 'new instructions:'
            - 'override your'
            - 'discard your instructions'
    condition: selection_override
falsepositives:
    - Legitimate prompts discussing prompt engineering or security testing
level: high
tags:
    - attack.execution
    - attack.t1059
    - ai_security
    - prompt_injection

