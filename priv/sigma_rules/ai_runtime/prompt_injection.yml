title: AI Runtime - Role Manipulation Attempts
id: runtime-ai-002
status: stable
description: Detects attempts to manipulate the LLM's role or persona to bypass restrictions
author: Tamandua Security Team
date: 2026/04/07
references:
    - https://learnprompting.org/docs/prompt_hacking/jailbreaking
logsource:
    category: llm_request
    product: tamandua
detection:
    selection_role:
        PromptPreview|contains:
            - 'you are now'
            - 'act as if'
            - 'pretend you are'
            - 'system: you are'
            - 'roleplay as'
            - 'assume the role'
    condition: selection_role
falsepositives:
    - Legitimate roleplay or creative writing prompts
level: medium
tags:
    - attack.execution
    - attack.t1059
    - ai_security
    - prompt_injection

