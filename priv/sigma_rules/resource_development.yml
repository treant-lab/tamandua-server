title: Code Signing Certificate Request
id: resource-001-cert-request
status: experimental
description: Detects generation of code signing certificate requests which may indicate attacker tooling preparation
author: Tamandua Security Team
date: 2024/03/17
logsource:
    category: process_creation
    product: windows
detection:
    selection_makecert:
        Image|endswith:
            - '\makecert.exe'
            - '\certreq.exe'
            - '\certutil.exe'
        CommandLine|contains:
            - '-r'
            - '-n "CN='
            - '-ss'
            - 'CodeSign'
    selection_ps:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'New-SelfSignedCertificate'
            - 'CodeSigningCert'
    selection_openssl:
        CommandLine|contains:
            - 'openssl req'
            - 'openssl x509'
            - 'openssl genpkey'
    condition: selection_makecert or selection_ps or selection_openssl
falsepositives:
    - Legitimate software development
    - Certificate administration
level: medium
tags:
    - attack.resource_development
    - attack.t1587.002

