title: VPS/Cloud Infrastructure Provisioning via CLI
id: resource-003-infra-provision
status: experimental
description: Detects provisioning of cloud infrastructure via command line which may indicate attacker infrastructure setup
author: Tamandua Security Team
date: 2024/03/17
logsource:
    category: process_creation
    product: windows
detection:
    selection_aws:
        CommandLine|contains:
            - 'aws ec2 run-instances'
            - 'aws lightsail create-instances'
    selection_azure:
        CommandLine|contains:
            - 'az vm create'
            - 'az container create'
    selection_gcp:
        CommandLine|contains:
            - 'gcloud compute instances create'
            - 'gcloud run deploy'
    selection_do:
        CommandLine|contains:
            - 'doctl compute droplet create'
    selection_terraform:
        CommandLine|contains:
            - 'terraform apply'
            - 'terraform import'
    condition: selection_aws or selection_azure or selection_gcp or selection_do or selection_terraform
falsepositives:
    - DevOps activities
    - Legitimate cloud management
level: low
tags:
    - attack.resource_development
    - attack.t1583.003

