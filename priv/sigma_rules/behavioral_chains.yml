title: Privilege Escalation Attack Chain
id: bc1a2b3c-4d5e-6f78-9012-345678901236
status: experimental
description: Detects privilege escalation chain - initial execution, token manipulation, and persistence
references:
  - https://attack.mitre.org/tactics/TA0004/
author: Tamandua Security
date: 2025/05/08
logsource:
  product: windows
  category: process_creation
detection:
  # Stage 1: Initial script execution
  script_exec:
    Image|endswith:
      - '\powershell.exe'
      - '\cmd.exe'
      - '\wscript.exe'
    CommandLine|contains:
      - '-enc'
      - '-e '
      - '/c '
  # Stage 2: UAC bypass
  uac_bypass:
    CommandLine|contains:
      - 'fodhelper'
      - 'computerdefaults'
      - 'sdclt'
      - 'eventvwr'
      - 'silentcleanup'
  # Stage 3: Persistence
  persistence:
    CommandLine|contains:
      - 'reg add'
      - 'schtasks /create'
      - 'New-Service'
      - 'sc create'
  timeframe: 10m
  condition: script_exec | near uac_bypass | near persistence
falsepositives:
  - Legitimate software installation
level: high
tags:
  - attack.privilege_escalation
  - attack.t1548.002
  - attack.persistence
  - attack.t1547.001

