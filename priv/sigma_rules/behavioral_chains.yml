title: C2 Establishment Chain
id: bc1a2b3c-4d5e-6f78-9012-345678901240
status: experimental
description: Detects C2 establishment pattern - DNS lookup, connection, and periodic beacon
references:
  - https://attack.mitre.org/tactics/TA0011/
author: Tamandua Security
date: 2025/05/08
logsource:
  product: windows
  category: network_connection
detection:
  # Stage 1: DNS resolution for C2
  dns_lookup:
    QueryName|re: '^[a-z0-9]{15,}\.'  # DGA-like domain
  # Stage 2: Initial connection
  initial_conn:
    DestinationPort:
      - 443
      - 8443
      - 80
      - 8080
    Initiated: 'true'
  # Stage 3: Periodic callbacks (same destination)
  beacon:
    DestinationPort:
      - 443
      - 8443
  timeframe: 10m
  condition: dns_lookup | near initial_conn | near beacon
falsepositives:
  - CDN services
  - Cloud applications
level: medium
tags:
  - attack.command_and_control
  - attack.t1071
  - attack.t1568

