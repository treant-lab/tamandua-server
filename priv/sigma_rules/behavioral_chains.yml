title: Defense Evasion Before Malicious Activity
id: bc1a2b3c-4d5e-6f78-9012-345678901237
status: experimental
description: Detects defense evasion followed by suspicious activity
references:
  - https://attack.mitre.org/tactics/TA0005/
author: Tamandua Security
date: 2025/05/08
logsource:
  product: windows
  category: process_creation
detection:
  # Stage 1: Defense evasion
  evasion:
    CommandLine|contains:
      - 'Set-MpPreference -DisableRealtimeMonitoring'
      - 'Disable-WindowsOptionalFeature'
      - 'wevtutil cl'
      - 'Stop-Service WinDefend'
      - 'reg add.*DisableAntiSpyware'
  # Stage 2: Malicious activity after evasion
  malicious:
    CommandLine|contains:
      - 'Invoke-Mimikatz'
      - 'sekurlsa'
      - 'procdump -ma lsass'
      - 'rundll32.*comsvcs.dll'
      - 'SharpHound'
  timeframe: 15m
  condition: evasion | near malicious
falsepositives:
  - Security testing
level: critical
tags:
  - attack.defense_evasion
  - attack.t1562.001
  - attack.credential_access
  - attack.t1003

