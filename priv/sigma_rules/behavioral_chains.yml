title: Internal Reconnaissance Chain
id: bc1a2b3c-4d5e-6f78-9012-345678901241
status: experimental
description: Detects internal reconnaissance pattern - network discovery, AD enumeration, and share access
references:
  - https://attack.mitre.org/tactics/TA0007/
author: Tamandua Security
date: 2025/05/08
logsource:
  product: windows
  category: process_creation
detection:
  # Stage 1: Network discovery
  network_disc:
    CommandLine|contains:
      - 'arp -a'
      - 'net view'
      - 'ping -n'
      - 'nslookup'
      - 'Get-NetNeighbor'
  # Stage 2: AD enumeration
  ad_enum:
    CommandLine|contains:
      - 'Get-ADUser'
      - 'Get-ADComputer'
      - 'Get-ADGroup'
      - 'dsquery'
      - 'ldapsearch'
      - 'adfind'
  # Stage 3: Share enumeration
  share_enum:
    CommandLine|contains:
      - 'net share'
      - 'Get-SmbShare'
      - 'Invoke-ShareFinder'
  timeframe: 15m
  condition: network_disc | near ad_enum | near share_enum
falsepositives:
  - IT inventory scripts
  - Legitimate administration
level: medium
tags:
  - attack.discovery
  - attack.t1018
  - attack.t1087.002
  - attack.t1135
