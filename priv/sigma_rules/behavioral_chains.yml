title: Ransomware Pre-Encryption Chain
id: bc1a2b3c-4d5e-6f78-9012-345678901238
status: experimental
description: Detects ransomware preparation - backup deletion, service stop, and encryption indicators
references:
  - https://attack.mitre.org/techniques/T1486/
author: Tamandua Security
date: 2025/05/08
logsource:
  product: windows
  category: process_creation
detection:
  # Stage 1: Shadow copy deletion
  shadow_delete:
    CommandLine|contains:
      - 'vssadmin delete shadows'
      - 'wmic shadowcopy delete'
      - 'bcdedit /set {default} recoveryenabled no'
  # Stage 2: Service disruption
  service_stop:
    CommandLine|contains:
      - 'net stop'
      - 'taskkill /f'
      - 'Stop-Service'
    CommandLine|contains:
      - 'sql'
      - 'exchange'
      - 'backup'
      - 'vss'
  # Stage 3: File modification at scale
  mass_modification:
    CommandLine|contains:
      - '.encrypted'
      - '.locked'
      - 'readme.txt'
      - 'ransom'
  timeframe: 30m
  condition: shadow_delete | near service_stop
falsepositives:
  - System maintenance (rare to combine with service stops)
level: critical
tags:
  - attack.impact
  - attack.t1486
  - attack.t1490

