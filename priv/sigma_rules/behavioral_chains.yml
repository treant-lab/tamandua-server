title: LOLBin Execution Chain
id: bc1a2b3c-4d5e-6f78-9012-345678901239
status: experimental
description: Detects chained LOLBin abuse indicating malicious activity
references:
  - https://attack.mitre.org/techniques/T1218/
author: Tamandua Security
date: 2025/05/08
logsource:
  product: windows
  category: process_creation
detection:
  lolbin1:
    Image|endswith:
      - '\mshta.exe'
      - '\msbuild.exe'
      - '\installutil.exe'
      - '\regasm.exe'
  lolbin2:
    Image|endswith:
      - '\rundll32.exe'
      - '\regsvr32.exe'
      - '\certutil.exe'
  lolbin3:
    Image|endswith:
      - '\wmic.exe'
      - '\cmstp.exe'
      - '\wscript.exe'
  timeframe: 5m
  condition: lolbin1 | near lolbin2 | near lolbin3
falsepositives:
  - Complex installation scripts
level: high
tags:
  - attack.defense_evasion
  - attack.t1218

