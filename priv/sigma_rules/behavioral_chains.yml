title: Data Exfiltration Attack Chain
id: bc1a2b3c-4d5e-6f78-9012-345678901235
status: experimental
description: Detects data exfiltration chain - file enumeration, staging, archive creation, and transfer
references:
  - https://attack.mitre.org/tactics/TA0010/
author: Tamandua Security
date: 2025/05/08
logsource:
  product: windows
  category: process_creation
detection:
  # Stage 1: File enumeration
  file_enum:
    CommandLine|contains:
      - 'dir /s'
      - 'forfiles'
      - 'where /r'
      - 'Get-ChildItem -Recurse'
  # Stage 2: Archive creation
  archive_create:
    CommandLine|contains:
      - '7z a'
      - 'rar a'
      - 'Compress-Archive'
      - 'tar -c'
      - 'zip -r'
  # Stage 3: Transfer
  transfer:
    CommandLine|contains:
      - 'curl -F'
      - 'Invoke-WebRequest -Method Post'
      - 'ftp put'
      - 'scp '
      - 'rclone copy'
  timeframe: 30m
  condition: file_enum | near archive_create | near transfer
falsepositives:
  - Backup operations
  - File synchronization
level: high
tags:
  - attack.collection
  - attack.t1005
  - attack.exfiltration
  - attack.t1041

