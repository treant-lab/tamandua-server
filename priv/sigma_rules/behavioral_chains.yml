# Tamandua EDR - Behavioral Chain Detection Rules
# Multi-stage attack sequence detection using temporal correlation

title: Credential Theft Attack Chain
id: bc1a2b3c-4d5e-6f78-9012-345678901234
status: experimental
description: Detects credential theft attack chain - enumeration followed by LSASS access and lateral movement
references:
  - https://attack.mitre.org/tactics/TA0006/
author: Tamandua Security
date: 2025/05/08
logsource:
  product: windows
  category: process_creation
detection:
  # Stage 1: Enumeration
  enumeration:
    CommandLine|contains:
      - 'net user'
      - 'net group'
      - 'whoami /all'
      - 'nltest'
      - 'dsquery'
  # Stage 2: Credential access (within 5 minutes)
  credential_access:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess|contains:
      - '0x1010'
      - '0x1410'
      - '0x1438'
  # Stage 3: Lateral movement
  lateral_movement:
    CommandLine|contains:
      - 'wmic /node:'
      - 'psexec'
      - 'Enter-PSSession'
      - 'Invoke-Command'
  timeframe: 5m
  condition: enumeration | near credential_access | near lateral_movement
falsepositives:
  - IT administration activities
  - Security assessments
level: critical
tags:
  - attack.credential_access
  - attack.t1003
  - attack.lateral_movement
  - attack.t1021

