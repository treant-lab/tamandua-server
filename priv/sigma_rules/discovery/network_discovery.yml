title: Network Discovery Command Execution
id: di02a001-netd-0002-0001-000000000001
status: stable
description: |
  Detects network discovery and enumeration commands commonly used during
  post-exploitation, including ipconfig, netstat, nslookup, and network
  share enumeration. Rapid execution of multiple network discovery commands
  is a strong indicator of automated reconnaissance.
references:
  - https://attack.mitre.org/techniques/T1016/
  - https://attack.mitre.org/techniques/T1049/
  - https://attack.mitre.org/techniques/T1135/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.discovery
  - attack.t1016
  - attack.t1049
  - attack.t1135
logsource:
  category: process_creation
  product: windows
detection:
  selection_net:
    Image|endswith:
      - '\net.exe'
      - '\net1.exe'
    CommandLine|contains:
      - 'view'
      - 'share'
      - 'session'
      - 'use'
  selection_netstat:
    Image|endswith: '\netstat.exe'
    CommandLine|contains:
      - '-an'
      - '-ano'
      - '-anb'
  selection_nslookup:
    Image|endswith: '\nslookup.exe'
  selection_nbtstat:
    Image|endswith: '\nbtstat.exe'
  filter_monitoring:
    ParentImage|contains:
      - '\monitoring\'
      - '\nagios\'
  condition: (selection_net or selection_netstat or selection_nslookup or selection_nbtstat) and not filter_monitoring
falsepositives:
  - Legitimate network troubleshooting
  - Network monitoring scripts
level: low

---
title: Port Scanning Activity
id: di02a002-netd-0002-0002-000000000002
status: stable
description: |
  Detects execution of network scanning tools including nmap, masscan,
  and built-in PowerShell port scanning. Port scanning is a key
  reconnaissance step for identifying services and potential attack vectors.
references:
  - https://attack.mitre.org/techniques/T1046/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.discovery
  - attack.t1046
logsource:
  category: process_creation
  product: windows
detection:
  selection_tools:
    Image|endswith:
      - '\nmap.exe'
      - '\masscan.exe'
      - '\zmap.exe'
      - '\Advanced Port Scanner.exe'
      - '\angry_ip_scanner.exe'
  selection_ps:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Test-NetConnection'
      - 'TcpClient'
      - 'Net.Sockets'
      - 'port scan'
  filter_nmap_dev:
    ParentImage|contains:
      - '\nmap\'
      - '\pentest\'
  condition: (selection_tools or selection_ps) and not filter_nmap_dev
falsepositives:
  - Authorized vulnerability scanning
  - Network administrators using scanning tools
level: medium
