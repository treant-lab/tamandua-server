title: Active Directory Domain Trust Discovery
id: di03a001-dtru-0003-0001-000000000001
status: stable
description: |
  Detects Active Directory domain trust enumeration using nltest, dsquery,
  or PowerShell AD cmdlets. Domain trust enumeration is a key reconnaissance
  step for attackers planning lateral movement across domain boundaries.
references:
  - https://attack.mitre.org/techniques/T1482/
author: Tamandua EDR
date: 2026/01/31
modified: 2026/01/31
tags:
  - attack.discovery
  - attack.t1482
logsource:
  category: process_creation
  product: windows
detection:
  selection_nltest:
    Image|endswith: '\nltest.exe'
    CommandLine|contains:
      - '/domain_trusts'
      - '/dclist:'
      - '/dsgetdc:'
      - '/dsgetfti:'
      - '/trusted_domains'
  selection_dsquery:
    Image|endswith: '\dsquery.exe'
    CommandLine|contains:
      - 'trust'
      - 'subnet'
      - 'site'
  selection_ps:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Get-ADTrust'
      - 'Get-DomainTrust'
      - 'Get-ForestTrust'
      - 'Get-NetForestTrust'
      - 'Get-NetDomainTrust'
  filter_admin:
    ParentImage|endswith: '\mmc.exe'
  condition: (selection_nltest or selection_dsquery or selection_ps) and not filter_admin
falsepositives:
  - Legitimate domain administration and troubleshooting
  - Active Directory health check scripts
level: medium
