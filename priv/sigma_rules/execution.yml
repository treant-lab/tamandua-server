title: Suspicious PowerShell Download Cradle
id: a0c3d5e2-6789-0abc-def1-234567890123
status: experimental
description: Detects PowerShell download and execute patterns
author: Tamandua Security Team
date: 2024/01/15
references:
    - https://attack.mitre.org/techniques/T1059/001/
logsource:
    category: process_creation
    product: windows
detection:
    selection_powershell:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_download:
        CommandLine|contains:
            - 'IEX'
            - 'Invoke-Expression'
            - 'DownloadString'
            - 'DownloadFile'
            - 'DownloadData'
            - 'Net.WebClient'
            - 'Invoke-WebRequest'
            - 'iwr '
            - 'irm '
            - 'Invoke-RestMethod'
            - 'Start-BitsTransfer'
    selection_flags:
        CommandLine|contains:
            - '-enc'
            - '-encodedcommand'
            - '-nop'
            - '-noprofile'
            - '-w hidden'
            - '-windowstyle hidden'
            - '-exec bypass'
            - '-executionpolicy bypass'
    condition: selection_powershell and (selection_download or selection_flags)
falsepositives:
    - Legitimate administrative scripts
level: high
tags:
    - attack.execution
    - attack.t1059.001

