title: MSHTA Execution with Script Protocol
id: c2e5f7a4-89ab-2cde-f012-456789012345
status: experimental
description: Detects MSHTA executing scripts from URLs or inline
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        Image|endswith: '\mshta.exe'
    selection_cmd:
        CommandLine|contains:
            - 'javascript:'
            - 'vbscript:'
            - 'http://'
            - 'https://'
            - '.hta'
    condition: all of selection_*
falsepositives:
    - Legitimate HTA applications
level: high
tags:
    - attack.execution
    - attack.defense_evasion
    - attack.t1218.005

