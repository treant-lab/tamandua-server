---
title: MSBuild Suspicious Execution
id: 06c9dbe8-cdef-6012-3456-890123456789
status: experimental
description: Detects MSBuild executing potentially malicious tasks
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\MSBuild.exe'
            - '\msbuild.exe'
        CommandLine|contains:
            - '.xml'
            - '.csproj'
            - '.proj'
    filter:
        ParentImage|endswith:
            - '\devenv.exe'
            - '\dotnet.exe'
            - '\vs_installershell.exe'
    condition: selection and not filter
falsepositives:
    - Legitimate build processes
level: medium
tags:
    - attack.defense_evasion
    - attack.t1127.001
