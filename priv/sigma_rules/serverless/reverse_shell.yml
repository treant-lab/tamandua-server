title: Serverless Outbound Connection to C2 Ports
id: f6a7b8c9-d0e1-2345-f012-678901234567
status: stable
description: Detects serverless functions connecting to common C2 ports
author: Tamandua EDR
date: 2026/01/29
tags:
  - attack.command_and_control
  - attack.t1571
logsource:
  category: serverless
  product: any
detection:
  selection:
    DestinationPort:
      - 4444   # Metasploit default
      - 5555   # Common backdoor
      - 6666   # Common backdoor
      - 7777   # Common backdoor
      - 8888   # Common backdoor
      - 9999   # Common backdoor
      - 1337   # Elite/leet port
      - 31337  # Elite port
      - 12345  # NetBus
      - 54321  # Back Orifice
      - 6667   # IRC
      - 6697   # IRC SSL
      - 8080   # Alternative HTTP (suspicious from Lambda)
      - 9001   # Tor
      - 9030   # Tor
      - 9050   # Tor SOCKS

  condition: selection
fields:
  - FunctionName
  - DestinationIP
  - DestinationPort
falsepositives:
  - Development/test environments using non-standard ports
level: high
