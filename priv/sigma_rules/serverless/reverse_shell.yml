title: Serverless Reverse Shell Detection
id: d4e5f6a7-b8c9-0123-def0-456789012345
status: stable
description: Detects reverse shell execution patterns in serverless functions
references:
  - https://attack.mitre.org/techniques/T1059/
  - https://attack.mitre.org/techniques/T1071/
author: Tamandua EDR
date: 2026/01/29
tags:
  - attack.execution
  - attack.t1059
  - attack.command_and_control
  - attack.t1071
  - serverless
logsource:
  category: serverless
  product: any
detection:
  # Classic reverse shell patterns
  selection_bash:
    CommandLine|contains:
      - 'bash -i >& /dev/tcp/'
      - 'bash -c "bash -i >& /dev/tcp/'
      - '/bin/bash -i >& /dev/tcp/'
      - 'nc -e /bin/bash'
      - 'nc -e /bin/sh'
      - 'ncat -e /bin/bash'
      - 'netcat -e /bin/bash'
      - 'rm /tmp/f;mkfifo /tmp/f;cat /tmp/f|/bin/sh'
      - '/dev/tcp/'

  # Python reverse shells
  selection_python:
    CommandLine|contains:
      - 'python -c "import socket,subprocess,os'
      - "python -c 'import socket,subprocess,os"
      - 'socket.socket(socket.AF_INET'
      - 'subprocess.call(["/bin/sh"'
      - 'pty.spawn("/bin/bash")'
      - 'pty.spawn("/bin/sh")'

  # Node.js reverse shells
  selection_node:
    CommandLine|contains:
      - 'require("child_process").exec'
      - 'child_process.spawn("/bin/sh"'
      - 'net.connect'
      - 'socket.connect'

  # Perl reverse shells
  selection_perl:
    CommandLine|contains:
      - 'perl -e "use Socket'
      - 'perl -MIO -e'

  # Ruby reverse shells
  selection_ruby:
    CommandLine|contains:
      - 'ruby -rsocket -e'
      - 'TCPSocket.new'

  # PHP reverse shells
  selection_php:
    CommandLine|contains:
      - 'php -r "$sock=fsockopen'
      - 'fsockopen("'
      - 'shell_exec('
      - 'passthru('
      - 'system('
      - 'exec('

  # Log message patterns
  selection_logs:
    Message|contains:
      - 'reverse shell'
      - 'bind shell'
      - 'backdoor'
      - 'shell connected'
      - 'spawning shell'

  condition: selection_bash or selection_python or selection_node or selection_perl or selection_ruby or selection_php or selection_logs
fields:
  - FunctionName
  - RequestId
  - CommandLine
  - DestinationIP
  - DestinationPort
falsepositives:
  - Legitimate administrative tools
  - Security testing
level: critical
