title: Serverless Command Injection Attempt
id: e5f6a7b8-c9d0-1234-ef01-567890123456
status: stable
description: Detects command injection patterns in serverless function logs
author: Tamandua EDR
date: 2026/01/29
tags:
  - attack.execution
  - attack.t1059
logsource:
  category: serverless
  product: any
detection:
  selection_injection:
    Message|contains:
      - '$(cat /etc/passwd)'
      - '`cat /etc/passwd`'
      - '; cat /etc/passwd'
      - '| cat /etc/passwd'
      - '&& cat /etc/passwd'
      - '|| cat /etc/passwd'
      - '$(id)'
      - '`id`'
      - '$(whoami)'
      - '`whoami`'
      - '$(uname'
      - '`uname'
      - '${IFS}'
      - '$IFS'
      - '%0a'
      - '%0d'
      - '\n'
      - '\r'

  selection_shell_metachar:
    Message|re: '[;&|`$()].*[;&|`$()]'

  condition: selection_injection or selection_shell_metachar
falsepositives:
  - Web application security tests that submit command-injection payloads to validate input filtering.
  - Sanitized scanner logs containing payload strings without execution or outbound connection evidence.
level: high
