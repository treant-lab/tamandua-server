title: Serverless Container Escape Attempt
id: b4c5d6e7-f8a9-0123-7890-456789012345
status: stable
description: Detects attempts to escape the serverless container/sandbox
author: Tamandua EDR
date: 2026/01/29
tags:
  - attack.privilege_escalation
  - attack.t1611
logsource:
  category: serverless
  product: any
detection:
  # Sensitive file system access
  selection_fs:
    FilePath|contains:
      - '/proc/1/'
      - '/proc/self/root'
      - '/proc/sys/'
      - '/sys/kernel/'
      - '/sys/class/'
      - '/dev/mem'
      - '/dev/kmem'

  # Container-related operations
  selection_container:
    CommandLine|contains:
      - 'docker'
      - 'containerd'
      - 'runc'
      - 'ctr'
      - 'crictl'

  # Kernel module operations
  selection_kernel:
    CommandLine|contains:
      - 'insmod'
      - 'modprobe'
      - 'rmmod'

  # Namespace manipulation
  selection_namespace:
    CommandLine|contains:
      - 'nsenter'
      - 'unshare'
      - 'setns'

  condition: selection_fs or selection_container or selection_kernel or selection_namespace
fields:
  - FunctionName
  - FilePath
  - CommandLine
falsepositives:
  - Security posture or compliance scanners inspecting container namespace and procfs metadata.
  - Controlled sandbox-escape validation in an isolated lab.
level: critical
