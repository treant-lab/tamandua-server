title: Serverless IAM Privilege Escalation Attempt
id: e1f2a3b4-c5d6-7890-4567-123456789012
status: stable
description: Detects attempts to escalate privileges via IAM from serverless functions
references:
  - https://attack.mitre.org/techniques/T1078.004/
  - https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation/
author: Tamandua EDR
date: 2026/01/29
tags:
  - attack.privilege_escalation
  - attack.t1078.004
  - serverless
  - cloud
logsource:
  category: serverless
  product: aws_lambda
detection:
  # IAM policy modification
  selection_iam_modify:
    AWSService: 'iam'
    EventName:
      - 'CreateUser'
      - 'CreateRole'
      - 'CreatePolicy'
      - 'AttachUserPolicy'
      - 'AttachRolePolicy'
      - 'PutUserPolicy'
      - 'PutRolePolicy'
      - 'AttachGroupPolicy'
      - 'AddUserToGroup'
      - 'CreateAccessKey'
      - 'UpdateAssumeRolePolicy'

  # STS abuse
  selection_sts_abuse:
    AWSService: 'sts'
    EventName:
      - 'AssumeRole'
      - 'AssumeRoleWithSAML'
      - 'AssumeRoleWithWebIdentity'
      - 'GetFederationToken'

  # Lambda function modification (persistence)
  selection_lambda_modify:
    AWSService: 'lambda'
    EventName:
      - 'UpdateFunctionCode'
      - 'UpdateFunctionConfiguration'
      - 'AddPermission'
      - 'CreateFunction'

  condition: selection_iam_modify or selection_sts_abuse or selection_lambda_modify
fields:
  - FunctionName
  - RequestId
  - EventName
  - UserIdentity
  - TargetResource
falsepositives:
  - Approved infrastructure-as-code deployments or CI/CD jobs modifying IAM, STS, or Lambda configuration.
  - Break-glass or incident-response automation executed by known administrative service principals.
level: critical
