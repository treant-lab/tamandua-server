title: Azure Functions Managed Identity Abuse
id: f2a3b4c5-d6e7-8901-5678-234567890123
status: stable
description: Detects abuse of Azure managed identity from functions
author: Tamandua EDR
date: 2026/01/29
tags:
  - attack.privilege_escalation
  - attack.t1078.004
logsource:
  category: serverless
  product: azure_functions
detection:
  # Role assignment changes
  selection_rbac:
    OperationName|contains:
      - 'Microsoft.Authorization/roleAssignments/write'
      - 'Microsoft.Authorization/roleDefinitions/write'

  # Key Vault access with elevated permissions
  selection_keyvault:
    OperationName|contains:
      - 'Microsoft.KeyVault/vaults/accessPolicies/write'
      - 'Microsoft.KeyVault/managedHsms'

  # Subscription-level operations
  selection_subscription:
    OperationName|contains:
      - 'Microsoft.Subscription'
      - 'Microsoft.Management/managementGroups'

  condition: selection_rbac or selection_keyvault or selection_subscription
fields:
  - FunctionName
  - OperationName
  - Caller
falsepositives:
  - Approved Azure deployment pipelines changing RBAC, Key Vault access policies, or management-group configuration.
  - Emergency access workflows executed by known managed identities during incident response.
level: critical
---
title: GCP Cloud Functions Service Account Impersonation
id: a3b4c5d6-e7f8-9012-6789-345678901234
status: stable
description: Detects service account impersonation from Cloud Functions
author: Tamandua EDR
date: 2026/01/29
tags:
  - attack.privilege_escalation
  - attack.t1078.004
logsource:
  category: serverless
  product: gcp_cloud_functions
detection:
  # Service account token generation
  selection_sa_tokens:
    MethodName|contains:
      - 'GenerateAccessToken'
      - 'GenerateIdToken'
      - 'SignJwt'
      - 'SignBlob'

  # IAM policy modifications
  selection_iam:
    MethodName|contains:
      - 'SetIamPolicy'
      - 'CreateServiceAccountKey'
      - 'CreateServiceAccount'

  condition: selection_sa_tokens or selection_iam
fields:
  - FunctionName
  - MethodName
  - PrincipalEmail
falsepositives:
  - Approved GCP deployment automation creating service-account keys or updating IAM policy.
  - Workload identity federation or token-generation flows from known build and operations accounts.
level: critical
