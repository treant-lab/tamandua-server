title: Azure Functions Cryptocurrency Mining
id: 8d5e4f3b-c2e9-5d0f-b6g7-9e3c2f1d4b5c
status: stable
description: Detects cryptocurrency mining in Azure Functions
author: Tamandua EDR
date: 2026/01/29
tags:
  - attack.impact
  - attack.t1496
logsource:
  category: serverless
  product: azure_functions
  service: application_insights
detection:
  selection:
    Message|contains:
      - 'xmrig'
      - 'cryptonight'
      - 'stratum'
      - 'mining'
      - 'hashrate'
    PerformanceCounter|gt: 95

  condition: selection
falsepositives:
  - Load or performance tests that intentionally stress CPU and log mining-like benchmark strings.
  - Security validation labs that replay cryptocurrency-mining indicators in serverless telemetry.
level: critical
