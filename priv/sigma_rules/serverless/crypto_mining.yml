title: Serverless Cryptocurrency Mining Detection
id: 7c4e3f2a-b1d8-4c9e-a5f6-8d2b1e0c3a4b
status: stable
description: Detects potential cryptocurrency mining activity in serverless functions
references:
  - https://attack.mitre.org/techniques/T1496/
  - https://www.lacework.com/blog/cryptomining-in-serverless/
author: Tamandua EDR
date: 2026/01/29
modified: 2026/01/29
tags:
  - attack.impact
  - attack.t1496
  - serverless
  - cloud
logsource:
  category: serverless
  product: aws_lambda
  service: cloudwatch
detection:
  # Process/command patterns
  selection_process:
    CommandLine|contains:
      - 'xmrig'
      - 'minerd'
      - 'cpuminer'
      - 'cgminer'
      - 'bfgminer'
      - 'ethminer'
      - 'phoenixminer'
      - 'coinhive'
      - 'cryptonight'
      - 'stratum+tcp://'
      - 'stratum+ssl://'
      - 'pool.minexmr.com'
      - 'pool.supportxmr.com'
      - 'xmrpool.eu'
      - 'monerohash.com'

  # Log message patterns
  selection_log:
    Message|contains:
      - 'mining pool'
      - 'hashrate'
      - 'accepted share'
      - 'rejected share'
      - 'CPU usage: 100%'
      - 'cryptonight'
      - 'monero'
      - 'xmr wallet'

  # Network patterns
  selection_network:
    DestinationPort:
      - 3333
      - 4444
      - 5555
      - 7777
      - 8888
      - 9999
      - 14433
      - 14444

  # Resource patterns
  selection_resource:
    MemoryUsage|gt: 90
    CPUTime|gt: 300000  # 5 minutes

  condition: selection_process or selection_log or (selection_network and selection_resource)
fields:
  - FunctionName
  - RequestId
  - MemoryUsage
  - Duration
  - DestinationIP
  - DestinationPort
falsepositives:
  - Legitimate cryptocurrency operations
  - Performance testing with high CPU usage
level: critical
