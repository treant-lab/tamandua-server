title: Serverless Credential Access - Environment Variable Exposure
id: a7b8c9d0-e1f2-3456-0123-789012345678
status: stable
description: Detects attempts to access or log environment variables containing credentials
references:
  - https://attack.mitre.org/techniques/T1552/
  - https://attack.mitre.org/techniques/T1552.001/
author: Tamandua EDR
date: 2026/01/29
tags:
  - attack.credential_access
  - attack.t1552
  - attack.t1552.001
  - serverless
logsource:
  category: serverless
  product: any
detection:
  # Logging of sensitive environment variables
  selection_env_log:
    Message|contains:
      - 'AWS_SECRET_ACCESS_KEY'
      - 'AWS_SESSION_TOKEN'
      - 'AZURE_CLIENT_SECRET'
      - 'GOOGLE_APPLICATION_CREDENTIALS'
      - 'DATABASE_PASSWORD'
      - 'DB_PASSWORD'
      - 'API_SECRET'
      - 'JWT_SECRET'
      - 'PRIVATE_KEY'
      - 'SECRET_KEY'

  # Environment enumeration commands
  selection_env_enum:
    CommandLine|contains:
      - 'printenv'
      - 'env | '
      - 'set |'
      - 'echo $AWS_'
      - 'echo $AZURE_'
      - 'echo $GOOGLE_'
      - 'process.env'
      - 'os.environ'
      - 'System.getenv'

  condition: selection_env_log or selection_env_enum
fields:
  - FunctionName
  - RequestId
  - Message
falsepositives:
  - Debug logging in development functions that intentionally prints sanitized environment variables.
  - Configuration inventory jobs that enumerate environment variable names without exposing secret values.
level: high
