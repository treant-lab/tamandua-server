title: Serverless IAM Credential Theft Attempt
id: b8c9d0e1-f2a3-4567-1234-890123456789
status: stable
description: Detects attempts to steal or use IAM credentials from serverless functions
author: Tamandua EDR
date: 2026/01/29
tags:
  - attack.credential_access
  - attack.t1552.005
  - attack.t1078.004
logsource:
  category: serverless
  product: aws_lambda
detection:
  # IMDSv1 credential access
  selection_imds:
    DestinationHost: '169.254.169.254'
    DestinationPath|contains:
      - '/latest/meta-data/iam'
      - '/latest/meta-data/identity-credentials'

  # Credential file access
  selection_cred_files:
    FilePath|contains:
      - '/.aws/credentials'
      - '/.azure/credentials'
      - '/gcloud/application_default_credentials'
      - '/service-account.json'

  # STS credential operations
  selection_sts:
    AWSService: 'sts'
    EventName|contains:
      - 'GetSessionToken'
      - 'AssumeRole'
      - 'GetFederationToken'

  condition: selection_imds or selection_cred_files or selection_sts
fields:
  - FunctionName
  - RequestId
  - DestinationHost
  - FilePath
falsepositives:
  - Cloud SDK bootstrap flows that call STS or metadata services during normal function initialization.
  - Approved credential rotation, inventory, or compliance jobs scoped to known service accounts.
level: high
---
title: Serverless Secrets Manager Enumeration
id: c9d0e1f2-a3b4-5678-2345-901234567890
status: stable
description: Detects enumeration of secrets from cloud secrets managers
author: Tamandua EDR
date: 2026/01/29
tags:
  - attack.credential_access
  - attack.t1552.004
logsource:
  category: serverless
  product: any
detection:
  # AWS Secrets Manager enumeration
  selection_aws_secrets:
    AWSService: 'secretsmanager'
    EventName:
      - 'ListSecrets'
      - 'GetSecretValue'
      - 'DescribeSecret'

  # Azure Key Vault enumeration
  selection_azure_kv:
    Message|contains:
      - 'GetSecret'
      - 'ListSecrets'
      - 'vault.azure.net'

  # GCP Secret Manager enumeration
  selection_gcp_secrets:
    Message|contains:
      - 'secretmanager.googleapis.com'
      - 'AccessSecretVersion'
      - 'ListSecrets'

  # High volume secret access
  selection_volume:
    EventName|contains: 'GetSecret'
  filter_normal:
    # Allow 1-2 secret accesses per invocation
    Count|lte: 2

  condition: selection_aws_secrets or selection_azure_kv or selection_gcp_secrets
fields:
  - FunctionName
  - SecretId
  - RequestId
falsepositives:
  - Legitimate secret access during function initialization
level: medium
---
title: Serverless Key Material Exposure in Logs
id: d0e1f2a3-b4c5-6789-3456-012345678901
status: stable
description: Detects private keys or credentials being logged
author: Tamandua EDR
date: 2026/01/29
tags:
  - attack.credential_access
  - attack.t1552
logsource:
  category: serverless
  product: any
detection:
  selection:
    Message|contains:
      - '-----BEGIN RSA PRIVATE KEY-----'
      - '-----BEGIN PRIVATE KEY-----'
      - '-----BEGIN EC PRIVATE KEY-----'
      - '-----BEGIN OPENSSH PRIVATE KEY-----'
      - '-----BEGIN PGP PRIVATE KEY-----'
      - 'AKIA'  # AWS Access Key ID prefix
      - 'ASIA'  # AWS Session Access Key ID prefix
      - 'ghp_'  # GitHub Personal Access Token
      - 'gho_'  # GitHub OAuth Token
      - 'ghs_'  # GitHub Server Token
      - 'glpat-' # GitLab Personal Access Token
      - 'sk-'   # OpenAI/Stripe key prefix
      - 'xox'   # Slack token prefix

  condition: selection
fields:
  - FunctionName
  - RequestId
falsepositives:
  - Automated secret scanners, DLP tests, or canary-token validation intentionally writing test keys.
  - Development logs containing documented dummy keys rather than live credential material.
level: critical
