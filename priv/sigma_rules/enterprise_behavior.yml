title: Credential Discovery via LSASS or Stored Credential Enumeration
id: 68e230d4-7d36-4df7-a7f4-1d7e1d7b0001
status: experimental
description: Detects safe but security-relevant credential discovery behaviors such as LSASS metadata inspection, credential manager enumeration, and browser credential store probing.
author: Tamandua Security Team
date: 2026/05/25
logsource:
  category: process_creation
  product: windows
detection:
  lsass_probe:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains|all:
      - 'Get-Process'
      - 'lsass'
  credential_manager:
    Image|endswith:
      - '\cmdkey.exe'
      - '\vaultcmd.exe'
    CommandLine|contains:
      - '/list'
      - 'listcreds'
  browser_store_probe_object:
    CommandLine|contains:
      - 'Login Data'
      - 'Web Data'
      - 'Cookies'
  browser_store_probe_path:
    CommandLine|contains:
      - 'Chrome\User Data'
      - 'Edge\User Data'
      - 'Firefox\Profiles'
  credential_file_probe:
    CommandLine|contains:
      - 'findstr'
      - 'password'
      - 'credential'
  condition: lsass_probe or credential_manager or (browser_store_probe_object and browser_store_probe_path) or credential_file_probe
falsepositives:
  - Inventory scripts and administrator credential audits.
level: high
tags:
  - attack.credential_access
  - attack.t1003.001
  - attack.t1552.001
  - attack.t1555.003

