title: Regsvr32 Rundll32 Mshta Certutil LOLBin Proxy Execution
id: 68e230d4-7d36-4df7-a7f4-1d7e1d7b0007
status: experimental
description: Detects broad signed-binary proxy execution indicators across common Windows LOLBins.
author: Tamandua Security Team
date: 2026/05/25
logsource:
  category: process_creation
  product: windows
detection:
  regsvr32_proxy:
    Image|endswith: '\regsvr32.exe'
    CommandLine|contains:
      - 'scrobj.dll'
      - '/i:'
      - '/n'
  rundll32_proxy:
    Image|endswith: '\rundll32.exe'
    CommandLine|contains:
      - ','
      - 'javascript:'
      - 'Control_RunDLL'
      - 'PrintUIEntry'
  mshta_proxy:
    Image|endswith: '\mshta.exe'
    CommandLine|contains:
      - 'javascript:'
      - 'vbscript:'
      - 'http://'
      - 'https://'
  certutil_decode:
    Image|endswith: '\certutil.exe'
    CommandLine|contains:
      - '-decode'
      - '/decode'
      - '-encode'
      - '/encode'
      - '-urlcache'
      - '/urlcache'
  cmd_wrapped_lolbin:
    Image|endswith: '\cmd.exe'
    CommandLine|contains:
      - 'regsvr32.exe'
      - 'rundll32.exe'
      - 'mshta.exe'
      - 'certutil.exe'
  condition: regsvr32_proxy or rundll32_proxy or mshta_proxy or certutil_decode or cmd_wrapped_lolbin
falsepositives:
  - COM registration, certificate maintenance, and legacy admin scripts.
level: high
tags:
  - attack.defense_evasion
  - attack.t1218.010
  - attack.t1218.011
  - attack.t1218.005
  - attack.t1140

