title: DLL Search Order Hijack or Sideload Canary Indicators
id: 68e230d4-7d36-4df7-a7f4-1d7e1d7b0006
status: experimental
description: Detects creation of DLL canaries in writable directories and suspicious DLL proxy execution useful for sideload and search-order hijack validation.
author: Tamandua Security Team
date: 2026/05/25
logsource:
  category: process_creation
  product: windows
detection:
  dll_canary_create:
    CommandLine|contains:
      - '.dll'
      - '\Temp\'
      - '%TEMP%'
  rundll32_sideload_probe:
    Image|endswith: '\rundll32.exe'
    CommandLine|contains:
      - 'PrintUIEntry'
      - 'Control_RunDLL'
      - ','
  condition: dll_canary_create or rundll32_sideload_probe
falsepositives:
  - Installers and Control Panel automation.
level: high
tags:
  - attack.persistence
  - attack.privilege_escalation
  - attack.defense_evasion
  - attack.t1574.001
  - attack.t1574.002

