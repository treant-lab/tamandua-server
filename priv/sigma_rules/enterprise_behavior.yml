title: Exfiltration Staging Archive and Transfer Indicators
id: 68e230d4-7d36-4df7-a7f4-1d7e1d7b0005
status: experimental
description: Detects local staging, archive creation, and follow-on transfer utilities commonly seen before exfiltration.
author: Tamandua Security Team
date: 2026/05/25
logsource:
  category: process_creation
  product: windows
detection:
  archive_create:
    Image|endswith:
      - '\tar.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - '.zip'
      - 'Compress-Archive'
      - ' -a -c -f '
  staged_temp_location:
    CommandLine|contains:
      - '%TEMP%'
      - '\Temp\'
  staged_temp_marker:
    CommandLine|contains:
      - '.zip'
      - 'archive'
      - 'exfil'
      - 'staging'
  transfer_after_staging:
    Image|endswith:
      - '\curl.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'http://'
      - 'https://'
  cmd_wrapped_transfer:
    Image|endswith: '\cmd.exe'
    CommandLine|contains|all:
      - 'curl.exe'
      - 'http'
  condition: archive_create or (staged_temp_location and staged_temp_marker) or transfer_after_staging or cmd_wrapped_transfer
falsepositives:
  - Backup scripts and administrative archive jobs.
level: high
tags:
  - attack.exfiltration
  - attack.collection
  - attack.t1005
  - attack.t1560.001
  - attack.t1041

