title: C2 Beacon or Download Tool Usage
id: 68e230d4-7d36-4df7-a7f4-1d7e1d7b0004
status: experimental
description: Detects command-line web clients and PowerShell network probes that can be used for beaconing or ingress tool transfer.
author: Tamandua Security Team
date: 2026/05/25
logsource:
  category: process_creation
  product: windows
detection:
  curl_http:
    Image|endswith: '\curl.exe'
    CommandLine|contains:
      - 'http://'
      - 'https://'
  curl_download:
    Image|endswith: '\curl.exe'
    CommandLine|contains:
      - ' -o '
      - ' --output '
      - ' -O '
      - ' -L '
  curl_download_commandline:
    CommandLine|contains|all:
      - 'curl'
      - 'http'
      - ' -o '
  curl_transfer_commandline:
    CommandLine|contains|all:
      - 'curl'
      - 'http'
      - ' -L '
  cmd_wrapped_curl:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains|all:
      - 'curl.exe'
      - 'http'
  powershell_network_probe:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Test-NetConnection'
      - 'Invoke-WebRequest'
      - 'Invoke-RestMethod'
  condition: curl_http or curl_download or curl_download_commandline or curl_transfer_commandline or cmd_wrapped_curl or powershell_network_probe
falsepositives:
  - Administrative scripts and developer tooling.
level: high
tags:
  - attack.command_and_control
  - attack.t1071.001
  - attack.t1105
  - attack.t1095

