title: Lateral WMI WinRM Remote Management Discovery
id: 68e230d4-7d36-4df7-a7f4-1d7e1d7b0002
status: experimental
description: Detects WMI, WinRM, and PowerShell remoting discovery that often precedes lateral movement.
author: Tamandua Security Team
date: 2026/05/25
logsource:
  category: process_creation
  product: windows
detection:
  wmi_cim_tool:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Get-CimInstance'
      - 'Get-WmiObject'
      - 'Invoke-WmiMethod'
      - 'Invoke-CimMethod'
  wmi_cim_target:
    CommandLine|contains:
      - 'Win32_Process'
      - '-ComputerName'
  cmd_wrapped_wmi_cim:
    Image|endswith: '\cmd.exe'
    CommandLine|contains|all:
      - 'powershell.exe'
      - 'Get-CimInstance'
      - 'Win32_Process'
  winrm_cli_probe:
    Image|endswith:
      - '\winrm.cmd'
      - '\winrm.exe'
    CommandLine|contains:
      - 'enumerate'
      - 'winrm/config'
  winrm_service_probe:
    Image|endswith: '\sc.exe'
    CommandLine|contains|all:
      - 'query'
      - 'WinRM'
  psremoting_probe:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Invoke-Command'
      - 'Enter-PSSession'
      - 'New-PSSession'
  condition: (wmi_cim_tool and wmi_cim_target) or cmd_wrapped_wmi_cim or winrm_cli_probe or winrm_service_probe or psremoting_probe
falsepositives:
  - Legitimate remote administration and inventory tooling.
level: high
tags:
  - attack.lateral_movement
  - attack.execution
  - attack.t1047
  - attack.t1021.006
  - attack.t1059.001

