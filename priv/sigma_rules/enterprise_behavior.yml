title: Tamper Defense Discovery via Defender or VSSAdmin
id: 68e230d4-7d36-4df7-a7f4-1d7e1d7b0008
status: experimental
description: Detects security-tool configuration discovery and recovery-control probing that commonly precedes tamper or impact activity.
author: Tamandua Security Team
date: 2026/05/25
logsource:
  category: process_creation
  product: windows
detection:
  defender_preference_probe:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Get-MpPreference'
      - 'Set-MpPreference'
      - 'Add-MpPreference'
  vssadmin_probe:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains:
      - 'list shadows'
      - 'delete shadows'
      - 'resize shadowstorage'
  indicator_removal:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'del /f'
      - 'Remove-Item'
      - 'Clear-EventLog'
      - 'wevtutil cl'
  condition: defender_preference_probe or vssadmin_probe or indicator_removal
falsepositives:
  - Administrative security posture checks and maintenance cleanup.
level: high
tags:
  - attack.defense_evasion
  - attack.impact
  - attack.t1562.001
  - attack.t1070.004
  - attack.t1490
