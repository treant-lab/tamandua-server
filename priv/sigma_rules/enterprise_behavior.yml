title: Privilege Service Scheduled Task Abuse Indicators
id: 68e230d4-7d36-4df7-a7f4-1d7e1d7b0003
status: experimental
description: Detects service creation, scheduled task creation, and UAC configuration discovery that can support privilege escalation or persistence.
author: Tamandua Security Team
date: 2026/05/25
logsource:
  category: process_creation
  product: windows
detection:
  scheduled_task_create:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains|all:
      - '/Create'
      - '/TN'
  service_create:
    Image|endswith: '\sc.exe'
    CommandLine|contains|all:
      - 'create'
      - 'binPath'
  uac_discovery:
    Image|endswith: '\reg.exe'
    CommandLine|contains|all:
      - 'Policies\System'
      - 'EnableLUA'
  condition: scheduled_task_create or service_create or uac_discovery
falsepositives:
  - Software installers and administrator maintenance.
level: high
tags:
  - attack.privilege_escalation
  - attack.persistence
  - attack.t1548.002
  - attack.t1053.005
  - attack.t1543.003

