---
title: SMB Share Enumeration
id: recon-005-smb-enum
status: experimental
description: Detects enumeration of SMB shares across the network
author: Tamandua Security Team
date: 2024/03/17
logsource:
    category: process_creation
    product: windows
detection:
    selection_net:
        Image|endswith: '\net.exe'
        CommandLine|contains:
            - 'view \\\\'
            - 'share \\\\'
    selection_ps:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Get-SmbShare'
            - 'Invoke-ShareFinder'
    condition: selection_net or selection_ps
falsepositives:
    - IT administration
    - Network auditing
level: medium
tags:
    - attack.reconnaissance
    - attack.t1135

