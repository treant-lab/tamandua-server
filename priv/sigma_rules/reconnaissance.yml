---
title: Active Directory Reconnaissance via ADFind
id: recon-009-adfind
status: experimental
description: Detects ADFind Active Directory reconnaissance tool
author: Tamandua Security Team
date: 2024/03/17
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\AdFind.exe'
    selection_rename:
        CommandLine|contains:
            - ' -f '
            - ' -b '
            - 'objectcategory='
            - 'objectclass='
            - '-gcb'
    condition: selection or selection_rename
falsepositives:
    - Legitimate AD administration
level: high
tags:
    - attack.reconnaissance
    - attack.t1087.002

