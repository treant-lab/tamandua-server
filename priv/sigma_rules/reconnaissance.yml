---
title: DNS Reconnaissance via dig/nslookup
id: recon-013-dns-recon
status: experimental
description: Detects DNS reconnaissance using dig or nslookup with suspicious parameters
author: Tamandua Security Team
date: 2024/03/17
logsource:
    category: process_creation
    product: windows
detection:
    selection_nslookup:
        Image|endswith: '\nslookup.exe'
        CommandLine|contains:
            - 'type='
            - '-type='
            - 'querytype='
            - 'ls -d'
    selection_dig:
        CommandLine|contains:
            - 'dig '
            - 'dig.exe'
        CommandLine|contains:
            - 'AXFR'
            - 'ANY'
            - 'TXT'
            - 'MX'
            - 'NS'
    condition: selection_nslookup or selection_dig
falsepositives:
    - DNS administration
    - Network troubleshooting
level: low
tags:
    - attack.reconnaissance
    - attack.t1590.002

---
title: Cloud Resource Enumeration
id: recon-014-cloud-enum
status: experimental
description: Detects enumeration of cloud resources via CLI tools
author: Tamandua Security Team
date: 2024/03/17
logsource:
    category: process_creation
    product: windows
detection:
    selection_aws:
        CommandLine|contains:
            - 'aws s3 ls'
            - 'aws iam list'
            - 'aws ec2 describe'
            - 'aws rds describe'
    selection_azure:
        CommandLine|contains:
            - 'az vm list'
            - 'az storage account list'
            - 'az ad user list'
            - 'az ad group list'
    selection_gcp:
        CommandLine|contains:
            - 'gcloud compute instances list'
            - 'gcloud iam service-accounts list'
            - 'gsutil ls'
    condition: selection_aws or selection_azure or selection_gcp
falsepositives:
    - Cloud administration
    - DevOps activities
level: low
tags:
    - attack.reconnaissance
    - attack.t1526

