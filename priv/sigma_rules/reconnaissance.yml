author: Tamandua Security Team
date: 2024/03/17
logsource:
    category: process_creation
    product: windows
detection:
    selection_tools:
        Image|endswith:
            - '\theHarvester.exe'
            - '\theharvester.py'
            - '\EmailHarvester.exe'
    selection_ps:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
