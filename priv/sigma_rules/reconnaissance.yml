title: Network Port Scanning Detection
id: recon-001-port-scanning
status: experimental
description: Detects potential port scanning activity by monitoring for rapid connection attempts to multiple ports on a single target
author: Tamandua Security Team
date: 2024/03/17
logsource:
    category: network_connection
    product: windows
detection:
    selection:
        EventType: 'network_connect'
    timeframe: 60s
    condition: selection | count(DestinationPort) by DestinationIP > 20
falsepositives:
    - Legitimate vulnerability scanners
    - Network monitoring tools
level: medium
tags:
    - attack.reconnaissance
    - attack.t1595.001

