# =============================================================================
# SECTION 3: Blockchain-Based C2 (GlassWorm/EtherHiding)
# =============================================================================

---
title: Process Making Solana RPC Calls for Memo Data
id: web3-sc-c2-001-0001
status: stable
description: |
  Detects processes making Solana RPC calls to read memo transactions. GlassWorm-style
  malware uses blockchain memo fields to store encoded C2 commands and exfiltration
  endpoints, making detection difficult as blockchain data is immutable and public.
references:
  - https://attack.mitre.org/techniques/T1102/
  - https://research.checkpoint.com/2023/etheriding-blockchain-based-c2/
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.command_and_control
  - attack.t1102
  - attack.t1071.001
  - web3
  - solana
  - blockchain_c2
logsource:
  category: network_connection
  product: any
detection:
  selection_rpc_endpoints:
    DestinationHostname|contains:
      - 'api.mainnet-beta.solana.com'
      - 'api.devnet.solana.com'
      - 'api.testnet.solana.com'
      - 'solana-mainnet.g.alchemy.com'
      - 'solana.getblock.io'
      - 'rpc.ankr.com/solana'
      - 'solana-api.projectserum.com'
      - 'ssc-dao.genesysgo.net'
      - 'helius-rpc.com'
      - 'quicknode.com'
  filter_legitimate:
    Image|endswith:
      - '\solana.exe'
      - '/solana'
      - '\anchor.exe'
      - '/anchor'
      - '\node.exe'
      - '/node'
      - '\Code.exe'
      - '\chrome.exe'
      - '\brave.exe'
  selection_suspicious_process:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\rundll32.exe'
      - '\regsvr32.exe'
      - '\mshta.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '/sh'
      - '/bash'
      - '/python'
      - '/python3'
  condition: selection_rpc_endpoints and selection_suspicious_process
falsepositives:
  - Solana CLI tools
  - Development scripts
level: high

---
title: BSC/ETH Contract Data Read for Encoded Payloads
id: web3-sc-c2-002-0001
status: stable
description: |
  Detects processes making calls to BSC or Ethereum RPC endpoints to read smart contract
  data. EtherHiding malware stores encoded C2 payloads in smart contract storage slots
  or transaction input data.
references:
  - https://attack.mitre.org/techniques/T1102/
  - https://research.checkpoint.com/2023/etheriding-blockchain-based-c2/
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.command_and_control
  - attack.t1102
  - web3
  - blockchain_c2
logsource:
  category: network_connection
  product: any
detection:
  selection_eth_rpc:
    DestinationHostname|contains:
      - 'mainnet.infura.io'
      - 'eth-mainnet.g.alchemy.com'
      - 'cloudflare-eth.com'
      - 'rpc.ankr.com/eth'
      - 'api.etherscan.io'
      # BSC endpoints
      - 'bsc-dataseed'
      - 'rpc.ankr.com/bsc'
      - 'api.bscscan.com'
      - 'binance.org'
      # Polygon
      - 'polygon-rpc.com'
      - 'rpc.ankr.com/polygon'
  selection_suspicious_process:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\mshta.exe'
      - '\wscript.exe'
      - '\rundll32.exe'
      - '/sh'
      - '/bash'
    Image|contains:
      - '\Temp\'
      - '\tmp\'
      - '/tmp/'
      - '\AppData\Local\Temp'
  condition: selection_eth_rpc and selection_suspicious_process
falsepositives:
  - Cryptocurrency applications
  - Web3 development tools
level: high

---
title: Process Decoding Base64/Hex from Blockchain Data
id: web3-sc-c2-003-0001
status: stable
description: |
  Detects processes that recently connected to blockchain RPC endpoints and then
  execute base64/hex decoding operations. This pattern indicates blockchain-based
  C2 payload retrieval and decoding.
references:
  - https://attack.mitre.org/techniques/T1140/
  - https://attack.mitre.org/techniques/T1102/
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.defense_evasion
  - attack.t1140
  - attack.command_and_control
  - attack.t1102
  - web3
  - blockchain_c2
logsource:
  category: process_creation
  product: windows
detection:
  selection_decode:
    CommandLine|contains:
      - 'FromBase64String'
      - '[Convert]::FromBase64'
      - 'base64 -d'
      - 'base64 --decode'
      - 'certutil -decode'
      - 'hex2bin'
      - 'Buffer.from'
      - 'atob('
      - '.toString("hex")'
      - 'unhexlify'
  selection_blockchain_context:
    CommandLine|contains:
      - 'solana'
      - 'web3'
      - 'eth_call'
      - 'getTransaction'
      - 'getAccountInfo'
      - 'getProgramAccounts'
      - 'memo'
      - 'contract'
      - '0x'
      - 'mainnet'
  condition: selection_decode and selection_blockchain_context
falsepositives:
  - Blockchain development tools
  - Transaction analysis scripts
level: medium

