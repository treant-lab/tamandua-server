  - attack.credential_access
  - attack.t1557
  - web3
  - solana
logsource:
  category: process_creation
  product: windows
detection:
  selection_extension_paths:
    CommandLine|contains:
      - 'chrome-extension://bfnaelmomeimhlpmgjnjophhpkkoljpa'  # Phantom
      - 'chrome-extension://bhhhlbepdkbapadjdnnojkbgioiodbic'  # Solflare
      - 'chrome-extension://aflkmfhebedbjioipglgcbcmnbpgliof'  # Backpack
      - 'chrome-extension://nkbihfbeogaeaoehlefnkodbefgpgknn'  # MetaMask
  selection_injection:
    CommandLine|contains:
      - 'postMessage'
      - 'addEventListener'
      - 'dispatchEvent'
      - 'window.solana'
      - 'window.phantom'
      - 'window.backpack'
  filter_browser:
    Image|endswith:
      - '\chrome.exe'
      - '\brave.exe'
      - '\msedge.exe'
  condition: selection_extension_paths and selection_injection and not filter_browser
falsepositives:
  - Web development testing
  - Browser automation tools
level: high

