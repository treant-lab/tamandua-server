---
title: Solana Package Typosquatting Detection
id: web3-sc-npm-002-0001
status: stable
description: |
  Detects installation of npm packages with names similar to legitimate Solana ecosystem
  packages. Typosquatting attacks target developers by registering packages with similar
  names to @solana/web3.js, @solana/spl-token, @project-serum/anchor, etc.
references:
  - https://attack.mitre.org/techniques/T1195/001/
  - https://socket.dev/npm/package/typosquatting
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.initial_access
  - attack.t1195.001
  - web3
  - solana
  - supply_chain
logsource:
  category: process_creation
  product: any
detection:
  selection_npm:
    Image|endswith:
      - '\npm.cmd'
      - '\npm.exe'
      - '/npm'
      - '\node.exe'
      - '/node'
    CommandLine|contains: 'install'
  selection_typosquat:
    CommandLine|contains:
      # Solana typosquats
      - 'solana-web3'
      - '@solanna/'
      - '@so1ana/'
      - '@soIana/'
      - 'solanaweb3'
      - 'solana_web3'
      - 'web3-solana'
      - 'spl-tokens'
      - 'spltoken'
      - '@spl-token/'
      # Anchor typosquats
      - '@anchor-lang/'
      - 'anchor-project'
      - '@proj-serum/'
      - '@project_serum/'
      # Metaplex typosquats
      - '@metapIex/'
      - 'metaplex-js'
      - '@meta-plex/'
      # Phantom typosquats
      - 'phantom-connect'
      - '@phantom-wallet/'
      - 'phantom-adapter'
  filter_legitimate:
    CommandLine|contains:
      - '@solana/web3.js'
      - '@solana/spl-token'
      - '@project-serum/anchor'
      - '@coral-xyz/anchor'
      - '@metaplex-foundation/'
      - '@solana/wallet-adapter'
  condition: selection_npm and selection_typosquat and not filter_legitimate
falsepositives:
  - Very low - typosquatted packages are almost always malicious
level: critical

---
title: Network Connection During NPM Package Install
id: web3-sc-npm-003-0001
status: stable
description: |
  Detects unexpected network connections during npm package installation to non-standard
  destinations. Legitimate packages should only connect to npm registry and CDNs.
references:
  - https://attack.mitre.org/techniques/T1195/001/
  - https://attack.mitre.org/techniques/T1071/001/
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.initial_access
  - attack.t1195.001
  - attack.command_and_control
  - attack.t1071.001
  - web3
  - supply_chain
logsource:
  category: network_connection
  product: any
detection:
  selection_npm_process:
    Image|endswith:
      - '\node.exe'
      - '/node'
    ParentCommandLine|contains:
      - 'npm install'
      - 'npm i '
      - 'yarn add'
      - 'pnpm add'
  filter_trusted:
    DestinationHostname|endswith:
      - 'npmjs.org'
      - 'npmjs.com'
      - 'yarnpkg.com'
      - 'unpkg.com'
      - 'jsdelivr.net'
      - 'github.com'
      - 'githubusercontent.com'
      - 'cloudflare.com'
      - 'cloudflare-ipfs.com'
  selection_suspicious_tld:
    DestinationHostname|endswith:
      - '.xyz'
      - '.tk'
      - '.ml'
      - '.ga'
      - '.cf'
      - '.top'
      - '.work'
      - '.click'
      - '.link'
      - '.ru'
  condition: selection_npm_process and (not filter_trusted or selection_suspicious_tld)
falsepositives:
  - Packages with legitimate external dependencies
  - Private npm registries
level: high

