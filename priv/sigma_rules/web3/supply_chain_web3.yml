---
title: Node.js Spawning CMD with Download Commands
id: web3-sc-npm-004-0002
status: stable
description: |
  Detects Node.js spawning cmd.exe with certutil, bitsadmin, or curl download commands.
  Commonly used in supply chain attacks to download second-stage payloads.
references:
  - https://attack.mitre.org/techniques/T1105/
  - https://attack.mitre.org/techniques/T1195/001/
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.command_and_control
  - attack.t1105
  - attack.initial_access
  - attack.t1195.001
  - web3
  - supply_chain
logsource:
  category: process_creation
  product: windows
detection:
  selection_node_parent:
    ParentImage|endswith:
      - '\node.exe'
      - '\npm.cmd'
  selection_cmd:
    Image|endswith: '\cmd.exe'
  selection_download:
    CommandLine|contains:
      - 'certutil -urlcache'
      - 'certutil -decode'
      - 'certutil -decodehex'
      - 'bitsadmin /transfer'
      - 'curl -o'
      - 'curl -O'
      - 'curl --output'
      - 'wget '
      - 'Invoke-WebRequest'
  condition: selection_node_parent and selection_cmd and selection_download
falsepositives:
  - Build scripts downloading legitimate resources
level: high

