  - attack.initial_access
  - attack.t1195.001
  - web3
  - supply_chain
logsource:
  category: process_creation
  product: windows
detection:
  selection_node_parent:
    ParentImage|endswith:
      - '\node.exe'
      - '\npm.cmd'
      - '\npx.cmd'
      - '\yarn.cmd'
      - '\pnpm.cmd'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
