# Web3/Solana Supply Chain Attack Detection Rules
# Covers: NPM supply chain, IDE extension malware, blockchain-based C2,
# wallet drainer indicators, and Solana-specific threats

# =============================================================================
# SECTION 1: NPM/Package Supply Chain Attacks
# =============================================================================

title: NPM Preinstall/Postinstall Hook Executing Shell Commands
id: web3-sc-npm-001-0001
status: stable
description: |
  Detects npm install scripts (preinstall/postinstall hooks) spawning shell processes
  with suspicious arguments. Malicious npm packages abuse lifecycle scripts to execute
  arbitrary code during installation. Common in Web3 supply chain attacks targeting
  Solana developers.
references:
  - https://attack.mitre.org/techniques/T1195/001/
  - https://blog.phylum.io/npm-supply-chain-attack-targets-solana-developers
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.initial_access
  - attack.t1195.001
  - attack.execution
  - attack.t1059
  - web3
  - solana
  - supply_chain
logsource:
  category: process_creation
  product: windows
detection:
  selection_npm_parent:
    ParentImage|endswith:
      - '\node.exe'
      - '\npm.cmd'
      - '\npm.exe'
    ParentCommandLine|contains:
      - 'preinstall'
      - 'postinstall'
      - 'install'
      - 'prepare'
      - 'prepublish'
  selection_shell_child:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_suspicious_args:
    CommandLine|contains:
      - '-enc'
      - '-encoded'
      - '-WindowStyle Hidden'
      - '-w hidden'
      - '-nop'
      - 'bypass'
      - 'DownloadString'
      - 'DownloadFile'
      - 'Invoke-Expression'
      - 'IEX'
      - 'FromBase64'
      - 'http://'
      - 'curl '
      - 'certutil'
      - 'bitsadmin'
  condition: selection_npm_parent and selection_shell_child and selection_suspicious_args
falsepositives:
  - Legitimate build scripts
  - Package postinstall configurations
level: high

