---
title: VS Code Extension Accessing Browser Data
id: web3-sc-ide-001-0001
status: stable
description: |
  Detects VS Code or Cursor extension processes accessing browser local storage,
  cookies, or credential files. Malicious extensions steal browser-stored crypto
  wallet data and authentication tokens.
references:
  - https://attack.mitre.org/techniques/T1555/003/
  - https://attack.mitre.org/techniques/T1176/
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.credential_access
  - attack.t1555.003
  - attack.persistence
  - attack.t1176
  - web3
  - ide_malware
logsource:
  category: file_event
  product: windows
detection:
  selection_vscode_process:
    Image|contains:
      - '\Code.exe'
      - '\Cursor.exe'
      - '\code-tunnel'
      - '\extensions\'
    Image|endswith:
      - '\node.exe'
  selection_browser_data:
    TargetFilename|contains:
      - '\Google\Chrome\User Data\'
      - '\Microsoft\Edge\User Data\'
      - '\BraveSoftware\Brave-Browser\User Data\'
      - '\Mozilla\Firefox\Profiles\'
      - 'Local Storage\leveldb'
      - '\Cookies'
      - '\Login Data'
      - '\Web Data'
      - 'IndexedDB'
  filter_browser:
    Image|endswith:
      - '\chrome.exe'
      - '\msedge.exe'
      - '\brave.exe'
      - '\firefox.exe'
  condition: selection_vscode_process and selection_browser_data and not filter_browser
falsepositives:
  - Browser debugging extensions
level: critical

