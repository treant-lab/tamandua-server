  - https://attack.mitre.org/techniques/T1041/
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.exfiltration
  - attack.t1041
  - web3
  - solana
  - wallet_drainer
logsource:
  category: process_creation
  product: any
detection:
  selection_sweep:
    CommandLine|contains:
      - 'getTokenAccountsByOwner'
      - 'getParsedTokenAccountsByOwner'
      - 'transferChecked'
      - 'closeAccount'
