---
title: Suspicious dApp Connection Request Pattern
id: web3-sc-drainer-001-0001
status: stable
description: |
  Detects browser processes with command-line arguments indicating suspicious dApp
  connection patterns. Wallet drainers often use URL parameters or deep links to
  trigger malicious connect requests.
