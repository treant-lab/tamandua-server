---
title: Crypto Wallet Process Memory Access
id: web3-sc-cross-003-0001
status: stable
description: |
  Detects processes attempting to access memory of cryptocurrency wallet applications.
  Attackers may dump wallet process memory to extract decrypted private keys.
references:
  - https://attack.mitre.org/techniques/T1003/001/
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.credential_access
  - attack.t1003.001
  - web3
logsource:
  category: process_access
  product: windows
detection:
  selection_wallet_target:
    TargetImage|endswith:
      - '\Exodus.exe'
      - '\Atomic.exe'
      - '\Ledger Live.exe'
      - '\electrum.exe'
      - '\Bitcoin-Qt.exe'
      - '\solana-keygen.exe'
  selection_access:
    GrantedAccess:
      - '0x1010'  # PROCESS_VM_READ | PROCESS_QUERY_INFORMATION
      - '0x1410'
      - '0x1F0FFF'  # PROCESS_ALL_ACCESS
      - '0x1FFFFF'
  filter_av:
    SourceImage|contains:
      - '\Windows Defender\'
      - '\ESET\'
      - '\Kaspersky\'
      - '\Malwarebytes\'
  condition: selection_wallet_target and selection_access and not filter_av
falsepositives:
  - Security software
  - System diagnostic tools
level: critical
