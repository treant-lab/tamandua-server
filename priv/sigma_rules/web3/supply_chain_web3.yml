---
title: Solana RPC Endpoint Manipulation
id: web3-sc-sol-002-0001
status: stable
description: |
  Detects modification of Solana CLI configuration to point to malicious RPC endpoints.
  Attackers redirect RPC calls to capture private keys or manipulate transaction data.
references:
  - https://attack.mitre.org/techniques/T1565/002/
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.impact
  - attack.t1565.002
  - web3
  - solana
logsource:
  category: process_creation
  product: any
detection:
  selection_config:
    Image|endswith:
      - '\solana.exe'
      - '/solana'
    CommandLine|contains:
      - 'config set'
      - '--url'
      - '-u '
  filter_trusted_rpc:
    CommandLine|contains:
      - 'api.mainnet-beta.solana.com'
      - 'api.devnet.solana.com'
      - 'api.testnet.solana.com'
      - 'localhost'
      - '127.0.0.1'
      - 'helius-rpc.com'
      - 'alchemy.com'
      - 'quicknode.com'
      - 'ankr.com'
      - 'genesysgo.net'
  selection_suspicious:
    CommandLine|contains:
      - '.xyz'
      - '.tk'
      - '.top'
      - '.click'
      - 'ngrok'
      - 'localtunnel'
      - 'serveo'
  condition: selection_config and (not filter_trusted_rpc or selection_suspicious)
falsepositives:
  - Custom RPC endpoint configuration
  - Private validator nodes
level: high

