---
title: Phantom/Solflare Browser Extension IPC Interception
id: web3-sc-sol-008-0001
status: stable
description: |
  Detects potential interception of browser extension IPC (Inter-Process Communication)
  channels used by Solana wallet extensions. Malicious extensions may intercept
  wallet signing requests.
