---
title: Unauthorized Solana Keypair File Access
id: web3-sc-sol-001-0001
status: stable
description: |
  Detects unauthorized processes accessing Solana keypair JSON files. These files
  contain private keys that provide full control over associated wallets.
references:
  - https://attack.mitre.org/techniques/T1552/001/
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.credential_access
  - attack.t1552.001
  - web3
  - solana
logsource:
  category: file_event
  product: windows
detection:
  selection_keypair:
    TargetFilename|endswith:
      - '\id.json'
      - '\devnet.json'
      - '\testnet.json'
      - '\mainnet-beta.json'
      - '-keypair.json'
      - '_keypair.json'
    TargetFilename|contains:
      - '\solana\'
      - '\.config\solana'
      - '\solana-wallet'
  filter_legitimate:
    Image|endswith:
      - '\solana.exe'
      - '\anchor.exe'
      - '\cargo.exe'
      - '\node.exe'
      - '\Code.exe'
      - '\solana-keygen.exe'
  filter_cli_tools:
    Image|contains:
      - '\solana-'
      - '\spl-token'
      - '\anchor-'
  condition: selection_keypair and not (filter_legitimate or filter_cli_tools)
falsepositives:
  - Solana development tools
  - Backup utilities
level: critical

