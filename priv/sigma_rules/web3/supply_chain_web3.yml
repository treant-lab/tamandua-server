  selection_browser:
    Image|endswith:
      - '\chrome.exe'
      - '\msedge.exe'
      - '\brave.exe'
      - '\firefox.exe'
  selection_suspicious_url:
    CommandLine|contains:
      - 'connect?'
      - 'approve?'
      - 'permit?'
      - 'sign?'
      - 'transfer?'
      - 'setApprovalForAll'
      - 'increaseAllowance'
      - 'permit2'
      - 'drainer'
      - 'claim-airdrop'
      - 'free-mint'
      - 'claim-reward'
  selection_suspicious_tld:
    CommandLine|contains:
      - '.xyz/'
      - '.tk/'
      - '.ml/'
      - '.fun/'
      - '-airdrop.'
      - '-claim.'
      - '-mint.'
  condition: selection_browser and (selection_suspicious_url or selection_suspicious_tld)
falsepositives:
  - Legitimate dApp interactions
level: medium

---
title: Programmatic Transaction Signing Without UI
id: web3-sc-drainer-002-0001
status: stable
description: |
  Detects processes that appear to be signing transactions programmatically without
  user wallet UI interaction. May indicate automated drainer or compromised wallet.
