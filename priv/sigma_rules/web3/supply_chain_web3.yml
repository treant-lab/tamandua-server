      - '\Code.exe'
      - '\Cursor.exe'
      - 'extensionHost'
      - '\extensions\'
  selection_suspicious_dest:
    DestinationHostname|endswith:
      - '.xyz'
      - '.tk'
      - '.top'
      - '.work'
      - '.click'
      - '.fun'
      - '.ru'
