---
title: Durable Nonce Account Creation Abuse
id: web3-sc-sol-003-0001
status: stable
description: |
  Detects creation of durable nonce accounts which can be abused for replay attacks
  or delayed transaction execution. Attackers may create nonce accounts to execute
  pre-signed transactions at arbitrary future times.
references:
  - https://attack.mitre.org/techniques/T1204/001/
  - https://docs.solana.com/implemented-proposals/durable-tx-nonces
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.execution
  - attack.t1204.001
  - web3
  - solana
logsource:
  category: process_creation
  product: any
detection:
  selection_nonce:
    CommandLine|contains:
      - 'create-nonce-account'
      - 'nonce-account'
      - 'advance-nonce-account'
      - 'NonceAccount'
      - 'durable-nonce'
      - 'SystemProgram.nonceInitialize'
      - 'SystemProgram.nonceAdvance'
  filter_known_tools:
    Image|endswith:
      - '\solana.exe'
      - '/solana'
    ParentImage|endswith:
      - '\Code.exe'
      - '\Terminal.exe'
      - '\WindowsTerminal.exe'
      - '/code'
      - '/bash'
      - '/zsh'
  condition: selection_nonce and not filter_known_tools
falsepositives:
  - Legitimate durable nonce usage for offline signing
  - Multi-sig implementations
level: medium

