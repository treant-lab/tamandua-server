---
title: VS Code Extension Reading Wallet Files
id: web3-sc-ide-003-0001
status: stable
description: |
  Detects VS Code or Cursor extensions accessing cryptocurrency wallet files including
  Solana keypairs, MetaMask vault data, Phantom wallet storage, and hardware wallet
  configurations.
references:
  - https://attack.mitre.org/techniques/T1552/001/
  - https://attack.mitre.org/techniques/T1176/
author: Tamandua EDR
date: 2026/05/08
tags:
  - attack.credential_access
  - attack.t1552.001
  - attack.persistence
  - attack.t1176
  - web3
  - solana
  - ide_malware
logsource:
  category: file_event
  product: windows
detection:
  selection_vscode:
    Image|contains:
      - '\Code.exe'
      - '\Cursor.exe'
      - '\extensions\'
      - 'extensionHost'
  selection_wallet_files:
    TargetFilename|contains:
      # Solana wallet paths
      - '\.config\solana\'
      - '\solana\id.json'
      - '\solana\devnet.json'
      - '\solana\mainnet'
      - '\solana-wallet'
      - 'keypair.json'
      # Browser extension wallets
      - '\Local Extension Settings\nkbihfbeogaeaoehlefnkodbefgpgknn'  # MetaMask
      - '\Local Extension Settings\bfnaelmomeimhlpmgjnjophhpkkoljpa'  # Phantom
      - '\Local Extension Settings\bhhhlbepdkbapadjdnnojkbgioiodbic'  # Solflare
      - '\Local Extension Settings\aflkmfhebedbjioipglgcbcmnbpgliof'  # Backpack
      # Desktop wallets
      - '\Exodus\exodus.wallet'
      - '\Atomic\Local Storage'
      - '\Ledger Live'
      - '\Trezor'
  condition: selection_vscode and selection_wallet_files
falsepositives:
  - Legitimate Solana development extensions
  - Wallet management extensions
level: critical

