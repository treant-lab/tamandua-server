title: DNS Tunneling Detection
id: 5b125bff-1234-b567-89ab-567890123456
status: experimental
description: Detects potential DNS tunneling via long domain queries
author: Tamandua Security Team
date: 2024/01/15
references:
    - https://attack.mitre.org/techniques/T1071/004/
logsource:
    category: dns_query
    product: windows
detection:
    selection:
        QueryName|re: '.{50,}'
    filter:
        QueryName|contains:
            - '.microsoft.com'
            - '.windows.com'
            - '.windowsupdate.com'
            - '.msftncsi.com'
    condition: selection and not filter
falsepositives:
    - CDN domains
    - Legitimate long domain names
level: medium
tags:
    - attack.command_and_control
    - attack.t1071.004

