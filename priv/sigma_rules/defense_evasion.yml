title: Parent PID Spoofing Detection
id: c28f029e-89ab-2cde-f012-012345678901
status: experimental
description: Detects parent PID spoofing techniques
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        ParentImage|endswith: '\svchost.exe'
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\wscript.exe'
            - '\cscript.exe'
    filter:
        ParentCommandLine|contains: '-k '
    condition: selection and not filter
falsepositives:
    - Legitimate scheduled tasks
level: high
tags:
    - attack.defense_evasion
    - attack.t1134.004

---
title: Disabling Windows Security Features
id: d39a130f-9abc-3def-0123-123456789012
status: experimental
description: Detects attempts to disable Windows security features
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection_defender:
        CommandLine|contains:
            - 'Set-MpPreference -DisableRealtimeMonitoring'
            - 'Add-MpPreference -ExclusionPath'
            - 'Add-MpPreference -ExclusionExtension'
            - 'Add-MpPreference -ExclusionProcess'
            - 'Set-MpPreference -DisableIOAVProtection'
            - 'Set-MpPreference -DisableBehaviorMonitoring'
    selection_firewall:
        CommandLine|contains:
            - 'netsh advfirewall set allprofiles state off'
            - 'netsh firewall set opmode disable'
            - 'Set-NetFirewallProfile -Enabled False'
    selection_uac:
        CommandLine|contains:
            - 'reg add HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Policies\\System /v EnableLUA /t REG_DWORD /d 0'
            - 'EnableLUA'
    condition: selection_defender or selection_firewall or selection_uac
falsepositives:
    - Legitimate administrative tasks
level: high
tags:
    - attack.defense_evasion
    - attack.t1562.001

