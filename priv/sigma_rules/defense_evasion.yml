title: AMSI Bypass Attempt
id: 9f5cef7b-5678-f9ab-cdef-789012345678
status: experimental
description: Detects AMSI bypass attempts via PowerShell
author: Tamandua Security Team
date: 2024/01/15
references:
    - https://attack.mitre.org/techniques/T1562/001/
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'AmsiUtils'
            - 'amsiInitFailed'
            - 'AmsiScanBuffer'
            - 'amsiContext'
            - 'System.Management.Automation.AmsiUtils'
            - '[Ref].Assembly.GetType'
            - 'SetValue($null,$true)'
    condition: selection
falsepositives:
    - Security research
level: critical
tags:
    - attack.defense_evasion
    - attack.t1562.001

