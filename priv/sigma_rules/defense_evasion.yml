title: Reflective DLL Loading Detection
id: 28ef685e-ef01-8234-5678-678901234567
status: experimental
description: Detects reflective DLL loading patterns
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: image_load
    product: windows
detection:
    selection:
        ImageLoaded|contains:
            - '\Temp\'
            - '\AppData\Local\Temp\'
        ImageLoaded|endswith: '.dll'
    filter:
        ImageLoaded|contains:
            - '\Temp\msi'
            - '\Temp\chrome_'
    condition: selection and not filter
falsepositives:
    - Legitimate temporary DLLs
level: medium
tags:
    - attack.defense_evasion
    - attack.t1620

---
title: Command Line Argument Spoofing
id: 5c1d2e3f-4a5b-6c7d-8e9f-0a1b2c3d4e5f
status: experimental
description: |
    Detects command line spoofing where a process modifies its
    PEB->ProcessParameters->CommandLine after creation to hide malicious
    arguments. This technique is used by tools like Cobalt Strike (argue).
author: Tamandua Security Team
date: 2024/01/15
references:
    - https://attack.mitre.org/techniques/T1564/010/
    - https://blog.xpnsec.com/how-to-argue-like-cobalt-strike/
logsource:
    category: defense_evasion
    product: tamandua
detection:
    selection:
        evasion_type: 'command_line_spoofing'
    selection_alt:
        cmdline_mismatch: true
    condition: selection or selection_alt
falsepositives:
    - Java applications that modify their display name
    - .NET applications with dynamic argument handling
level: high
tags:
    - attack.defense_evasion
    - attack.t1564.010
    - attack.t1564
