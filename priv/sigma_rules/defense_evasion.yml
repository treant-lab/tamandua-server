title: Process Injection via CreateRemoteThread
id: b17ef19d-789a-1bcd-ef01-901234567890
status: experimental
description: Detects process injection via CreateRemoteThread
author: Tamandua Security Team
date: 2024/01/15
logsource:
    category: create_remote_thread
    product: windows
detection:
    selection:
        TargetImage|endswith:
            - '\lsass.exe'
            - '\csrss.exe'
            - '\winlogon.exe'
            - '\services.exe'
            - '\svchost.exe'
            - '\explorer.exe'
    filter:
        SourceImage|endswith:
            - '\csrss.exe'
            - '\System'
            - '\wininit.exe'
    condition: selection and not filter
falsepositives:
    - Security software
level: high
tags:
    - attack.defense_evasion
    - attack.privilege_escalation
    - attack.t1055.001

