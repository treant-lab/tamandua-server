test_case:
  name: "Process Masquerading Detection"
  description: "Tests detection of malware masquerading as legitimate process"
  rule: "defense_evasion/masquerading.yml"
  rule_type: sigma
  events:
    - type: process_create
      os_type: windows
      data:
        path: "C:\\Users\\Public\\svchost.exe"
        cmdline: "svchost.exe"
        parent_path: "C:\\Windows\\explorer.exe"
        user: "WORKSTATION\\user"
        pid: 7892
        ppid: 1892
        is_signed: false
  expected: match
  expected_severity: high
  expected_mitre: ["T1036.004"]
  tags: ["defense_evasion", "masquerading", "positive"]
