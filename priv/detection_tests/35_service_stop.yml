test_case:
  name: "Critical Service Termination"
  description: "Tests detection of security service termination"
  rule: "impact/service_stop.yml"
  rule_type: sigma
  events:
    - type: process_create
      os_type: windows
      data:
        path: "C:\\Windows\\System32\\net.exe"
        cmdline: "net.exe stop WinDefend"
        parent_path: "C:\\Users\\Public\\malware.exe"
        user: "WORKSTATION\\admin"
        pid: 9456
        ppid: 5124
        is_elevated: true
  expected: match
  expected_severity: high
  expected_mitre: ["T1489"]
  tags: ["impact", "service", "positive"]
