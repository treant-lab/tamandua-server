test_case:
  name: "Event Log Clearing Detection"
  description: "Tests detection of event log clearing for defense evasion"
  rule: "defense_evasion/clear_event_logs.yml"
  rule_type: sigma
  events:
    - type: process_create
      os_type: windows
      data:
        path: "C:\\Windows\\System32\\wevtutil.exe"
        cmdline: "wevtutil.exe clear-log Security"
        parent_path: "C:\\Windows\\System32\\cmd.exe"
        user: "WORKSTATION\\admin"
        pid: 5234
        ppid: 2048
        is_elevated: true
  expected: match
  expected_severity: high
  expected_mitre: ["T1070.001"]
  tags: ["defense_evasion", "logs", "positive"]
