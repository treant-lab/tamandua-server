test_case:
  name: "DCSync Attack Detection"
  description: "Tests detection of DCSync credential dumping"
  rule: "credential_access/dcsync.yml"
  rule_type: sigma
  events:
    - type: process_create
      os_type: windows
      data:
        path: "C:\\Tools\\mimikatz.exe"
        cmdline: "mimikatz.exe lsadump::dcsync /domain:corp.local /user:Administrator"
        parent_path: "C:\\Windows\\System32\\cmd.exe"
        user: "DOMAIN\\admin"
        pid: 5432
        ppid: 2048
        is_elevated: true
  expected: match
  expected_severity: critical
  expected_mitre: ["T1003.006"]
  tags: ["credential_access", "dcsync", "positive"]
