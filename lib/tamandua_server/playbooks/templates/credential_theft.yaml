name: "Credential Theft Response"
description: "Response to credential access attempts with memory forensics and containment"

trigger:
  mitre_techniques:
    - "T1003"  # OS Credential Dumping
    - "T1555"  # Credentials from Password Stores
  severity: "high"

actions:
  - action: "collect_forensics"
    collect_forensics:
      memory_dump: true
      process_list: true
      network_connections: true

  - action: "kill_process"
    kill_process:
      force: true

  - action: "trigger_scan"
    trigger_scan:
      path: "C:\\Windows\\System32"
      recursive: false

  - action: "create_ticket"
    create_ticket:
      title: "Credential Theft Attempt Detected"
      severity: "high"
      priority: "P2"

  - action: "send_notification"
    send_notification:
      channel: "email"
      message: "Credential theft attempt detected. Memory dump collected for analysis."
